      </div>` : ""}
      ${data.last_regulatory_visit ? `
      <div class="drawer-section">
        <div class="drawer-section-label">Last regulatory visit</div>
        <div class="drawer-section-body">${htmlEscape(data.last_regulatory_visit)}</div>
      </div>` : ""}
      ${data.ccs_revoked_by_ea ? `
      <div class="drawer-section">
        <div class="drawer-section-label">CCS revocation</div>
        <div class="drawer-section-body" style="color:var(--red);">CCS revoked by Education Authority — live credit-direct flag.</div>
      </div>` : ""}
      <div class="drawer-section">
        <div class="drawer-section-label">Methodology</div>
        <div class="drawer-section-body">${htmlEscape(data.methodology || "")}</div>
      </div>
    `;
  } else if (topic === "vacancy") {
    const rows = data.by_age_band || [];
    html += `
      <div class="drawer-section">
        <div class="drawer-section-label">Latest snapshot</div>
        <div class="drawer-section-body">${htmlEscape(data.latest_observed_at || "—")}</div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Per-age-band posture</div>
        <table class="drawer-table">
          <thead><tr><th>Age band</th><th>Status</th><th>Observed at</th></tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td>${htmlEscape(r.age_band || "—")}</td>
              <td>${htmlEscape(r.vacancy_status || "—")}</td>
              <td>${htmlEscape(r.observed_at || "—")}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Methodology</div>
        <div class="drawer-section-body">${htmlEscape(data.methodology || "")}</div>
      </div>
    `;
  } else if (topic === "operations") {
    const days = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
    const hbd = data.hours_by_day || {};
    html += `
      <div class="drawer-section">
        <div class="drawer-section-label">Operational status</div>
        <div class="drawer-section-body">
          <p>Snapshot date: ${htmlEscape(data.snapshot_date || "—")}</p>
          <p>Closed: ${data.is_closed === true ? "Yes" : data.is_closed === false ? "No" : "—"}</p>
          <p>Temporarily closed: ${data.temporarily_closed === true ? "Yes" : data.temporarily_closed === false ? "No" : "—"}</p>
          <p>CCS data received: ${data.ccs_data_received === true ? "Yes" : data.ccs_data_received === false ? "No" : "—"}</p>
        </div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Operating hours</div>
        <div class="drawer-hours-grid">
          ${days.map(d => {
            const o = hbd[d]?.open;
            const c = hbd[d]?.close;
            const display = (o && c) ? `${htmlEscape(o)}–${htmlEscape(c)}` : "Closed";
            return `<div class="day">${d.slice(0,1).toUpperCase()+d.slice(1)}</div><div class="hr">${display}</div>`;
          }).join('')}
        </div>
      </div>
      ${(data.website_url || data.phone || data.email) ? `
      <div class="drawer-section">
        <div class="drawer-section-label">Contact</div>
        <div class="drawer-section-body">
          ${data.website_url ? `<p>Website: <a href="${htmlEscape(data.website_url)}" target="_blank" rel="noopener">${htmlEscape(data.website_url)}</a></p>` : ""}
          ${data.phone ? `<p>Phone: ${htmlEscape(data.phone)}</p>` : ""}
          ${data.email ? `<p>Email: <a href="mailto:${htmlEscape(data.email)}">${htmlEscape(data.email)}</a></p>` : ""}
        </div>
      </div>` : ""}
      <div class="drawer-section">
        <div class="drawer-section-label">Methodology</div>
        <div class="drawer-section-body">${htmlEscape(data.methodology || "")}</div>
      </div>
    `;
  } else {
    html = `<div class="state-msg">Drawer topic '${htmlEscape(topic)}' renderer not yet implemented.</div>`;
  }

  return {title, subtitle, html};
}

function renderMetricDrawer(metric, centre) {
  // Schools-in-catchment metrics route to the rich-content schools drawer
  // (Bundle 2 main item 2026-05-12) — per-school names + sector + type +
  // enrolments + ICSEA from acara_schools row-level ingest. Same payload
  // used by direct drawerKey 'schools_in_catchment'.
  if (metric === "sa2_school_count_total" || metric === "sa2_school_enrolment_total") {
    return renderDrawerContent("schools_in_catchment", centre);
  }
  // First check if drawer payload has a special metric:* drawer (e.g. top-N preview)
  const special = (centre.drawer || {})[`metric:${metric}`];
  if (special) {
    const rows = special.rows || [];
    const isCob = !!(rows[0] && rows[0].country);
    const html = `
      <div class="drawer-section">
        <div class="drawer-section-label">${htmlEscape(special.title || "Detail")}</div>
        <table class="drawer-table">
          <thead><tr><th>Rank</th><th>${isCob ? "Country" : "Language"}</th><th>Count</th><th>Share</th></tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td>${r.rank}</td>
              <td>${htmlEscape(r.country || r.language || "—")}</td>
              <td>${fmtN(r.count)}</td>
              <td>${fmtPct(r.share_pct, 1)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-label">Methodology</div>
        <div class="drawer-section-body">${htmlEscape(special.methodology || "")}</div>
      </div>
    `;
    return {title: special.title || metric, subtitle: "Census detail", html};
  }

  // Generic fallback: lookup in position cards
  const position = centre.position || {};
  let entry = null;
  for (const cardKey of Object.keys(position)) {
    if (position[cardKey] && position[cardKey][metric]) {
      entry = position[cardKey][metric];
      break;
    }
  }
  if (!entry) {
    return {title: metric, subtitle: "", html: `<div class="state-msg">No detail available for ${htmlEscape(metric)}.</div>`};
  }
  const html = `
    <div class="drawer-section">
      <div class="drawer-section-label">Current value</div>
      <div class="drawer-section-body">
        <p>${fmtValue(entry.raw_value, entry.value_format)} <span style="color:var(--text-mute);">${htmlEscape(entry.period_label || "")}</span></p>
      </div>
    </div>
    ${entry.intent_copy ? `
    <div class="drawer-section">
      <div class="drawer-section-label">Why it matters</div>
      <div class="drawer-section-body"><p>${htmlEscape(entry.intent_copy)}</p></div>
    </div>` : ""}
    ${entry.about_data ? `
    <div class="drawer-section">
      <div class="drawer-section-label">How it's computed</div>
      <div class="drawer-section-body">${entry.about_data.split("\\n\\n").map(p => `<p>${htmlEscape(p)}</p>`).join('')}</div>
    </div>` : ""}
    ${entry.cohort_def ? `
    <div class="drawer-section">
      <div class="drawer-section-label">Peer cohort</div>
      <div class="drawer-section-body">
        <p>Decile ${entry.decile} · band ${htmlEscape(entry.band || "—")} · cohort n=${entry.cohort_n}</p>
        <p style="color:var(--text-mute);font-size:12px;">${htmlEscape(entry.cohort_label || entry.cohort_def)}</p>
      </div>
    </div>` : ""}
    ${entry.industry_band_label ? `
    <div class="drawer-section">
      <div class="drawer-section-label">Industry threshold band</div>
      <div class="drawer-section-body"><p><strong>${htmlEscape(entry.industry_band_label)}</strong> — ${htmlEscape(entry.industry_band_note || "")}</p></div>
    </div>` : ""}
    ${entry.calibrated_rate != null ? `
    <div class="drawer-section">
      <div class="drawer-section-label">Calibration</div>
      <div class="drawer-section-body"><p>calibrated_rate = ${entry.calibrated_rate} — ${htmlEscape(entry.rule_text || "")}</p></div>
    </div>` : ""}
    ${entry.band_copy && entry.band ? `
    <div class="drawer-section">
      <div class="drawer-section-label">Commentary</div>
      <div class="drawer-section-body"><p>${htmlEscape(entry.band_copy[entry.band] || "")}</p></div>
    </div>` : ""}
    <div class="drawer-section">
      <div class="drawer-section-label">Source</div>
      <div class="drawer-section-body" style="font-size:12px;color:var(--text-mute);">${htmlEscape(entry.source || "—")}</div>
    </div>
  `;
  return {title: entry.display || metric, subtitle: "Layer 5 metric", html};
}

// Drawer event handlers
document.getElementById("drawer-close").addEventListener("click", closeDrawer);
document.getElementById("drawer-overlay").addEventListener("click", closeDrawer);
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("drawer").classList.contains("drawer-open")) {
    closeDrawer();
  }
});

// ── Main render ─────────────────────────────────────────────────────
function render(centre) {
  _CENTRE = centre;
  const breadcrumb = document.getElementById("breadcrumb");
  const grpId = centre.header?.parent_group?.group_id;
  const grpName = centre.header?.parent_group?.name || "Operator";
  if (grpId) {
    breadcrumb.innerHTML = `<a href="operator.html?id=${grpId}">${htmlEscape(grpName)}</a> › ${htmlEscape(centre.header?.service_name || "Centre")}`;
  } else {
    breadcrumb.textContent = centre.header?.service_name || "Centre";
  }

  const main = document.getElementById("main");
  // L1+L2 merge reverted 2026-05-12 per Patrick. Intelligence panel
  // returns to its full-width position with sub-metric depth restored;
  // renderL2Sidebar retired (kept defined for backward compat).
  main.innerHTML = `
    ${renderL1Header(centre)}
    ${renderL15CompetitivePositioning(centre)}
    ${renderMethodologyLegend()}
    ${renderL2Executive(centre)}
    ${renderL3Charts(centre)}
    ${renderL5Matrix(centre)}
    ${renderL4Accordion(centre)}
    ${renderCarryover(centre)}
  `;

  // Instantiate Chart.js canvases (must happen after innerHTML set)
  _flushPendingCharts();

  // Open drawer if URL fragment present
  if (location.hash && (location.hash.startsWith("#dec83:") || location.hash.startsWith("#metric:"))) {
    setTimeout(() => openDrawer(location.hash.slice(1)), 50);
  }
}

async function load() {
  if (!SERVICE_ID) {
    document.getElementById("main").innerHTML = `
      <div class="state-msg error">No service ID. Add <code>?id=N</code> to the URL.</div>
    `;
    return;
  }
  try {
    const res = await fetch(`${API}/centre/${SERVICE_ID}`);
    if (!res.ok) {
      document.getElementById("main").innerHTML = `
        <div class="state-msg error">HTTP ${res.status} loading centre.</div>
      `;
      return;
    }
    const data = await res.json();
    if (!data.ok) {
      document.getElementById("main").innerHTML = `
        <div class="state-msg error">${htmlEscape(data.msg || "Unknown error")}</div>
      `;
      return;
    }
    if (data.centre.schema_version !== "centre_payload_v7") {
      document.getElementById("main").innerHTML = `
        <div class="state-msg error">Schema version mismatch: expected centre_payload_v7, got ${htmlEscape(data.centre.schema_version || "(none)")}.</div>
      `;
      return;
    }
    render(data.centre);
  } catch (err) {
    document.getElementById("main").innerHTML = `
      <div class="state-msg error">${htmlEscape(String(err))}</div>
    `;
  }
}
load();
</script>
