<!DOCTYPE html>
<!-- centre_v2.html v0.1 (2026-05-12) — DEC-84 parallel renderer (build step 2). Initial scope: Layer 1 header + Layer 2 executive interpretation + Layer 5 institutional signal matrix + Layer 6 detail side-drawer infrastructure. Layer 3 primary historical trends + Layer 4 secondary historical trends accordion shipped as placeholder stubs in this revision; full chart wiring lands next session via Chart.js helpers cloned from centre.html v3.31. Consumes payload schema v7 (centre_payload_v7) per centre_page.py v24. CSS variables identical to centre.html v3.31 for visual parity. Drawer interaction: click anywhere on matrix row OR `›` icon → drawer opens; ESC or click outside closes; URL fragment #drawer:{key} shareable. Single drawer at a time. Self-contained file per DEC-11 additive-overlay default — no cross-imports with centre.html so v1/v2 rollback is independent. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Novara Intelligence — Centre v2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* CSS variables mirror centre.html v3.31 for visual parity. New classes
     added below for matrix rows + side drawer + executive tiles + flag bar. */
  :root {
    --bg: #0f1419;
    --panel: #1a1f26;
    --panel-2: #232933;
    --panel-3: #2a313c;
    --border: #2d343f;
    --text: #e6e8eb;
    --text-dim: #9aa4b1;
    --text-mute: #6b7684;
    --accent: #4a9eff;
    --accent-bg: #15273f;
    --green: #4ade80;
    --green-bg: #14301e;
    --amber: #fbbf24;
    --amber-bg: #2f2310;
    --red: #f87171;
    --red-bg: #2e1414;
    --purple: #a78bfa;
    --purple-bg: #1f1a2e;
    --grey: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* App header */
  header.app {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px;
  }
  header.app h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header.app .breadcrumb { color: var(--text-mute); font-size: 13px; }
  header.app .breadcrumb a { color: var(--text-dim); }
  header.app .breadcrumb a:hover { color: var(--accent); }
  header.app .right { margin-left: auto; display: flex; gap: 12px; font-size: 13px; }
  header.app .v2-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: var(--accent-bg); color: var(--accent);
    border: 1px solid var(--accent);
  }
  body.embed header.app { display: none; }

  main {
    padding: 18px 24px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }
  body.embed main { padding: 8px 16px 28px; }

  /* States */
  .state-msg {
    text-align: center; padding: 60px 20px;
    color: var(--text-mute); font-size: 14px;
  }
  .state-msg.error {
    color: var(--red); background: var(--red-bg);
    border: 1px solid #5c2626; border-radius: 8px;
    padding: 24px; margin: 40px 0;
  }

  /* ────────────────────────────────────────────────────────────────
     METHODOLOGY LEGEND BAR (top of page) — sets analytical tone
     ──────────────────────────────────────────────────────────────── */
  .methodology-legend {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 14px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 16px;
    font-size: 11.5px; color: var(--text-dim);
  }
  .methodology-legend .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute);
  }
  .methodology-legend .ml-tag {
    display: inline-block; font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px; margin-right: 5px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .methodology-legend .ml-tag.obs { background: var(--accent-bg); color: var(--accent); }
  .methodology-legend .ml-tag.der { background: var(--purple-bg); color: var(--purple); }
  .methodology-legend .ml-tag.com { background: var(--amber-bg); color: var(--amber); }

  /* ────────────────────────────────────────────────────────────────
     LAYER 1 — Header card
     ──────────────────────────────────────────────────────────────── */
  .l1-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 18px;
  }
  /* 2026-05-12 — Layer 1 + Layer 2 merge per Patrick queue #3. Identity
     LEFT, intelligence sidebar RIGHT. Below 1100px, intelligence drops
     under identity (single column stack) so the sidebar doesn't crowd
     small screens. */
  .l1-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr);
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 1100px) {
    .l1-grid { grid-template-columns: 1fr; gap: 18px; }
  }
  .l1-identity {
    min-width: 0;
  }
  /* Layer 2 sidebar — compact intelligence read inside Layer 1. Headline
     composer at top, then 6 signal tiles in a stacked list (headline-only,
     no sub-metric stack — sub-metric depth lives in the matrix below).
     Flag bar at bottom. Click any tile to scroll to its matrix category. */
  .l2-sidebar {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 14px 12px;
  }
  .l2-sidebar-head {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .l2-sidebar-headline {
    font-size: 12.5px;
    line-height: 1.45;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 12px;
    padding: 8px 10px;
    background: rgba(155, 89, 182, 0.06);
    border-left: 2px solid var(--accent);
    border-radius: 2px;
  }
  .l2-sidebar-tiles {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .l2-sidebar-tile {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .l2-sidebar-tile:hover {
    background: var(--panel-3);
    border-color: var(--accent);
  }
  .l2-sidebar-tile-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
    font-weight: 600;
    min-width: 80px;
    flex-shrink: 0;
  }
  .l2-sidebar-tile-summary {
    font-size: 12px;
    color: var(--text);
    line-height: 1.35;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .l2-sidebar-flags {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .l2-sidebar-flags .l2-flag {
    font-size: 10px;
    padding: 2px 8px;
  }
  .l1-name {
    font-size: 26px; font-weight: 600; line-height: 1.2;
    margin: 0;
  }
  .l1-provider {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  }
  .l1-provider .label { color: var(--text-mute); font-size: 11px; }
  .l1-provider a { color: var(--accent); }
  .l1-badge {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 10px;
    border: 1px solid;
    text-transform: none;
  }
  .l1-badge.profit  { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .l1-badge.nfp     { background: var(--green-bg);  color: var(--green);  border-color: var(--green); }
  .l1-badge.gov     { background: var(--purple-bg); color: var(--purple); border-color: var(--purple); }
  .l1-badge.no-brand,
  .l1-badge.muted   { background: var(--panel-3);   color: var(--text-mute); border-color: var(--border); }

  /* Identity tiles — prominent stat cards (places / subtype / SEIFA / remoteness) */
  .l1-tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 16px;
    margin-bottom: 12px;
  }
  .l1-tile {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 110px;
  }
  .l1-tile .tile-value {
    font-size: 22px; font-weight: 600; color: var(--text);
    line-height: 1.1;
  }
  .l1-tile .tile-value-sm { font-size: 16px; }
  .l1-tile .tile-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute);
    margin-top: 4px;
  }
  .l1-tile .tile-qualifier {
    font-size: 10px; color: var(--text-mute);
    margin-left: 4px;
  }
  /* Short plain-English caption shown beneath the decile figure
     so readers see what "5/10" actually represents. Currently
     populated for the SEIFA tile (Layer 1) per doc item #1 / N3. */
  .l1-tile .tile-caption {
    font-size: 10.5px;
    color: var(--accent);
    margin-top: 4px;
    line-height: 1.3;
    font-weight: 500;
  }
  /* Explicit SA2 attribution line under the identity tiles row */
  .l1-sa2 {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    margin-bottom: 8px;
  }
  /* Peer-cohort range bar (Bundle B #1) — slim horizontal range with marker
     showing where the subject centre sits among other services in the same
     SA2. Lives inside Layer 1 places + daily-rate tiles and (later) Layer 5
     matrix rows. Width adapts to tile container. */
  .tile-range-bar {
    margin-top: 14px;
  }
  /* Range-bar legibility pass 2026-05-12 — Patrick: "make that line a
     little more legible with the other competitors along it". Track taller
     (9 → 12), peer dots larger + brighter so distribution shape reads,
     marker slightly larger, captions tightened. */
  .tile-range-track {
    position: relative;
    height: 9px;
    background: linear-gradient(
      to right,
      rgba(155, 89, 182, 0.20) 0%,
      rgba(155, 89, 182, 0.42) 25%,
      rgba(155, 89, 182, 0.42) 75%,
      rgba(155, 89, 182, 0.20) 100%
    );
    border-radius: 3px;
  }
  .tile-range-track .tick {
    position: absolute;
    top: -1px;
    width: 1px;
    height: 11px;
    background: rgba(220, 200, 240, 0.55);
  }
  /* Competitor dots — one filled circle per service in the cohort, raised
     above the track so its outline reads clearly. Slightly larger + lighter
     fill than the previous pass for unambiguous distribution shape. */
  .tile-range-track .peer-dot {
    position: absolute;
    top: 0.5px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(220, 210, 240, 0.85);
    border: 1px solid rgba(40, 30, 60, 0.55);
    transform: translateX(-50%);
    pointer-events: none;
    box-sizing: border-box;
  }
  .tile-range-marker {
    position: absolute;
    top: -3px;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--panel-2);
    transform: translateX(-50%);
    cursor: default;
    box-shadow: 0 0 0 1px rgba(155, 89, 182, 0.55);
    z-index: 3;
  }
  .tile-range-meta {
    font-size: 9.5px;
    color: var(--text-mute);
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    font-variant-numeric: tabular-nums;
  }
  .tile-range-caption {
    font-size: 9.5px;
    color: var(--text-mute);
    margin-top: 2px;
    text-align: center;
  }
  /* Layer 1 tile interpretive caption — combines size + price positioning
     into a soft inferential read (e.g., "Smaller + cheaper · scale-budget
     positioning"). Subtle so the bar above stays the dominant signal. */
  .tile-inference {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.35;
    font-style: italic;
  }
  /* Placeholder daily-rate tile state (centre outside DEC-83 pilot SA2).
     Conveys "pending national scale-up" without orphaning the layout. */
  .tile-placeholder-note {
    font-size: 10px;
    color: var(--text-mute);
    margin-top: 8px;
    font-style: italic;
    line-height: 1.35;
  }
  /* Layer 1.5 — Competitive positioning panel (DEC-84 amendment 2026-05-12).
     Lives between Layer 1 identity and Layer 2 intelligence. Bubble chart:
     daily fee on X-axis, NQS rating bands on Y-axis, bubble area = approved
     places, subject centre highlighted accent + larger. Dark theme uses the
     same panel palette as the rest of the page; muted institutional NQS
     colour direction per Patrick's spec. */
  .l15-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 20px;
    padding: 20px 24px 18px;
  }
  .l15-head {
    margin-bottom: 6px;
  }
  .l15-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .l15-sub {
    font-size: 11.5px;
    color: var(--text-mute);
    margin-top: 3px;
  }
  /* Methodology line sits above the chart, between title and chart canvas.
     Concise, scannable; carries the comparable-subtype caveat per Patrick
     2026-05-12: "Comparable long day care centres only (0–5 years)." */
  .l15-methodology {
    margin: 10px 0 6px;
    padding: 8px 12px;
    background: rgba(155, 89, 182, 0.04);
    border-left: 2px solid rgba(155, 89, 182, 0.40);
    border-radius: 2px;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.55;
  }
  .l15-methodology .lead {
    color: var(--text);
    font-weight: 500;
    margin-right: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 10px;
  }
  .l15-chart-wrap {
    position: relative;
    width: 100%;
    height: 320px;
    margin-top: 8px;
  }
  .l15-chart-wrap.compact { height: 220px; }
  .l15-chart-svg { width: 100%; height: 100%; display: block; }
  /* Darker band fill so bubbles stand out — Patrick 2026-05-12 refinement.
     Previous 0.06 made bubbles compete with band tints; 0.10 with darker
     baseline gives stronger contrast while keeping the muted palette. */
  .l15-band-bg { opacity: 0.10; }
  .l15-band-label {
    fill: var(--text-mute);
    font-size: 9.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 0.03em;
  }
  .l15-axis-tick {
    stroke: rgba(155, 89, 182, 0.10);
    stroke-width: 1;
  }
  .l15-axis-label {
    fill: var(--text-mute);
    font-size: 9.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-variant-numeric: tabular-nums;
  }
  .l15-axis-title {
    fill: var(--text-dim);
    font-size: 10.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .l15-bubble {
    cursor: pointer;
    transition: stroke-width 0.12s, opacity 0.12s;
  }
  .l15-bubble:hover { stroke-width: 2.5px; }
  .l15-bubble.subject {
    stroke: rgba(255, 255, 255, 0.9);
    stroke-width: 2px;
  }
  .l15-bubble.faded { opacity: 0.35; }
  .l15-ccs-line {
    stroke: rgba(180, 180, 200, 0.40);
    stroke-width: 1;
    stroke-dasharray: 3 3;
  }
  .l15-ccs-label {
    fill: var(--text-mute);
    font-size: 9.5px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-style: italic;
  }
  .l15-mkt-avg-line {
    stroke: rgba(155, 89, 182, 0.55);
    stroke-width: 1.5;
    stroke-dasharray: 5 4;
  }
  .l15-popover {
    position: absolute;
    pointer-events: none;
    background: rgba(20, 24, 33, 0.95);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 10px;
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
    z-index: 5;
    display: none;
    max-width: 260px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }
  .l15-popover.visible { display: block; }
  .l15-popover .name { font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .l15-popover .meta { color: var(--text-mute); font-size: 10.5px; }
  /* 3-column commercial-positioning commentary below the chart. Replaces
     percentile-heavy narrative with plain-English institutional read:
     Positioning (left) · Key position at a glance (middle) · Market context
     (right). Each column has a section header + 3-4 insight rows with an
     icon glyph + headline + supporting line. */
  .l15-commentary {
    display: grid;
    grid-template-columns: 1.05fr 1fr 1fr;
    gap: 18px;
    margin-top: 16px;
    padding: 16px 18px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  @media (max-width: 1100px) {
    .l15-commentary { grid-template-columns: 1fr; gap: 14px; }
  }
  .l15-comm-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .l15-comm-col + .l15-comm-col {
    border-left: 1px solid var(--border);
    padding-left: 18px;
  }
  @media (max-width: 1100px) {
    .l15-comm-col + .l15-comm-col {
      border-left: none;
      padding-left: 0;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
  }
  .l15-comm-head {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .l15-positioning-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.005em;
    line-height: 1.2;
  }
  .l15-positioning-sub {
    font-size: 11.5px;
    color: var(--text);
    opacity: 0.82;
    line-height: 1.5;
    margin-top: 4px;
  }
  .l15-comm-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 11.5px;
    line-height: 1.45;
  }
  .l15-comm-item .icon {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }
  .l15-comm-item .icon svg {
    width: 16px;
    height: 16px;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke: currentColor;
  }
  .l15-comm-item .body { flex: 1; }
  .l15-comm-item .h {
    color: var(--text);
    font-weight: 500;
    display: block;
    margin-bottom: 1px;
  }
  .l15-comm-item .d {
    color: var(--text);
    opacity: 0.72;
    font-size: 11px;
  }
  .l15-comm-item .icon.pos    { color: rgba(110, 200, 145, 0.95); }
  .l15-comm-item .icon.mid    { color: rgba(155, 175, 200, 0.90); }
  .l15-comm-item .icon.neg    { color: rgba(220, 140, 110, 0.95); }
  .l15-comm-item .icon.accent { color: var(--accent); }
  /* Positioning title heading icon — sits inline to the left of "Premium
     positioning" / equivalent. Slightly larger than body-row icons. */
  .l15-positioning-title {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .l15-positioning-title .head-icon {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    color: var(--accent);
    opacity: 0.9;
  }
  .l15-positioning-title .head-icon svg {
    width: 24px;
    height: 24px;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke: currentColor;
  }
  /* Hover comparison strip — slides in below the chart, replacing the
     commentary block when the user hovers a bubble. Same dimensions so
     no layout shift. */
  .l15-hover-strip {
    margin-top: 16px;
    padding: 12px 16px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 2px solid rgba(74, 222, 128, 0.7);
    border-radius: 6px;
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-dim);
    display: none;
  }
  .l15-hover-strip.visible { display: block; }
  .l15-hover-strip .header {
    font-weight: 600;
    color: var(--text);
    margin-right: 6px;
  }
  .l15-hover-strip .delta-pos { color: rgba(110, 200, 145, 0.95); font-weight: 500; }
  .l15-hover-strip .delta-neg { color: rgba(220, 140, 110, 0.9); font-weight: 500; }
  .l15-hover-strip .delta-flat { color: var(--text-mute); }
  .l15-hover-strip .inference {
    margin-top: 4px;
    color: var(--text-mute);
    font-style: italic;
    font-size: 11px;
  }
  /* Service offerings tile (Patrick 2026-05-12) — ACECQA per-service-type
     breakdown. Spans 2 grid columns; sits on a second row of L1 tiles
     because 6 Yes/No rows don't fit in a single-column tile. */
  .l1-tile.span-2 {
    grid-column: span 2;
  }
  .l1-tile .offerings-grid {
    margin-top: 8px;
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 12px;
    row-gap: 4px;
    font-size: 11px;
    line-height: 1.35;
  }
  .l1-tile .offerings-grid .name { color: var(--text-mute); }
  .l1-tile .offerings-grid .val  {
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .l1-tile .offerings-grid .val.yes { color: rgba(110, 200, 145, 0.95); }
  .l1-tile .offerings-grid .val.no  { color: var(--text-mute); }
  .l1-tile .offerings-grid .val.na  { color: var(--text-mute); font-style: italic; }
  .l1-tile .offerings-source {
    margin-top: 8px;
    font-size: 9.5px;
    color: var(--text-mute);
    font-style: italic;
  }
  /* NQS rating tile (Layer 1, Patrick 2026-05-12 move-up). Pill-styled
     value carrying the rating colour, then issue date, then cadence pill.
     Reuses .nqs-pill colour palette from the carryover NQS card to keep
     the rating colour-coding consistent across the page. */
  .l1-tile .tile-value-pill {
    display: inline-block;
    font-size: 13.5px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
    line-height: 1.3;
  }
  .l1-tile .tile-nqs-cadence {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 5px;
    font-weight: 500;
    line-height: 1.3;
  }
  .l1-tile .tile-nqs-cadence.green { background: var(--green-bg); color: var(--green); border: 1px solid #1f4632; }
  .l1-tile .tile-nqs-cadence.amber { background: var(--amber-bg); color: var(--amber); border: 1px solid #4a3818; }
  .l1-tile .tile-nqs-cadence.red   { background: var(--red-bg);   color: var(--red);   border: 1px solid #5c2626; }
  .l1-tile .tile-nqs-cadence.grey  { background: var(--panel-3);  color: var(--text-mute); border: 1px solid var(--border); }
  /* Kinder tile dual-signal display — ACECQA flag (OBS) + name-match (DER).
     Two mini-rows show each signal independently so reader sees agreement
     or divergence at a glance. */
  .kinder-signals {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 6px;
  }
  .kinder-signal {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10.5px;
    color: var(--text-mute);
    line-height: 1.2;
  }
  .kinder-signal .glyph {
    width: 12px;
    text-align: center;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .kinder-signal.positive .glyph { color: rgba(74, 222, 128, 0.9); }
  .kinder-signal.positive .name  { color: var(--text); }
  .kinder-signal.negative .glyph { color: rgba(155, 155, 155, 0.45); }
  .kinder-signal .src {
    margin-left: auto;
    font-size: 9px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .l1-sa2 .label {
    color: var(--text-mute);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.05em;
    margin-right: 6px;
  }
  .l1-sa2 b { color: var(--text); font-weight: 500; }

  /* Tag chips strip (acecqa SAN / abr legal name / google) */
  .l1-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  .l1-tag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 3px 9px; border-radius: 4px;
    background: var(--panel-2); color: var(--text-dim);
    border: 1px solid var(--border);
    text-decoration: none;
    cursor: pointer;
  }
  .l1-tag:hover { background: var(--panel-3); color: var(--text); border-color: var(--accent); }
  .l1-tag .key { color: var(--text-mute); font-size: 10px; }
  .l1-tag .val { color: var(--text); }
  .l1-meta-row {
    display: flex; flex-wrap: wrap; gap: 10px 18px;
    margin-top: 14px; font-size: 13px;
    color: var(--text-dim);
  }
  .l1-meta-row .item { display: inline-flex; align-items: center; gap: 6px; }
  .l1-meta-row .label { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .l1-meta-row .val { color: var(--text); }
  .l1-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--purple-bg); color: var(--purple);
    border: 1px solid var(--purple);
    border-radius: 12px; padding: 3px 10px; font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  .l1-chip:hover { background: #2a2440; }
  .l1-chip-mini { font-size: 10px; opacity: 0.7; }
  .l1-hours {
    margin-top: 12px; font-size: 13px; color: var(--text-dim);
    display: flex; gap: 8px; align-items: baseline;
  }
  .l1-hours .label { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  .l1-contact {
    margin-top: 8px; font-size: 13px; color: var(--text-mute);
    display: flex; flex-wrap: wrap; gap: 6px 16px;
  }
  .l1-contact a { color: var(--accent); }
  .l1-contact .sep { color: var(--text-mute); }

  /* ────────────────────────────────────────────────────────────────
     LAYER 2 — Executive interpretation
     ──────────────────────────────────────────────────────────────── */
  .l2-exec {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
  }
  .l2-headline {
    font-size: 16px; font-weight: 500;
    color: var(--text); margin: 0 0 14px 0;
    line-height: 1.4;
  }
  .l2-headline .label { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 8px; }
  .l2-tiles {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .l2-tile {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .l2-tile:hover {
    background: var(--panel-3);
    border-color: var(--accent);
  }
  .l2-tile-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-mute); margin-bottom: 4px;
  }
  .l2-tile-summary {
    font-size: 13px; color: var(--text);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Sub-metric depth (Layer 2 intelligence bar upgrade 2026-05-13) — 2-3
     mini-rows under the headline summary inside each tile. Each row:
     name + value + small band badge. Reader sees the composition of the
     signal at a glance, then clicks through to matrix section for the
     full row. */
  .l2-tile-submetrics {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid rgba(255, 255, 255, 0.04);
    padding-top: 6px;
  }
  .l2-submetric {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    line-height: 1.2;
    color: var(--text-dim);
  }
  .l2-submetric .name {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .l2-submetric .value {
    font-variant-numeric: tabular-nums;
    color: var(--text);
    font-weight: 500;
  }
  .l2-submetric .band-pill {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 1px 5px;
    border-radius: 2px;
    background: rgba(155, 89, 182, 0.18);
    color: rgba(220, 200, 240, 0.9);
    white-space: nowrap;
  }
  .l2-submetric .band-pill.high     { background: rgba(74, 222, 128, 0.18); color: rgba(180, 240, 200, 0.95); }
  .l2-submetric .band-pill.mid      { background: rgba(180, 180, 200, 0.16); color: rgba(220, 220, 230, 0.9); }
  .l2-submetric .band-pill.low      { background: rgba(248, 113, 113, 0.18); color: rgba(255, 200, 200, 0.95); }
  .l2-submetric .band-pill.no-rating { background: rgba(180, 180, 200, 0.10); color: var(--text-mute); }
  .l2-flags {
    display: flex; flex-wrap: wrap; gap: 8px;
    align-items: center;
  }
  .l2-flag {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 16px; padding: 4px 12px;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    border: 1px solid;
  }
  .l2-flag.red {
    background: var(--red-bg); color: var(--red); border-color: var(--red);
  }
  .l2-flag.amber {
    background: var(--amber-bg); color: var(--amber); border-color: var(--amber);
  }
  .l2-flag.info {
    background: var(--accent-bg); color: var(--accent); border-color: var(--accent);
  }
  .l2-flag-spillover {
    background: var(--panel-2); color: var(--text-mute);
    border: 1px dashed var(--border);
    cursor: pointer;
  }
  .l2-flag-spillover:hover { background: var(--panel-3); color: var(--text-dim); }

  /* ────────────────────────────────────────────────────────────────
     LAYER 3 — Primary historical trends (7 charts)
     LAYER 4 — Secondary historical trends accordion
     ──────────────────────────────────────────────────────────────── */
  .l3-block, .l4-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
  }
  .l3-block h2, .l4-block h2 {
    font-size: 16px; font-weight: 500;
    color: var(--text); margin: 0 0 4px 0;
  }
  .l3-block .subtitle, .l4-block .subtitle {
    color: var(--text-mute); font-size: 12px;
    margin: 0 0 14px 0;
  }
  .traj-range-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    background: var(--panel-2);
    position: sticky;
    top: 60px;  /* sit just under app header */
    z-index: 9;
    backdrop-filter: blur(6px);
  }
  .traj-range-bar .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-mute);
  }
  .traj-range-bar .btns {
    display: flex; gap: 4px;
  }
  .range-btn {
    background: var(--panel-2); color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px;
    font-size: 11px; cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
  .range-btn:hover {
    background: var(--panel-3); color: var(--text);
  }
  .range-btn.active {
    background: var(--accent-bg); color: var(--accent);
    border-color: var(--accent);
  }
  .chart-panel {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .chart-panel-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .chart-panel-pair .chart-panel { margin-bottom: 0; }
  .chart-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; margin-bottom: 8px;
  }
  .chart-title {
    font-size: 13px; font-weight: 500;
    color: var(--text);
  }
  .chart-title .units {
    color: var(--text-mute); font-weight: 400;
    font-size: 11px; margin-left: 6px;
  }
  .chart-trend {
    font-size: 11px; color: var(--text-mute);
  }
  .chart-trend.positive { color: var(--green); }
  .chart-trend.negative { color: var(--red); }
  .chart-readout {
    min-height: 22px;
    padding: 4px 8px;
    margin-bottom: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
  }
  .chart-readout .placeholder {
    color: var(--text-mute); font-style: italic; font-size: 11.5px;
  }
  .chart-canvas-wrap {
    position: relative;
    height: 180px;
    margin: 4px 0;
  }
  .chart-panel.compact .chart-canvas-wrap { height: 130px; }
  .chart-decile-caption {
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--panel);
    border-radius: 4px;
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.45;
  }
  .chart-decile-caption b { color: var(--text); }

  /* ────────────────────────────────────────────────────────────────
     FULL ROW REGISTER — v1-cloned styling (centre.html v3.31).
     Match font sizes, padding, weights, opacities exactly per
     `feedback_per_row_analytical_depth.md` — v0.x's heavier register
     read as too prominent.
     ──────────────────────────────────────────────────────────────── */
  .full-register {
    margin-top: 8px;
  }
  .fr-cohort-caption {
    text-align: center;
    font-size: 11px; color: var(--text-mute);
    font-style: italic;
    line-height: 1.45;
    margin-top: 6px;
  }
  .fr-cohort-meta {
    text-align: center;
    font-size: 9.5px; color: var(--text-mute);
    letter-spacing: 0.04em;
    margin-top: 4px;
    margin-bottom: 8px;
  }
  /* Decile strip 1-10 (v1 colour grammar: per-decile blue tones 6/13/20%,
     accent border + inset shadow on active, structural gap before 4 & 7) */
  .fr-decile-strip {
    display: flex;
    gap: 2px;
    margin-top: 8px;
  }
  .fr-decile-cell {
    flex: 1 1 0;
    min-width: 18px;
    height: 24px;
    border: 1px solid var(--border);
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--text-mute);
    font-variant-numeric: tabular-nums;
  }
  .fr-decile-cell.tier-low  { background: rgba(74,158,255,0.06); }
  .fr-decile-cell.tier-mid  { background: rgba(74,158,255,0.13); }
  .fr-decile-cell.tier-high { background: rgba(74,158,255,0.20); }
  .fr-decile-cell.active {
    border: 2px solid var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent);
    color: var(--text);
    font-weight: 700;
    background: rgba(74,158,255,0.32);
  }
  .fr-decile-cell.gap-before { margin-left: 6px; }
  /* Band chips — pill-shaped, compact (v1) */
  .fr-band-chips {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 8px;
  }
  .fr-band-chip {
    font-size: 11.5px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 99px;
    color: var(--text-dim);
    font-weight: 400;
    display: inline-flex; align-items: center;
  }
  .fr-band-chip .key {
    color: var(--text-mute);
    font-size: 9.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    margin-right: 4px;
  }
  .fr-band-chip.active {
    color: var(--text);
    border-color: var(--accent);
    font-weight: 600;
  }
  /* Industry band — subtle row, left-bordered, small pill (v1) */
  .fr-industry {
    margin-top: 8px;
    padding: 6px 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 4px;
    border-left: 2px solid var(--border);
    font-size: 11.5px;
  }
  .fr-industry .row {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
    color: var(--text-mute);
  }
  .fr-industry .label {
    font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 10px;
  }
  .fr-industry .pill {
    font-size: 10.5px; font-weight: 600;
    padding: 1px 7px; border-radius: 4px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .fr-industry .pill.caution {
    background: rgba(224,92,58,0.10);
    color: var(--amber);
    border-color: rgba(224,92,58,0.25);
  }
  .fr-industry .pill.positive {
    background: rgba(122,197,122,0.10);
    color: var(--green);
    border-color: rgba(122,197,122,0.25);
  }
  .fr-industry .pill.neutral {
    background: rgba(180,200,230,0.06);
    color: var(--text-dim);
    border-color: rgba(180,200,230,0.15);
  }
  .fr-industry .note {
    color: var(--text-mute); font-style: italic;
    font-size: 11px;
    margin-top: 3px;
  }
  /* intent_copy — single italic muted line (v1) */
  .fr-intent {
    margin-top: 8px;
    font-size: 11.5px;
    font-style: italic;
    color: var(--text-mute);
    line-height: 1.5;
  }
  /* ABOUT panel — left-border accent only (no panel-wide fill); smaller
     font per Patrick "fill naturally to the text" feedback 2026-05-12 */
  .fr-about {
    margin-top: 10px;
    padding: 4px 0 4px 10px;
    border-left: 2px solid var(--border);
    font-size: 11.5px;
    color: var(--text-mute);
    line-height: 1.5;
  }
  .fr-about .label {
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 9.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .fr-about > div + div { margin-top: 5px; }
  /* Badges row at bottom of full register */
  .fr-badges {
    display: flex; gap: 6px;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .fr-badge {
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.04em;
    cursor: help;
  }
  .fr-badge.obs { background: var(--accent-bg); color: var(--accent); }
  .fr-badge.der { background: var(--purple-bg); color: var(--purple); }
  .fr-badge.com { background: var(--amber-bg); color: var(--amber); }
  /* Source attribution line (visible per Patrick: "the source should be placed there as well") */
  .fr-source {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.4;
  }
  .fr-source .label {
    text-transform: uppercase; letter-spacing: 0.05em;
    font-size: 9.5px;
    margin-right: 6px;
    color: var(--text-mute);
  }
  /* Headline line: "Decile X · band · n=NNN" v1 row above histogram */
  .fr-headline {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text);
  }
  .fr-headline .muted { color: var(--text-mute); }
  .fr-headline .dim   { color: var(--text-dim); }
  .fr-headline .num   { color: var(--text-mute); font-size: 11.5px; }
  .fr-stamp {
    color: var(--text-mute); font-size: 11px;
    margin-bottom: 6px;
  }
  .fr-delta {
    display: inline-block; font-size: 10.5px;
    padding: 1px 7px; border-radius: 8px;
    background: var(--panel-3); color: var(--text-dim);
    border: 1px solid var(--border);
    margin-left: 6px;
  }
  .fr-delta.positive { color: var(--green); border-color: var(--green); }
  .fr-delta.negative { color: var(--red); border-color: var(--red); }
  .fr-topn {
    background: var(--panel);
    border-left: 2px solid var(--accent);
    padding: 6px 10px;
    margin: 4px 0 8px;
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .fr-topn .label { color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 6px; }

  /* Inline-row-click expanded panel below matrix row */
  .l5-row-expanded {
    grid-column: 1 / -1;
    background: var(--panel-2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 14px 18px;
    margin: 4px 0 10px;
  }
  .l5-row-expanded .fr-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px; gap: 10px;
  }
  .l5-row-expanded .fr-head .title {
    font-size: 14px; font-weight: 500; color: var(--text);
  }
  .l5-row-expanded .fr-head .value {
    font-size: 14px; font-weight: 500; color: var(--text);
    white-space: nowrap;
  }
  .l5-row-expanded .fr-head .period {
    color: var(--text-mute); font-size: 11px; margin-left: 6px;
  }
  .chart-events-legend {
    display: flex; gap: 14px;
    margin-top: 6px;
    font-size: 10.5px; color: var(--text-mute);
  }
  .chart-events-legend .swatch {
    display: inline-block; width: 10px; height: 2px;
    vertical-align: middle; margin-right: 4px;
    border-top: 1.5px dashed;
  }
  .chart-events-legend .swatch.add { border-color: var(--green); }
  .chart-events-legend .swatch.rem { border-color: var(--red); }
  .chart-events-legend .swatch.churn { border-color: var(--text-mute); }
  .chart-canvas-wrap canvas {
    width: 100% !important;
    height: 100% !important;
  }
  .chart-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-top: 6px;
    font-size: 11px; color: var(--text-mute);
  }
  .chart-cohort-strip {
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px;
  }
  .chart-histogram {
    flex: 1 1 auto;
    height: 36px;
    display: grid;
    grid-template-columns: repeat(20, 1fr);
    gap: 1px;
    align-items: end;
  }
  .chart-histogram .bar {
    background: var(--panel-3);
    border-radius: 1px 1px 0 0;
  }
  .chart-histogram .bar.active {
    background: var(--accent);
  }
  .chart-decile {
    display: inline-grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 1px;
    width: 100px; height: 8px;
    flex-shrink: 0;
  }
  .chart-decile .cell { background: var(--panel-3); border-radius: 1px; }
  .chart-decile .cell.active { background: var(--accent); }
  .chart-decile .cell.active.low  { background: var(--red); }
  .chart-decile .cell.active.mid  { background: var(--amber); }
  .chart-decile .cell.active.high { background: var(--green); }
  .l4-accordion summary {
    cursor: pointer;
    color: var(--text); font-weight: 500; font-size: 14px;
    padding: 6px 0; user-select: none;
    list-style: none;
  }
  .l4-accordion summary::before {
    content: "▸"; margin-right: 8px;
    color: var(--text-mute);
    transition: transform 0.15s;
    display: inline-block;
  }
  .l4-accordion[open] summary::before { transform: rotate(90deg); }
  .l4-accordion summary .note {
    color: var(--text-mute); font-size: 11px; font-weight: 400;
    margin-left: 10px;
  }
  .l4-group { margin-top: 14px; }
  .l4-group-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-mute); margin-bottom: 8px;
  }
  .pending-chart {
    background: var(--panel-2);
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 28px;
    text-align: center;
    color: var(--text-mute);
    font-size: 12px;
    font-style: italic;
  }

  /* ────────────────────────────────────────────────────────────────
     LAYER 5 — Signal Matrix
     ──────────────────────────────────────────────────────────────── */
  .l5-matrix {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
  }
  .l5-matrix h2 {
    font-size: 16px; font-weight: 500;
    color: var(--text); margin: 0 0 4px 0;
  }
  .l5-matrix-sub {
    color: var(--text-mute); font-size: 12px;
    margin: 0 0 14px 0;
  }
  .l5-cat-bar {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 6px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .l5-cat-chip {
    font-size: 11px; padding: 3px 10px; border-radius: 10px;
    background: var(--panel-2); color: var(--text-dim);
    cursor: pointer; border: 1px solid var(--border);
    text-transform: capitalize;
  }
  .l5-cat-chip:hover { background: var(--panel-3); color: var(--text); border-color: var(--accent); }
  .l5-cat-section {
    margin-top: 16px;
  }
  .l5-cat-header {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute);
    padding: 6px 8px;
    background: var(--panel-2);
    border-radius: 4px;
    margin-bottom: 4px;
  }
  /* Transitional/forward-looking note for categories whose content will
     move when downstream surfaces (e.g., Child Safety & Wellbeing) ship */
  .l5-cat-note {
    font-size: 11px;
    color: var(--amber);
    background: var(--amber-bg);
    border-left: 3px solid var(--amber);
    padding: 6px 10px;
    margin-bottom: 6px;
    line-height: 1.4;
    font-style: italic;
  }
  /* Analytical-lens intro for each category — soft prose breaking up the
     tabular matrix density. Visual softness pass 2026-05-12. */
  .l5-cat-intro {
    font-size: 11.5px;
    color: var(--text-mute);
    padding: 4px 8px 8px;
    line-height: 1.5;
    font-style: italic;
  }
  .l5-row {
    display: grid;
    grid-template-columns:
      90px              /* category chip placeholder kept inside header — column reused for badges */
      minmax(200px, 2fr)  /* metric name + badges */
      120px             /* current value + period */
      90px              /* decile + cohort_n */
      130px             /* signal label */
      minmax(280px, 5fr)  /* commentary — widened after sparkline column retired (Turn 1) */
      32px;             /* drawer trigger */
    gap: 10px;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    transition: background 0.08s;
  }
  .l5-row:hover { background: var(--panel-2); }
  .l5-row:last-child { border-bottom: none; }
  .l5-badge {
    display: inline-block;
    font-size: 9px; padding: 1px 4px;
    border-radius: 3px; margin-right: 3px;
    background: var(--panel-3); color: var(--text-mute);
    text-transform: uppercase; letter-spacing: 0.04em;
    font-weight: 600;
    cursor: help;
  }
  /* Per-tag colour coding mirrors the L3 full-register badges so the
     classification is legible at scan-level in the matrix. */
  .l5-badge.l5-badge-obs { background: var(--accent-bg); color: var(--accent); }
  .l5-badge.l5-badge-der { background: var(--purple-bg); color: var(--purple); }
  .l5-badge.l5-badge-com { background: var(--amber-bg); color: var(--amber); }
  .l5-metric-name { font-size: 13px; color: var(--text-dim); }
  .l5-metric-name .display { font-weight: 500; color: var(--text-dim); }
  .l5-metric-name .badges { margin-left: 6px; }
  .l5-value {
    font-size: 13px; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .l5-value .period {
    color: var(--text-mute); font-size: 11px; display: block;
  }
  /* Annotation chip under the period for non-trajectory rows — explicit
     "Census 3-pt" / "static snapshot" stamps so the reader doesn't expect
     a continuous trajectory where there isn't one. Patrick queue #10. */
  .l5-value .period-stamp {
    display: inline-block;
    font-size: 9.5px;
    color: rgba(180, 180, 200, 0.65);
    letter-spacing: 0.04em;
    font-style: italic;
    margin-top: 2px;
    text-transform: lowercase;
  }
  /* Trend stamp under the period — relocated workforce-trend / school-
     enrolment-trend labels (Patrick 2026-05-12). Colour-coded for direction
     where the row carries a `trend_direction` interpretation: green for
     favourable, amber for unfavourable. */
  .l5-value .trend-stamp {
    display: block;
    font-size: 10px;
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .l5-value .trend-stamp.up   { color: rgba(110, 200, 145, 0.95); }
  .l5-value .trend-stamp.down { color: rgba(220, 140, 110, 0.95); }
  .l5-value .trend-stamp.flat { color: var(--text-mute); }
  /* Workforce scope stamps — "state-level (NSW) — no SA2 peer cohort" etc.
     Italic, slightly muted, sits inside the signal column. Patrick queue #12. */
  .l5-signal.scope-stamp {
    background: transparent;
    border: 1px dashed rgba(180, 180, 200, 0.25);
    color: var(--text-mute);
    font-style: italic;
    font-size: 10.5px;
    padding: 4px 8px;
    line-height: 1.35;
  }
  .l5-decile {
    display: flex; flex-direction: column; gap: 2px;
    align-items: flex-start;
    font-size: 11px; color: var(--text-mute);
  }
  .l5-decile-strip {
    display: inline-grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 1px;
    width: 80px; height: 6px;
  }
  .l5-decile-strip .cell {
    background: var(--panel-3); border-radius: 1px;
  }
  .l5-decile-strip .cell.active {
    background: var(--accent);
  }
  .l5-decile-strip .cell.active.low { background: var(--red); }
  .l5-decile-strip .cell.active.mid { background: var(--amber); }
  .l5-decile-strip .cell.active.high { background: var(--green); }
  .l5-signal {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 12px;
    text-align: center;
    line-height: 1.3;
  }
  .l5-signal.low {
    background: var(--red-bg); color: var(--red);
    border: 1px solid #5c2626;
  }
  .l5-signal.mid {
    background: var(--amber-bg); color: var(--amber);
    border: 1px solid #5c4426;
  }
  .l5-signal.high {
    background: var(--green-bg); color: var(--green);
    border: 1px solid #2a5c3e;
  }
  .l5-signal.neutral {
    background: var(--panel-3); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .l5-signal.pending {
    background: var(--panel-2); color: var(--text-mute);
    border: 1px dashed var(--border);
    font-style: italic;
  }
  .l5-comm {
    font-size: 12px; color: var(--text-dim);
    line-height: 1.45;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .l5-comm-val {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .l5-trigger {
    color: var(--text-mute);
    font-size: 18px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: color 0.1s;
  }
  .l5-row:hover .l5-trigger { color: var(--accent); }
  /* Rich-content trigger variant — distinct icon when the drawer carries
     deeper data than plain methodology (school names list, top-N detail,
     enforcement events, conditions text, full daily-rate grid). Bundle 2
     2026-05-12 per Patrick. Slightly more prominent + accent-tinted at rest. */
  .l5-trigger.rich {
    color: var(--accent);
    opacity: 0.75;
  }
  .l5-trigger.rich:hover, .l5-row:hover .l5-trigger.rich {
    opacity: 1;
    color: var(--accent);
  }
  .l5-trigger.rich svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: middle;
  }
  /* Caption above the matrix explaining the rich-content trigger.
     One-line, soft palette so it sits as instruction not as content. */
  .l5-trigger-caption {
    margin: 0 0 12px 0;
    padding: 6px 12px;
    background: rgba(155, 89, 182, 0.04);
    border-left: 2px solid rgba(155, 89, 182, 0.35);
    border-radius: 2px;
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.5;
  }
  .l5-trigger-caption .accent-icon {
    color: var(--accent);
    display: inline-block;
    vertical-align: middle;
    margin: 0 2px;
  }
  .l5-row.expanded {
    background: var(--panel-3);
    border-left: 3px solid var(--accent);
    border-bottom: 1px solid var(--accent);
  }
  .l5-row.expanded .l5-trigger {
    color: var(--accent);
    transform: rotate(90deg);
  }
  .l5-row .l5-trigger { transition: transform 0.15s, color 0.1s; }
  .l5-row-expand {
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 18px;
    margin-bottom: 4px;
    animation: l5-expand-in 0.18s ease-out;
  }
  @keyframes l5-expand-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .l5-row-expand .chart-panel {
    margin-bottom: 0;
    background: transparent;
    border: none;
    padding: 0;
  }
  .l5-row-expand-empty {
    color: var(--text-mute);
    font-size: 12px;
    font-style: italic;
    padding: 8px 0;
  }
  .l5-row-expand-empty a {
    color: var(--accent);
    text-decoration: none;
    font-style: normal;
  }
  .l5-row-expand-empty a:hover { text-decoration: underline; }

  /* ────────────────────────────────────────────────────────────────
     CARRYOVER BLOCK — v1 operational cards (NQS / Places / Kinder /
     Catchment-meta / Tenure / QA scores / Commentary). Mirrors v1's
     soft-card visual register (rounded panels, prose interleaved,
     generous spacing) per "no information loss" principle.
     ──────────────────────────────────────────────────────────────── */
  .carryover {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .carryover-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
  }
  .carryover-section.full-width { grid-column: 1 / -1; }
  .carryover-section h3 {
    font-size: 14px; font-weight: 500;
    color: var(--text); margin: 0 0 12px 0;
    letter-spacing: 0.01em;
  }
  .carryover-section h3 .note {
    font-size: 11px; font-weight: 400;
    color: var(--text-mute);
    margin-left: 8px;
  }
  .carryover-fact {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .carryover-fact:last-child { border-bottom: none; }
  .carryover-fact .k {
    color: var(--text-dim);
    font-size: 12px;
    flex: 0 0 auto;
  }
  .carryover-fact .v {
    color: var(--text);
    font-size: 13px;
    text-align: right;
    flex: 1 1 auto;
  }
  .carryover-fact .v b { font-weight: 500; }
  .carryover-fact .v .qualifier {
    color: var(--text-mute); font-size: 11px; margin-left: 6px;
  }
  .status-pill {
    display: inline-block; padding: 2px 10px;
    border-radius: 12px; font-size: 11px; font-weight: 500;
    border: 1px solid;
  }
  .status-pill.green { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .status-pill.amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .status-pill.red   { background: var(--red-bg);   color: var(--red);   border-color: var(--red); }
  .status-pill.grey  { background: var(--panel-3);  color: var(--text-mute); border-color: var(--border); }
  .nqs-pill {
    display: inline-block; padding: 2px 10px;
    border-radius: 12px; font-size: 11px; font-weight: 500;
    background: var(--panel-3); color: var(--text);
    border: 1px solid var(--border);
  }
  .nqs-pill.exceeding { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .nqs-pill.meeting { background: #1a3043; color: #6db4f8; border-color: var(--accent); }
  .nqs-pill.working-towards { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .nqs-pill.significant { background: var(--red-bg); color: var(--red); border-color: var(--red); }
  .nqs-pill.provisional { background: var(--purple-bg); color: var(--purple); border-color: var(--purple); }
  .qa-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px 18px;
  }
  .qa-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .qa-row .qa-key {
    font-size: 10px; font-weight: 500;
    color: var(--text-mute); width: 28px;
    flex-shrink: 0;
  }
  .qa-row .qa-label {
    font-size: 12px; color: var(--text-dim);
    flex: 1 1 auto;
  }
  .qa-empty { color: var(--text-mute); font-size: 12px; font-style: italic; }
  .mini-decile {
    display: inline-grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 1px;
    width: 90px; height: 8px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .mini-decile .cell { background: var(--panel-3); border-radius: 1px; }
  .mini-decile .cell.active { background: var(--accent); }
  .com-line {
    display: flex; gap: 12px; align-items: flex-start;
    background: var(--panel);
    border-left: 3px solid var(--text-mute);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 16px;
    margin-bottom: 8px;
  }
  .com-line.severity-warn { border-left-color: var(--amber); }
  .com-line.severity-flag { border-left-color: var(--red); }
  .com-line.severity-good { border-left-color: var(--green); }
  .com-text { font-size: 13px; color: var(--text); flex: 1 1 auto; line-height: 1.5; }
  .com-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    background: var(--panel-3); color: var(--text-mute);
    text-transform: uppercase; letter-spacing: 0.04em;
    flex-shrink: 0; margin-top: 1px;
  }
  .placeholder-text {
    color: var(--text-mute); font-size: 12px;
    margin-top: 8px; padding: 8px;
    background: var(--panel-2); border-radius: 4px;
  }

  /* ────────────────────────────────────────────────────────────────
     LAYER 6 — Detail side-drawer
     ──────────────────────────────────────────────────────────────── */
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 540px; max-width: 92vw;
    background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 24px rgba(0,0,0,0.45);
    transform: translateX(100%);
    transition: transform 0.18s ease-out;
    z-index: 100;
    display: flex;
    flex-direction: column;
  }
  .drawer.drawer-open { transform: translateX(0); }
  .drawer-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.18s;
    z-index: 99;
  }
  .drawer-overlay.drawer-overlay-open {
    background: rgba(0,0,0,0.45);
    pointer-events: auto;
  }
  .drawer-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .drawer-title {
    font-size: 16px; font-weight: 500;
    color: var(--text);
    margin: 0;
  }
  .drawer-subtitle {
    color: var(--text-mute);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .drawer-close {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-mute); font-size: 22px; padding: 0 8px;
    line-height: 1;
  }
  .drawer-close:hover { color: var(--text); }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 22px;
  }
  .drawer-section {
    margin-bottom: 20px;
  }
  .drawer-section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute); margin-bottom: 6px;
  }
  .drawer-section-head {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute); margin-bottom: 8px;
    font-weight: 600;
  }
  /* Drawer list rows — used by cross-subtype care services list and
     other rich-content drawer payloads. */
  .drawer-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .drawer-list-row {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--panel-2);
    transition: background 0.12s, border-color 0.12s;
  }
  .drawer-list-row:hover {
    background: var(--panel-3);
    border-color: var(--accent);
  }
  .drawer-kv-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .drawer-kv-row:last-child { border-bottom: none; }
  .drawer-kv-row span:first-child { color: var(--text-mute); }
  .drawer-kv-row b { color: var(--text); font-variant-numeric: tabular-nums; }
  .drawer-section-body {
    font-size: 13px; color: var(--text);
    line-height: 1.6;
  }
  .drawer-section-body p { margin: 0 0 8px 0; }
  .drawer-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 6px;
  }
  .drawer-table th, .drawer-table td {
    padding: 6px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .drawer-table th {
    color: var(--text-mute);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.05em;
    background: var(--panel-2);
  }
  .drawer-table td { color: var(--text); }
  .drawer-table tr:last-child td { border-bottom: none; }
  .drawer-cond-row {
    background: var(--panel-2);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    border-left: 3px solid var(--amber);
  }
  .drawer-cond-row .meta {
    color: var(--text-mute); font-size: 11px;
    margin-bottom: 4px;
  }
  .drawer-cond-row .text {
    color: var(--text); font-size: 12px;
    line-height: 1.5;
  }
  .drawer-event-row {
    background: var(--panel-2);
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 6px;
    border-left: 3px solid var(--red);
    display: flex; justify-content: space-between; gap: 12px;
    font-size: 12px;
  }
  .drawer-event-row .date { color: var(--text-mute); white-space: nowrap; }
  .drawer-event-row .type { color: var(--text); flex: 1; }
  .drawer-fee-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 6px;
    font-size: 12px;
  }
  .drawer-fee-cell {
    background: var(--panel-2); border-radius: 4px;
    padding: 8px;
  }
  .drawer-fee-cell .ab { color: var(--text-mute); font-size: 10px; }
  .drawer-fee-cell .session { color: var(--text-dim); font-size: 11px; }
  .drawer-fee-cell .price { color: var(--green); font-weight: 500; font-size: 14px; margin-top: 2px; }
  .drawer-hours-grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 4px 12px;
    font-size: 12px;
  }
  .drawer-hours-grid .day { color: var(--text-mute); }
  .drawer-hours-grid .hr { color: var(--text); font-variant-numeric: tabular-nums; }

  /* ────────────────────────────────────────────────────────────────
     Responsive — V1 targets desktop. <1024px collapses gracefully
     ──────────────────────────────────────────────────────────────── */
  @media (max-width: 1024px) {
    .l2-tiles { grid-template-columns: repeat(2, 1fr); }
    .l5-row {
      grid-template-columns: 1fr 32px;
      gap: 6px;
      padding: 12px 8px;
    }
    .l5-row > * { grid-column: 1; }
    .l5-row > .l5-trigger { grid-column: 2; grid-row: 1; }
    .drawer { width: 100vw; }
  }
</style>
