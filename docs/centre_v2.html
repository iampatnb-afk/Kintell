// Build a Chart.js line config with v1 hover register: external readout
// above canvas + crosshair vertical dashed line + optional centre-events
// overlay (vertical dashed lines at quarters of supply changes).
function _chartConfig(metric, points, { compact=false, valueFormat=null, events=null, label=null, rangeYears=null, cohortDistribution=null } = {}) {
  const effectiveRange = (rangeYears != null) ? rangeYears : _TRAJECTORY_RANGE_YEARS;
  const filtered = _filterTrajectoryByRange(points, effectiveRange);
  const ratioFloor = undefined;
  // Window-start anchor for the running-% tooltip line — matches v3.31's
  // afterLabel callback ("+5.4% since 2018"). The readout's second line
  // gives the reader the running delta from the start of the visible
  // window without needing to do mental arithmetic.
  const windowStartValue = filtered.length ? Number(filtered[0].value) : null;
  const windowStartPeriod = filtered.length ? filtered[0].period : null;
  const labels = filtered.map(p => p.period);
  const data = filtered.map(p => Number(p.value));
  const stroke = _strokeFor(metric);
  const fill = _fillFor(metric);
  const datasetLabel = label || (metric || "value");

  const fmt = (v) => {
    if (v == null || !isFinite(v)) return "—";
    switch(valueFormat) {
      case "percent":
      case "percent_share":
        return Number(v).toFixed(1) + "%";
      case "currency_weekly":
        return "$" + Math.round(Number(v)).toLocaleString() + "/wk";
      case "currency_annual":
        return "$" + Math.round(Number(v)).toLocaleString();
      case "currency_daily":
        return "$" + Number(v).toFixed(2);
      case "ratio_x":
        return Number(v).toFixed(2) + "×";
      case "int":
        return Math.round(Number(v)).toLocaleString();
      default:
        return Number(v).toLocaleString();
    }
  };

  return {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: datasetLabel,
        data,
        borderColor: stroke,
        backgroundColor: fill,
        borderWidth: 2,
        fill: true,
        pointRadius: filtered.length <= 6 ? 3 : 2,
        pointHoverRadius: 5,
        pointBackgroundColor: stroke,
        tension: 0,  // straight lines between points — matches centre.html v3.31
        spanGaps: true,  // bridge null gaps so partial-cadence series don't break the line
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          // v1-style: native box disabled; values surface via external
          // callback into the readout slot above the canvas. label +
          // afterLabel callbacks match centre.html v3.31 — first line is
          // "{name}: {value}", second is "{±X.X%} since {start year}".
          enabled: false,
          external: _kintellExternalReadout,
          displayColors: false,
          callbacks: {
            label: (ctx) => `${datasetLabel}: ${fmt(ctx.parsed.y)}`,
            afterLabel: (ctx) => {
              if (windowStartValue == null || windowStartValue === 0) return null;
              const here = Number(ctx.parsed.y);
              if (!isFinite(here)) return null;
              const pct = ((here - windowStartValue) / windowStartValue) * 100;
              const startYear = _yearOfPeriod(windowStartPeriod);
              return `${_formatTrendPct(pct)} since ${startYear}`;
            },
          },
        },
        kintellEventAnnotation: events && events.length ? { events } : null,
        // Horizontal reference line (Phase 5b polish 2026-05-13) for ratio
        // metrics whose y-value carries analytical break-point meaning.
        // Per-metric config in _CHART_REFERENCE_LINES; null when metric has
        // no reference defined.
        kintellReferenceLine: _CHART_REFERENCE_LINES[metric] || null,
      },
      scales: {
        x: {
          ticks: { color: "#6b7684", font: { size: 10 }, maxTicksLimit: 6, autoSkip: true },
          grid: { display: false },
        },
        y: (() => {
          // Deterministic y-axis bounds — final approach after Patrick's
          // 2026-05-12 third-iteration feedback ("every refresh a new version").
          // The earlier iterations bounced between auto-scale (magnifies
          // trivial movement), cohort p5/p95 (flattens trajectory), and
          // cohort IQR + ref-line (still flat for supply ratio because ref
          // line at 1.0 sits far from data at 0.42).
          //
          // This version is STABLE and DATA-ANCHORED:
          //  1. Compute a data-anchored span: minSpan = max(4× data range,
          //     20% of central value for ratios, 5pp for percentages).
          //  2. Centre the axis on data midpoint with that span. Trajectory
          //     always renders in the central ~60% of chart height.
          //  3. Reference line: include on-chart ONLY when it sits within
          //     2× the chosen span of the data. Otherwise render as an
          //     off-chart callout (see chart head) — keeps the trajectory
          //     readable when reference is far away (e.g. supply ratio 0.42
          //     vs supply=demand at 1.0).
          //  4. Cohort context: NOT pulled into axis bounds. Cohort
          //     distribution lives in the histogram below the chart; axis
          //     stays focused on the centre's own trajectory.
          const dataMin = Math.min(...data);
          const dataMax = Math.max(...data);
          const dataMid = (dataMin + dataMax) / 2;
          const dataSpan = Math.max(dataMax - dataMin, 1e-9);
          const isPctLike = valueFormat === "percent" || valueFormat === "percent_share";
          const minSpan = isPctLike
            ? Math.max(dataSpan * 4, 5)
            : Math.max(dataSpan * 4, Math.abs(dataMid) * 0.20);
          let yMin = dataMid - minSpan / 2;
          let yMax = dataMid + minSpan / 2;
          // Always include all data points (paranoia guard)
          yMin = Math.min(yMin, dataMin);
          yMax = Math.max(yMax, dataMax);

          // Reference line: include only when close enough to data
          const refCfg = _CHART_REFERENCE_LINES[metric];
          if (refCfg && refCfg.y != null) {
            const ref = refCfg.y;
            const reachWindow = minSpan;  // include ref only within 1× minSpan
            if (Math.abs(ref - dataMid) <= reachWindow) {
              if (ref < yMin) yMin = ref;
              if (ref > yMax) yMax = ref;
            }
            // If reference is too far, _kintellReferenceLine plugin no-ops
            // (yPixel outside chart area) and the reference is surfaced via
            // a callout in the chart head — see _renderChartPanel.
          }

          const pad = (yMax - yMin) * 0.08;
          return {
            ticks: { color: "#6b7684", font: { size: 10 }, maxTicksLimit: 4 },
            grid: { color: "#232933", lineWidth: 1 },
            beginAtZero: false,
            min: yMin - pad,
            max: yMax + pad,
          };
        })(),
      },
    },
  };
}

let _CHART_INSTANCES = {};
function _flushPendingCharts({ keepExisting = false } = {}) {
  // keepExisting=true is used by the matrix inline-row-click expand path so
  // a single newly-injected chart instantiates without destroying the
  // existing Layer 3 / Layer 4 chart instances.
  if (!keepExisting) {
    for (const id of Object.keys(_CHART_INSTANCES)) {
      try { _CHART_INSTANCES[id].destroy(); } catch(e) {}
    }
    _CHART_INSTANCES = {};
  }
  while (_CHART_PENDING.length) {
    const { canvasId, config } = _CHART_PENDING.shift();
    const canvas = document.getElementById(canvasId);
    if (!canvas) continue;
    try {
      _CHART_INSTANCES[canvasId] = new Chart(canvas.getContext("2d"), config);
    } catch (e) {
      console.error("Chart.js instantiation failed for " + canvasId, e);
    }
  }
}

// Render a single chart panel — chart + cohort histogram + decile strip + trend label.
// Pulls position entry by metric to access trajectory + cohort_distribution.
function _renderChartPanel(metric, posEntry, opts={}) {
  const { compact=false, titleOverride=null, unitsOverride=null, rangeYears=null } = opts;
  const effectiveRange = (rangeYears != null) ? rangeYears : _TRAJECTORY_RANGE_YEARS;
  if (!posEntry) {
    return `<div class="chart-panel ${compact?"compact":""}"><div class="pending-chart">Pending data: ${htmlEscape(metric)}</div></div>`;
  }
  const points = posEntry.trajectory || [];
  if (points.length < 2) {
    return `<div class="chart-panel ${compact?"compact":""}">
      <div class="chart-head"><span class="chart-title">${htmlEscape(titleOverride || posEntry.display || metric)}</span></div>
      <div class="pending-chart">No trajectory available (${points.length} point${points.length===1?"":"s"})</div>
    </div>`;
  }
  const filtered = _filterTrajectoryByRange(points, effectiveRange);
  const trendPct = _computeTrendPct(filtered);
  const trendCls = trendPct == null ? "" : (trendPct > 0.05 ? "positive" : trendPct < -0.05 ? "negative" : "");
  // Combined trend label: "−63.1% since 2021 · +160 places · +1 centre"
  // Absolute change comes from centre_events overlay (only catchment metrics).
  const events = posEntry.centre_events || null;
  let trendLabelText = "";
  if (trendPct != null) {
    trendLabelText = `${_formatTrendPct(trendPct)} since ${filtered[0].period}`;
    if (events && events.length) {
      const startYear = _yearOfPeriod(filtered[0].period);
      const evChange = _computeEventAbsChange(events, startYear);
      if (evChange) {
        if (evChange.placesChange) trendLabelText += ` · ${evChange.placesChange > 0 ? "+" : ""}${evChange.placesChange} places`;
        if (evChange.centresChange) trendLabelText += ` · ${evChange.centresChange > 0 ? "+" : ""}${evChange.centresChange} centre${Math.abs(evChange.centresChange) === 1 ? "" : "s"}`;
      }
    }
  }
  const trendLabel = trendLabelText
    ? `<span class="chart-trend ${trendCls}">${htmlEscape(trendLabelText)}</span>`
    : "";

  // Header right-side: current value + period + OBS badge
  const valueStr = _formatValueForChartHead(posEntry);
  const periodStr = posEntry.period_label || (posEntry.year != null ? String(posEntry.year) : "");
  const valueHtml = valueStr ? `<b style="color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;">${htmlEscape(valueStr)}</b>` : "";
  const periodHtml = periodStr ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(periodStr)})</span>` : "";
  // OBS hover with rich methodology (v1 register): source + period + raw value
  const obsTooltip = [
    posEntry.source ? `Source: ${posEntry.source}` : null,
    periodStr ? `As at: ${periodStr}` : null,
    valueStr ? `Value: ${valueStr}` : null,
  ].filter(Boolean).join("\n").replace(/"/g, '&quot;');
  const obsBadge = `<span class="fr-badge obs" title="${obsTooltip || 'Observed primary-source data'}">OBS</span>`;

  // Cohort short label suffix in title — "(vs Major Cities NSW)" style
  const cohortSuffix = posEntry.cohort_label ? ` <span style="color:var(--text-mute);font-weight:400;font-size:11.5px;">${htmlEscape(_shortCohortLabel(posEntry.cohort_label))}</span>` : "";

  const canvasId = `chart-${metric}-${Math.random().toString(36).slice(2,8)}`;
  const titleText = titleOverride || posEntry.display || metric;
  _CHART_PENDING.push({ canvasId, config: _chartConfig(metric, points, {
    compact, valueFormat: posEntry.value_format, events, label: titleText,
    rangeYears: effectiveRange,
    cohortDistribution: posEntry.cohort_distribution || null,
  }) });

  const eventsLegend = (events && events.length && !compact) ? `
    <div class="chart-events-legend">
      <span><span class="swatch add"></span>net new centres in catchment</span>
      <span><span class="swatch rem"></span>net closures</span>
      <span><span class="swatch churn"></span>churn (zero net)</span>
    </div>
  ` : "";

  // Cohort histogram + caption below the chart (for non-compact charts only)
  const cohortHtml = !compact ? _renderChartCohort(posEntry) : "";
  // v1-style full register: headline + decile strip + band chips with text + INDUSTRY +
  // intent_copy + ABOUT THIS MEASURE + source line + DER/COM badges.
  const fullRegisterHtml = !compact ? _renderFullRegister(posEntry) : "";
  // Compact charts (Layer 4) get a slim source line + decile-snapshot only,
  // not the full register — keeps secondary trends scannable.
  const compactSourceHtml = compact && posEntry.source
    ? `<div class="fr-source"><span class="label">Source</span>${htmlEscape(posEntry.source)}</div>`
    : "";
  const compactDecileHtml = compact && posEntry.decile != null
    ? `<div style="margin-top:4px;font-size:11px;color:var(--text-mute);">Decile ${posEntry.decile}${posEntry.cohort_n ? ` · n=${posEntry.cohort_n}` : ''}${posEntry.band ? ` · ${htmlEscape(posEntry.band)}` : ''}</div>`
    : "";

  // Reference-line callout: when the metric has a reference (e.g. supply
  // ratio's supply=demand at 1.0) and the data sits far enough away that
  // the line falls outside the chosen y-axis, surface the reference as a
  // text callout below the trend label. Keeps the analytical context
  // visible without flattening the trajectory chart.
  const refCfg = _CHART_REFERENCE_LINES[metric];
  let refCallout = "";
  if (refCfg && refCfg.y != null && posEntry.raw_value != null) {
    const dataPoints = filtered.map(p => Number(p.value));
    const dataMin = Math.min(...dataPoints);
    const dataMax = Math.max(...dataPoints);
    const dataMid = (dataMin + dataMax) / 2;
    const dataSpan = Math.max(dataMax - dataMin, 1e-9);
    const isPctLike = posEntry.value_format === "percent" || posEntry.value_format === "percent_share";
    const minSpan = isPctLike
      ? Math.max(dataSpan * 4, 5)
      : Math.max(dataSpan * 4, Math.abs(dataMid) * 0.20);
    const isOffChart = Math.abs(refCfg.y - dataMid) > minSpan;
    if (isOffChart) {
      const direction = posEntry.raw_value < refCfg.y ? "below" : "above";
      const deltaPct = ((posEntry.raw_value - refCfg.y) / refCfg.y) * 100;
      const refFmt = isPctLike ? `${refCfg.y.toFixed(1)}%` : Number(refCfg.y).toFixed(2);
      refCallout = `
        <div style="text-align:right;margin-top:2px;font-size:11px;color:var(--text-mute);">
          <span style="color:var(--text-dim);">${htmlEscape(refCfg.label || "reference")}</span>
          at ${refFmt} ·
          <b style="color:var(--text-dim);">${direction === "below" ? "−" : "+"}${Math.abs(deltaPct).toFixed(1)}%</b>
          ${direction} reference
        </div>
      `;
    }
  }

  return `
    <div class="chart-panel ${compact?"compact":""}">
      <div class="chart-head">
        <span class="chart-title">${htmlEscape(titleText)}${cohortSuffix}${unitsOverride ? `<span class="units">${htmlEscape(unitsOverride)}</span>` : ""}</span>
        <span style="display:inline-flex;align-items:baseline;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          ${valueHtml}${periodHtml}${obsBadge}
        </span>
      </div>
      ${trendLabel ? `<div style="text-align:right;margin-top:2px;">${trendLabel}</div>` : ""}
      ${refCallout}
      <div class="chart-readout" id="readout-${canvasId}"><span class="placeholder">hover the line to read values</span></div>
      <div class="chart-canvas-wrap"><canvas id="${canvasId}"></canvas></div>
      ${eventsLegend}
      ${cohortHtml}
      ${fullRegisterHtml}
      ${compactDecileHtml}
      ${compactSourceHtml}
    </div>
  `;
}

// Format raw_value for chart head display matching v1 conventions
function _formatValueForChartHead(p) {
  const raw = p.raw_value;
  if (raw == null) return "";
  const fmt = p.value_format;
  if (fmt === "int") return Math.round(Number(raw)).toLocaleString();
  if (fmt === "percent" || fmt === "percent_share") return Number(raw).toFixed(1) + "%";
  if (fmt === "currency_annual") return "$" + Math.round(Number(raw)).toLocaleString() + " p.a.";
  if (fmt === "currency_weekly") return "$" + Math.round(Number(raw)).toLocaleString() + "/week";
  if (fmt === "currency_daily") return "$" + Number(raw).toFixed(2);
  if (fmt === "ratio_x") return Number(raw).toFixed(2) + "×";
  return String(raw);
}

// Short bracketed cohort label ("vs Major Cities NSW") from long-form cohort_label
function _shortCohortLabel(longLabel) {
  if (!longLabel) return "";
  // long-form: "vs other Outer Regional SA2s in Qld" → "(vs Outer Regional Qld)"
  // long-form: "vs other SA2s in NSW" → "(vs NSW)"
  // long-form: "vs other Major Cities SA2s nationwide" → "(vs Major Cities)"
  const m1 = /vs other (.+?) SA2s in (.+)$/i.exec(longLabel);
  if (m1) return `(vs ${m1[1]} ${m1[2]})`;
  const m2 = /vs other SA2s in (.+)$/i.exec(longLabel);
  if (m2) return `(vs ${m2[1]})`;
  const m3 = /vs other (.+?) SA2s nationwide/i.exec(longLabel);
  if (m3) return `(vs ${m3[1]})`;
  return `(${longLabel})`;
}

// Compute absolute centre / places change from centre_events array,
// summing events at or after startYear. Returns null if no events qualify.
function _computeEventAbsChange(events, startYear) {
  if (!events || !events.length || startYear == null || isNaN(startYear)) return null;
  let placesChange = 0, centresChange = 0, n = 0;
  for (const e of events) {
    if (!e || !e.quarter) continue;
    const eYear = _yearOfPeriod(e.quarter);
    if (eYear == null || isNaN(eYear)) continue;
    if (eYear < startYear) continue;
    placesChange += (e.places_change || 0);
    centresChange += (e.net_centres || 0);
    n++;
  }
  if (n === 0) return null;
  return { placesChange, centresChange, eventCount: n };
}

// Plain-language caption explaining what this metric's decile + cohort mean
function _renderDecileCaption(p) {
  if (!p || p.decile == null) return "";
  const decile = p.decile;
  const band = p.band || (decile <= 3 ? "low" : decile <= 6 ? "mid" : "high");
  const cohortLabel = p.cohort_label || (p.cohort_def ? `peer SA2s in cohort ${p.cohort_def}` : "peer SA2s");
  const direction = p.direction || "neutral";
  let interpretation;
  if (direction === "high_is_positive") {
    interpretation = decile >= 8 ? "near the top of the cohort"
                   : decile >= 5 ? "around the middle of the cohort"
                   : "near the bottom of the cohort";
  } else if (direction === "low_is_positive") {
    interpretation = decile <= 3 ? "near the top of the cohort (low values are favourable here)"
                   : decile <= 6 ? "around the middle of the cohort"
                   : "near the bottom of the cohort";
  } else {
    interpretation = decile >= 8 ? "in the top 30% of the cohort"
                   : decile <= 3 ? "in the bottom 30% of the cohort"
                   : "around the middle of the cohort";
  }
  const bandText = band === "low" ? "low" : band === "high" ? "high" : "mid";
  return `
    <div class="chart-decile-caption">
      <b>Decile ${decile} (${bandText})</b> — this SA2 sits ${interpretation} ${htmlEscape(cohortLabel)}${p.cohort_n ? ` (n=${p.cohort_n})` : ""}.
    </div>
  `;
}

// v1-cloned cohort histogram: full-width bars (proportional height up to
// 30px) + italic centred explainer caption + small centred cohort meta.
// Drops the inline mini-decile-strip + "D5 · n=347" stamp from v0.x —
// the BIG decile strip in `_renderFullRegister` covers position. Patrick
// 2026-05-12: "your version doesn't quite pick up how this is displayed".
//
// Expects shape `cohort_distribution = { bins: [{bin_min, bin_max, count}],
// self_bin: N, cohort_n: N, min: N, max: N }` — same as v1's _renderCohortHistogram.
function _renderChartCohort(p) {
  const dist = p && p.cohort_distribution;
  if (!dist || !dist.bins || !dist.bins.length) return "";
  const bins = dist.bins;
  const maxCount = bins.reduce((m, b) => Math.max(m, b.count || 0), 0);
  if (maxCount === 0) return "";
  const selfBin = (dist.self_bin != null) ? dist.self_bin : -1;

  const barHtml = bins.map((b, i) => {
    const isSelf = (i === selfBin);
    const heightPct = ((b.count || 0) / maxCount) * 100;
    const bg = isSelf ? "var(--accent)" : "rgba(74,158,255,0.20)";
    const minStr = (b.bin_min != null) ? Number(b.bin_min).toFixed(2) : "";
    const maxStr = (b.bin_max != null) ? Number(b.bin_max).toFixed(2) : "";
    const titleTxt = `${minStr} – ${maxStr}: ${b.count} SA2${b.count === 1 ? "" : "s"}${isSelf ? "  ← this SA2" : ""}`;
    return `<div title="${htmlEscape(titleTxt)}" style="flex:1;min-width:6px;height:${heightPct.toFixed(1)}%;background:${bg};border-radius:1px 1px 0 0;${isSelf ? "box-shadow:0 0 0 1px var(--accent);" : ""}"></div>`;
  }).join("");

  const minR = (dist.min != null) ? Number(dist.min).toFixed(0) : "";
  const maxR = (dist.max != null) ? Number(dist.max).toFixed(0) : "";
  const cohortNote = `cohort distribution${dist.cohort_n != null ? ` · n=${dist.cohort_n}` : ""}${minR && maxR ? ` · range ${minR}–${maxR}` : ""}`;
  const explainerTxt = "Distribution of values across the peer cohort. The highlighted bar shows where this SA2 sits; the decile strip below converts that position to the 1–10 scale.";

  return `
    <div style="margin-top:8px;">
      <div style="display:flex;align-items:flex-end;gap:1px;height:30px;background:transparent;">
        ${barHtml}
      </div>
      <div style="font-size:11px;color:var(--text-mute);font-style:italic;line-height:1.45;margin-top:6px;text-align:center;">
        ${htmlEscape(explainerTxt)}
      </div>
      <div style="font-size:9.5px;color:var(--text-mute);letter-spacing:0.04em;margin-top:4px;text-align:center;">
        ${htmlEscape(cohortNote)}
      </div>
    </div>
  `;
}

// ── _renderFullRegister: v1's per-row analytical content ────────────
// Cloned from centre.html v3.31 styling. Order matches v1 _renderFullRow:
//   - headline ("Decile X · band · n=NNN")
//   - cohort histogram with caption (rendered separately upstream)
//   - decile strip 1-10 (tabular, blue tones)
//   - band chips with descriptive text
//   - INDUSTRY badge with note
//   - intent_copy italic line
//   - ABOUT THIS MEASURE panel
//   - source line (v2 addition per Patrick: "the source should be placed there")
//   - DER + COM badges
function _renderFullRegister(p) {
  if (!p) return "";
  const headlineHtml = _renderFRHeadline(p);
  const decileHtml = _renderFRDecileStrip(p.decile);
  const chipsHtml = _renderFRBandChips(p);
  const industryHtml = _renderFRIndustryBand(p);
  const intentHtml = p.intent_copy
    ? `<div class="fr-intent">${htmlEscape(p.intent_copy)}</div>`
    : "";
  const aboutHtml = _renderFRAbout(p);
  const sourceHtml = p.source
    ? `<div class="fr-source"><span class="label">Source</span>${htmlEscape(p.source)}</div>`
    : "";
  // Richer badge hover content per Patrick 2026-05-12: hover should show
  // source + meaningful methodology, not internal code references.
  const derTooltip = [
    p.cohort_def ? `Cohort: ${p.cohort_label || p.cohort_def}` : null,
    p.cohort_n != null ? `Cohort size: ${p.cohort_n}` : null,
    `Decile = NTILE(10) within cohort; band = low (1–3) / mid (4–6) / high (7–10)`,
    p.calibrated_rate != null ? `Calibrated rate: ${p.calibrated_rate} — ${p.rule_text || ''}` : null,
    p.source ? `Source: ${p.source}` : null,
  ].filter(Boolean).join("\n").replace(/"/g, '&quot;');
  const comTooltip = (p.band_copy && p.band)
    ? `Commentary (${p.band}): ${p.band_copy[p.band] || ''}\nRule: rule-based from LAYER3_METRIC_META band_copy.`.replace(/"/g, '&quot;')
    : 'Rule-based commentary from band_copy registry';
  const badges = [];
  badges.push(`<span class="fr-badge der" title="${derTooltip}">DER</span>`);
  if (p.band_copy) badges.push(`<span class="fr-badge com" title="${comTooltip}">COM</span>`);
  const badgesHtml = badges.length ? `<div class="fr-badges">${badges.join("")}</div>` : "";

  return `
    <div class="full-register">
      ${headlineHtml}
      ${decileHtml}
      ${chipsHtml}
      ${industryHtml}
      ${intentHtml}
      ${aboutHtml}
      ${sourceHtml}
      ${badgesHtml}
    </div>
  `;
}

function _renderFRHeadline(p) {
  if (p.decile == null) return "";
  const band = p.band || "mid";
  return `
    <div class="fr-headline">
      <b style="color:var(--text);font-weight:600;">Decile ${p.decile}</b>
      <span class="muted">·</span>
      <span class="dim">${htmlEscape(band)}</span>
      ${p.cohort_n ? `<span class="muted">·</span><span class="num">n=${p.cohort_n}</span>` : ""}
    </div>
  `;
}

function _renderFRDecileStrip(decile) {
  if (decile == null) return "";
  const cells = [];
  for (let d = 1; d <= 10; d++) {
    const tier = d <= 3 ? "tier-low" : d <= 6 ? "tier-mid" : "tier-high";
    const isActive = (d === decile);
    const gap = (d === 4 || d === 7) ? "gap-before" : "";
    const classes = `fr-decile-cell ${tier}${isActive ? " active" : ""} ${gap}`.trim();
    cells.push(`<div class="${classes}" title="Decile ${d}${isActive ? ' (this SA2)' : ''}">${d}</div>`);
  }
  return `<div class="fr-decile-strip">${cells.join("")}</div>`;
}

function _renderFRBandChips(p) {
  const bandCopy = p.band_copy;
  if (!bandCopy) return "";
  const active = p.band || "mid";
  const bands = ["low", "mid", "high"];
  const chips = bands.map(b => {
    const txt = bandCopy[b] || b;
    const cls = b === active ? "fr-band-chip active" : "fr-band-chip";
    return `<span class="${cls}"><span class="key">${b}</span>${htmlEscape(txt)}</span>`;
  }).join("");
  return `<div class="fr-band-chips">${chips}</div>`;
}

function _renderFRIndustryBand(p) {
  if (!p.industry_band || !p.industry_band_label) return "";
  const cautionKeys = new Set(["saturated", "soft", "tight", "constrained", "severe", "desert", "undersupplied", "below_bench", "near_be"]);
  const positiveKeys = new Set(["well_served", "viable", "strong", "balanced", "at_target", "at_bench", "excess_capacity"]);
  const cls = cautionKeys.has(p.industry_band) ? "caution"
            : positiveKeys.has(p.industry_band) ? "positive" : "neutral";
  return `
    <div class="fr-industry">
      <div class="row">
        <span class="label">Industry</span>
        <span class="pill ${cls}">${htmlEscape(p.industry_band_label)}</span>
      </div>
      ${p.industry_band_note ? `<div class="note">${htmlEscape(p.industry_band_note)}</div>` : ""}
    </div>
  `;
}

function _renderFRAbout(p) {
  const txt = p.about_data;
  if (!txt) return "";
  const paragraphs = String(txt).split(/\n\n+/).map(s => s.trim()).filter(Boolean);
  if (!paragraphs.length) return "";
  const body = paragraphs.map((par, i) => {
    const lines = par.split("\n").map(s => htmlEscape(s.trim())).filter(Boolean).join("<br>");
    const mt = i === 0 ? "0" : "6px";
    return `<div style="margin-top:${mt};">${lines}</div>`;
  }).join("");
  return `
    <div class="fr-about">
      <div class="label">About this measure</div>
      ${body}
    </div>
  `;
}
function _renderChartDecileStrip(decile) {
  if (decile == null) return "";
  const cells = [];
  for (let i = 1; i <= 10; i++) {
    let cls = "cell";
    if (i === decile) cls += " active " + (i <= 3 ? "low" : i <= 6 ? "mid" : "high");
    cells.push(`<span class="${cls}"></span>`);
  }
  return `<span class="chart-decile">${cells.join("")}</span>`;
}

// Pull a position entry by metric across all cards
function _findPosEntry(centre, metric) {
  const position = centre.position || {};
  for (const cardKey of Object.keys(position)) {
    const e = position[cardKey] && position[cardKey][metric];
    if (e) return e;
  }
  // Workforce supply rows aren't in position — they live under
  // centre.workforce_supply.rows (DEC-76 substrate). The matrix builder
  // emits these into the Workforce category, and the inline-row-click
  // expand needs to find their full trajectory + cohort data here too,
  // otherwise it renders "No trajectory available" despite the data
  // being present.
  const wfRows = (centre.workforce_supply || {}).rows || [];
  const wfHit = wfRows.find(r => r && r.metric === metric);
  if (wfHit) return wfHit;
  // School enrolment trend — synthetic from top-level payload key.
  // Patrick 2026-05-12: clicking the row should inline-expand the
  // 18-year historical trajectory; centre_events overlay carries the
  // supply-change vertical dashed lines for new schools / OSHC arrivals.
  if (metric === "school_enrolment_3y_trend") {
    const et = centre.school_enrolment_trend || {};
    if (et.latest_value != null && Array.isArray(et.trajectory) && et.trajectory.length) {
      return {
        display:        "School enrolment (catchment SA2)",
        trajectory:     et.trajectory.map(p => ({ period: p.year, value: p.value })),
        trajectory_kind:"annual",
        value_format:   "int",
        raw_value:      et.latest_value,
        year:           et.latest_year,
        period_label:   String(et.latest_year),
        source:         et.source || "ACARA School Profile 2008-2025",
        intent_copy:    "Total catchment school enrolment over time. Rising school enrolment is a leading indicator for the under-5 cohort coming through into the local ECEC market. Vertical dashed lines mark years when new schools or OSHC services arrived in the catchment.",
        about_data:     "Sum of student enrolment across all schools located in this SA2 (ACARA School Profile, annual). Includes Government, Catholic, and Independent across primary, secondary, and combined sectors.\n\nSupply-change overlay: new schools derived from YoY count delta in acara_school_count_total; new OSHC services from services.approval_granted_date in that year + SA2 match.",
        decile:         null,
        cohort_n:       null,
        centre_events:  et.centre_events || [],
      };
    }
  }
  return null;
}

// Build a synthetic position-style entry from the DEC-83 fee trajectory
// for Layer 3 chart 7 (daily-rate). Filters to the headline (age, session)
// pair based on subtype: LDC/FDC/Preschool → full_day × 36m-preschool;
// OSHC → before_school × school-age (DEC-84 #9).
function _buildDailyRateChartEntry(centre) {
  const fees = (centre.dec83 || {}).fees || {};
  const traj = fees.annual_trajectory || [];
  if (!traj.length) return null;
  const subtype = (centre.header?.service_sub_type || centre.places?.service_sub_type?.code || "").toUpperCase();
  const isOshc = subtype.includes("OSHC") || subtype.includes("OUTSIDE");
  const targetAge = isOshc ? "school-age" : "36m-preschool";
  const targetSession = isOshc ? "before_school" : "full_day";
  const points = traj
    .filter(t => t.age_band === targetAge && t.session_type === targetSession && t.median_fee != null)
    .map(t => ({ period: t.year, value: t.median_fee }))
    .sort((a, b) => String(a.period).localeCompare(String(b.period)));
  if (!points.length) return null;
  // Latest published fee = current value
  const latest = points[points.length - 1];
  return {
    display: `Daily rate ${targetSession} × ${targetAge}`,
    value_format: "currency_daily",
    raw_value: latest.value,
    period_label: String(latest.period),
    trajectory: points,
    decile: null,
    cohort_n: null,
    source: "Starting Blocks daily fee schedule",
    intent_copy: `Daily rate for ${targetSession.replace("_", " ")} sessions in the ${targetAge} age band — the headline pricing signal for benchmarking fee position.`,
    about_data: `Each centre's published daily fee for the matching age band and session type, taken from Starting Blocks. The figure shown is the year median of all observed fee snapshots for this centre, age band, and session type.\n\nPeer-cohort comparison against other centres in the same SA2 and remoteness band is in development and will populate as national fee coverage expands.`,
  };
}

// Multi-age-band daily-rate chart (Layer 3 chart 7 refactor 2026-05-12).
// Replaces the single-line headline-pair view with all relevant age bands
// for the centre's subtype, grouped into one chart with distinct colours
// per band. Patrick: "put the other age bands on this graph as well…
// organise the bands into practical and sensible groups".
//
// LDC / Preschool / FDC → 4 LDC age bands (0-12m / 13-24m / 25-35m /
//   36m-preschool) all on full_day session.
// OSHC → 2 OSHC session types (before_school + after_school) on
//   school-age age band.
function _renderDailyRateMultiBandChart(centre) {
  const fees = (centre.dec83 || {}).fees || {};
  const traj = fees.annual_trajectory || [];
  if (!traj.length) {
    return `<div class="chart-panel"><div class="pending-chart">Daily-rate trajectory: pending DEC-83 ingest scale-up</div></div>`;
  }
  const subtype = (centre.header?.service_sub_type
                   || centre.places?.service_sub_type?.code || "").toUpperCase();
  const isOshc = subtype.includes("OSHC") || subtype.includes("OUTSIDE");

  // Series specs per subtype family
  const series = isOshc ? [
    { age_band: "school-age", session_type: "before_school",
      label: "Before school", color: "#4ade80" },
    { age_band: "school-age", session_type: "after_school",
      label: "After school",  color: "#9b59b6" },
  ] : [
    { age_band: "0-12m",          session_type: "full_day",
      label: "0–12m",          color: "#f9a826" },
    { age_band: "13-24m",         session_type: "full_day",
      label: "13–24m",         color: "#e07a4f" },
    { age_band: "25-35m",         session_type: "full_day",
      label: "25–35m",         color: "#5a8aa6" },
    { age_band: "36m-preschool",  session_type: "full_day",
      label: "36m–preschool",  color: "#4ade80" },
  ];

  // Build each series' points; if a series has no data, skip it
  const built = series.map(s => {
    const points = traj
      .filter(t => t.age_band === s.age_band && t.session_type === s.session_type && t.median_fee != null)
      .map(t => ({ period: t.year, value: t.median_fee }))
      .sort((a, b) => String(a.period).localeCompare(String(b.period)));
    return { ...s, points };
  }).filter(s => s.points.length > 0);

  if (!built.length) {
    return `<div class="chart-panel"><div class="pending-chart">Daily-rate trajectory: no fee data in headline age bands yet</div></div>`;
  }

  // Union x-axis labels from all series
  const allYears = new Set();
  built.forEach(s => s.points.forEach(p => allYears.add(String(p.period))));
  const labels = Array.from(allYears).sort();

  // Build a Chart.js multi-line config
  const datasets = built.map(s => {
    const byYear = new Map(s.points.map(p => [String(p.period), Number(p.value)]));
    return {
      label: s.label,
      data: labels.map(l => byYear.get(l) ?? null),
      borderColor: s.color,
      backgroundColor: s.color + "1A",  // 10% alpha hex suffix
      borderWidth: 2,
      fill: false,
      tension: 0,
      pointRadius: 2.5,
      pointHoverRadius: 5,
      pointBackgroundColor: s.color,
      spanGaps: true,
    };
  });

  const canvasId = `chart-dec83fees-${Math.random().toString(36).slice(2, 8)}`;
  const config = {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: {
          display: true, position: "top",
          labels: { color: "#9aa4b1", font: { size: 10 }, boxWidth: 10, padding: 10 },
        },
        tooltip: {
          enabled: false,
          external: _kintellExternalReadout,
          displayColors: false,
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: $${Number(ctx.parsed.y).toFixed(2)}/day`,
          },
        },
      },
      scales: {
        x: { ticks: { color: "#6b7684", font: { size: 10 }, maxTicksLimit: 6, autoSkip: true }, grid: { display: false } },
        y: {
          ticks: { color: "#6b7684", font: { size: 10 }, callback: v => "$" + Math.round(v) },
          grid: { color: "#232933", lineWidth: 1 },
          beginAtZero: false,
        },
      },
    },
  };
  _CHART_PENDING.push({ canvasId, config });

  // Latest-value summary chips in the chart head (one per series)
  const headSummary = built.map(s => {
    const latest = s.points[s.points.length - 1];
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-mute);">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${s.color};"></span>
      ${htmlEscape(s.label)}
      <b style="color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;">$${Math.round(latest.value)}</b>
    </span>`;
  }).join('<span style="color:var(--text-mute);">·</span>');

  const titleText = isOshc
    ? "Daily rate by session type (school-age)"
    : "Daily rate by age band (full-day)";
  const source = "Starting Blocks daily fee schedule (DEC-83 Commercial Layer V1; service_fee table; weekly refresh cadence)";

  return `
    <div class="chart-panel">
      <div class="chart-head">
        <span class="chart-title">${htmlEscape(titleText)}</span>
        <span style="display:inline-flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          ${headSummary}
        </span>
      </div>
      <div class="chart-readout" id="readout-${canvasId}"><span class="placeholder">hover the line to read values</span></div>
      <div class="chart-canvas-wrap"><canvas id="${canvasId}"></canvas></div>
      <div class="fr-intent">Daily rates across the subject centre's headline age bands — the pricing-mix signal for benchmarking fee position by age cohort.</div>
      <div class="fr-source"><span class="label">Source</span>${htmlEscape(source)}</div>
    </div>
  `;
}

function _renderUnderFiveBirthsChart(centre) {
  const u5 = _findPosEntry(centre, "sa2_under5_count");
  const births = _findPosEntry(centre, "sa2_births_count");
  if (!u5 || !u5.trajectory || u5.trajectory.length < 2) {
    return `<div class="chart-panel"><div class="pending-chart">Under-5 + births trajectory unavailable</div></div>`;
  }
  const u5Points = _filterTrajectoryByRange(u5.trajectory || [], _TRAJECTORY_RANGE_YEARS);
  const bPoints  = _filterTrajectoryByRange(births?.trajectory || [], _TRAJECTORY_RANGE_YEARS);
  // Centre-events overlay — use whichever entry carries them; both are
  // populated server-side from the catchment metrics' event log so
  // the supply-change context shows on the demand-pool chart too.
  const events = (u5.centre_events || (births && births.centre_events) || null);
  const labels = u5Points.map(p => p.period);
  const u5Data = u5Points.map(p => Number(p.value));
  // Match births to same years as u5 labels (births may have different cadence)
  const bByYear = new Map((bPoints || []).map(p => [String(p.period), Number(p.value)]));
  const bData = labels.map(l => bByYear.get(String(l)) ?? null);
  // Window-start anchors per dataset for the running-% afterLabel.
  const u5StartV = u5Data.length ? u5Data[0] : null;
  const bStartV  = (bData.find(v => v != null)) ?? null;
  const startYear = _yearOfPeriod(labels[0]);
  const canvasId = `chart-u5b-${Math.random().toString(36).slice(2,8)}`;
  const config = {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: "Under-5 population",
          data: u5Data,
          borderColor: _strokeFor("sa2_under5_count"),
          backgroundColor: _fillFor("sa2_under5_count"),
          borderWidth: 2, fill: true,
          pointRadius: 2, pointHoverRadius: 5, tension: 0,
          yAxisID: "y",
        },
        {
          label: "Births",
          data: bData,
          borderColor: "#e05c3a",
          backgroundColor: "rgba(224,92,58,0.08)",
          borderWidth: 2, fill: false, borderDash: [4,3],
          pointRadius: 2, pointHoverRadius: 5, tension: 0,
          yAxisID: "y2", spanGaps: true,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: true, position: "top", labels: { color: "#9aa4b1", font: { size: 10 }, boxWidth: 10 } },
        tooltip: {
          enabled: false,
          external: _kintellExternalReadout,
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${Math.round(ctx.parsed.y).toLocaleString()}`,
            // Running-% afterLabel — same shape as _chartConfig.
            afterLabel: (ctx) => {
              const isU5 = ctx.dataset.yAxisID === "y";
              const startV = isU5 ? u5StartV : bStartV;
              if (startV == null || startV === 0) return null;
              const here = Number(ctx.parsed.y);
              if (!isFinite(here)) return null;
              const pct = ((here - startV) / startV) * 100;
              return `${_formatTrendPct(pct)} since ${startYear}`;
            },
          },
        },
        kintellEventAnnotation: events && events.length ? { events } : null,
      },
      scales: {
        x: { ticks: { color: "#6b7684", font: { size: 10 }, maxTicksLimit: 6, autoSkip: true }, grid: { display: false } },
        y:  { position: "left",  ticks: { color: "#6b7684", font: { size: 10 } }, grid: { color: "#232933" } },
        y2: { position: "right", ticks: { color: "#e05c3a", font: { size: 10 } }, grid: { display: false } },
      },
    },
  };
  _CHART_PENDING.push({ canvasId, config });
  // Full register based on the primary metric (under-5_count); compose
  // a combined source line that surfaces both underlying datasets.
  const u5Source = u5.source || "ABS ERP at SA2";
  const bSource = (births && births.source) || "ABS Births at SA2";
  const combinedSource = `Under-5: ${u5Source} · Births: ${bSource}`;
  const enrichedU5 = { ...u5, source: combinedSource };
  const obsTooltip = `Source: ${combinedSource}\nAs at: ${u5.period_label || u5.year || ''}`.replace(/"/g, '&quot;');
  const valueStr = u5.raw_value != null ? Math.round(Number(u5.raw_value)).toLocaleString() : '';
  const periodStr = u5.period_label || (u5.year != null ? String(u5.year) : '');
  return `
    <div class="chart-panel">
      <div class="chart-head">
        <span class="chart-title">Under-5 population &amp; births</span>
        <span style="display:inline-flex;align-items:baseline;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          ${valueStr ? `<b style="color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;">${htmlEscape(valueStr)}</b>` : ''}
          ${periodStr ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(periodStr)})</span>` : ''}
          <span class="fr-badge obs" title="${obsTooltip}">OBS</span>
        </span>
      </div>
      <div class="chart-readout" id="readout-${canvasId}"><span class="placeholder">hover the line to read values</span></div>
      <div class="chart-canvas-wrap"><canvas id="${canvasId}"></canvas></div>
      ${_renderChartCohort(u5)}
      ${_renderFullRegister(enrichedU5)}
    </div>
  `;
}

// Chart 6 — Unemployment trajectory with Female LFP as Census-dated reference.
// Originally a dual-axis chart attempting to show Census Female LFP and SALM
// quarterly unemployment together. Patrick 2026-05-12 flagged that the
// unemployment line was always null. Root cause: per-SA2 data has Census LFP
// at decade-class points (2011/2016/2021) and SALM unemployment only at
// recent quarters (2024-2025+) — temporal coverage doesn't overlap, so the
// dual-axis comparison was structurally broken.
//
// Fix: chart now primarily plots SALM unemployment (quarterly trajectory,
// current signal). Female LFP from Census is surfaced as a dated reference
// value in the chart head + carried in the full register below. When SALM
// unemployment is unavailable, falls back to LFP-only series.
function _renderLfpUnempChart(centre) {
  const lfpF = _findPosEntry(centre, "sa2_lfp_females");
  const unemp = _findPosEntry(centre, "sa2_unemployment_rate");
  // Prefer unemployment trajectory (current quarterly signal). Fall back
  // to LFP when SALM ingest hasn't covered this SA2.
  const haveUnemp = unemp && Array.isArray(unemp.trajectory) && unemp.trajectory.length >= 2;
  const haveLfp = lfpF && Array.isArray(lfpF.trajectory) && lfpF.trajectory.length >= 1;
  if (!haveUnemp && !haveLfp) {
    return `<div class="chart-panel"><div class="pending-chart">Labour-market trajectory unavailable</div></div>`;
  }

  const primary = haveUnemp ? unemp : lfpF;
  const primaryMetric = haveUnemp ? "sa2_unemployment_rate" : "sa2_lfp_females";
  const points = _filterTrajectoryByRange(primary.trajectory || [], _TRAJECTORY_RANGE_YEARS);
  if (points.length < 2) {
    return `<div class="chart-panel"><div class="pending-chart">Trajectory window contains insufficient points</div></div>`;
  }
  const labels = points.map(p => p.period);
  const data = points.map(p => Number(p.value));
  const startV = data.length ? data[0] : null;
  const startYear = _yearOfPeriod(labels[0]);
  const canvasId = `chart-lfpu-${Math.random().toString(36).slice(2,8)}`;
  const color = haveUnemp ? "#e05c3a" : _strokeFor("sa2_lfp_females");
  const fill = haveUnemp ? "rgba(224,92,58,0.10)" : _fillFor("sa2_lfp_females");
  const seriesLabel = haveUnemp ? "Unemployment %" : "Female LFP %";

  const config = {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: seriesLabel,
        data,
        borderColor: color,
        backgroundColor: fill,
        borderWidth: 2, fill: true,
        pointRadius: 2, pointHoverRadius: 5, tension: 0,
        spanGaps: true,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: false,
          external: _kintellExternalReadout,
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${Number(ctx.parsed.y).toFixed(1)}%`,
            afterLabel: (ctx) => {
              if (startV == null || startV === 0) return null;
              const here = Number(ctx.parsed.y);
              if (!isFinite(here)) return null;
              const pct = ((here - startV) / startV) * 100;
              return `${_formatTrendPct(pct)} since ${startYear}`;
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: "#6b7684", font: { size: 10 }, maxTicksLimit: 6, autoSkip: true }, grid: { display: false } },
        y: (() => {
          // Same statistical-bounds approach as catchment charts — data-
          // anchored bounds with a minSpan floor so a tight unemployment
          // range (2.8% to 3.5%) doesn't render as a flat ribbon against
          // a 0-baseline axis. Patrick 2026-05-12: "scale needs to be
          // sorted here in respect to that picture."
          const dataMin = Math.min(...data);
          const dataMax = Math.max(...data);
          const dataMid = (dataMin + dataMax) / 2;
          const dataSpan = Math.max(dataMax - dataMin, 1e-9);
          // Percent-formatted axis: span at least 4× data range OR 3pp
          // (whichever is larger). Smaller floor than the catchment 5pp
          // because unemployment trajectories are typically tighter.
          const minSpan = Math.max(dataSpan * 4, 3);
          let yMin = dataMid - minSpan / 2;
          let yMax = dataMid + minSpan / 2;
          yMin = Math.min(yMin, dataMin);
          yMax = Math.max(yMax, dataMax);
          const pad = (yMax - yMin) * 0.08;
          return {
            ticks: { color: "#6b7684", font: { size: 10 }, callback: v => v + "%" },
            grid: { color: "#232933" },
            beginAtZero: false,
            min: Math.max(0, yMin - pad),
            max: yMax + pad,
          };
        })(),
      },
    },
  };
  _CHART_PENDING.push({ canvasId, config });

  // Reference line: surface Female LFP as a dated context line when
  // unemployment is the primary series (Census Female LFP serves as the
  // workforce-supply context against which unemployment reads).
  let lfpReferenceLine = "";
  if (haveUnemp && haveLfp && lfpF.raw_value != null) {
    lfpReferenceLine = `
      <div style="margin-top:2px;text-align:right;font-size:11px;color:var(--text-mute);">
        <span style="color:var(--text-dim);">Female LFP</span>
        <b style="color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;margin:0 4px;">${Number(lfpF.raw_value).toFixed(1)}%</b>
        <span style="color:var(--text-mute);font-style:italic;">(${htmlEscape(lfpF.period_label || lfpF.year || 'Census')})</span>
      </div>
    `;
  }

  // Chart head + full register based on the primary metric
  const lSource = lfpF?.source || "ABS Census Labour Force Participation at SA2";
  const uSource = (unemp && unemp.source) || "ABS SALM unemployment rate at SA2 (quarterly)";
  const combinedSource = haveUnemp && haveLfp
    ? `${primary.source || (haveUnemp ? uSource : lSource)} · context: ${haveUnemp ? lSource : uSource}`
    : (primary.source || (haveUnemp ? uSource : lSource));
  const enrichedPrimary = { ...primary, source: combinedSource };
  const obsTooltip = `Source: ${combinedSource}\nAs at: ${primary.period_label || primary.year || ''}`.replace(/"/g, '&quot;');
  const valueStr = primary.raw_value != null ? Number(primary.raw_value).toFixed(1) + '%' : '';
  const periodStr = primary.period_label || (primary.year != null ? String(primary.year) : '');
  const chartTitle = haveUnemp ? "Unemployment rate (SALM quarterly)" : "Female labour-force participation";
  return `
    <div class="chart-panel">
      <div class="chart-head">
        <span class="chart-title">${chartTitle}</span>
        <span style="display:inline-flex;align-items:baseline;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          ${valueStr ? `<b style="color:var(--text);font-weight:500;font-variant-numeric:tabular-nums;">${htmlEscape(valueStr)}</b>` : ''}
          ${periodStr ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(periodStr)})</span>` : ''}
          <span class="fr-badge obs" title="${obsTooltip}">OBS</span>
        </span>
      </div>
      ${lfpReferenceLine}
      <div class="chart-readout" id="readout-${canvasId}"><span class="placeholder">hover the line to read values</span></div>
      <div class="chart-canvas-wrap"><canvas id="${canvasId}"></canvas></div>
      ${_renderChartCohort(primary)}
      ${_renderFullRegister(enrichedPrimary)}
    </div>
  `;
}

function renderL4Accordion(centre) {
  const groups = [
    {

    },
    {
      title: "Income context",
      metrics: ["sa2_median_employee_income", "sa2_median_total_income", "sa2_median_household_income"],
    },
    {
      title: "Workforce context",
      metrics: ["sa2_lfp_persons", "sa2_lfp_males"],
    },
    {
      title: "Demographic trend",
      metrics: ["sa2_nes_share", "sa2_atsi_share", "sa2_overseas_born_share", "sa2_single_parent_family_share", "sa2_women_35_44_with_child_share", "sa2_women_25_34_with_child_share"],
    },
    {
      title: "Education infrastructure",
      metrics: ["sa2_school_count_total", "sa2_school_enrolment_total", "sa2_school_enrolment_govt_share"],
    },
  ];
  const groupCount = groups.length;

      </div>

  }).join("");
  return `
    <details class="l4-block l4-accordion">
      <summary>Secondary historical trends <span class="note">${groupCount} groups · ${totalCharts} charts (default-collapsed)</span></summary>
      ${_renderTrajectoryRangeBarL4()}
      ${groupHtml}
    </details>

}

function renderKinderRows(p) {
  const summary = p && p.kinder_summary;

  const acecqaUnknown = (acecqa?.value === null || acecqa?.value === undefined);
  const acecqaPositive = !!acecqa?.value;
  const namePositive = !!nameMatch?.value;

  let summaryMain, summaryQualifier;
  switch (summary?.state) {
    case "confirmed_both":
      summaryMain = "Confirmed"; summaryQualifier = "ACECQA + name match"; break;
    case "confirmed_acecqa":
      summaryMain = "Confirmed"; summaryQualifier = "ACECQA"; break;
    case "likely_name_only":
      summaryMain = "Likely"; summaryQualifier = "name match only — not in ACECQA"; break;
    default:
      summaryMain = "Not flagged"; summaryQualifier = null; break;

  const acecqaText = acecqaUnknown ? "Unknown" : (acecqaPositive ? "Yes" : "No");
  const matchedText = nameMatch?.matched_text;

  return `

// NQS pill with rating-specific styling
function nqsPill(rating) {
  if (!rating) return `<span class="nqs-pill">Not yet rated</span>`;
  const r = String(rating).toLowerCase();
  let cls = "nqs-pill";
  if (r.includes("exceeding")) cls += " exceeding";
  else if (r.includes("meeting")) cls += " meeting";
  else if (r.includes("working towards")) cls += " working-towards";
  else if (r.includes("significant")) cls += " significant";
  else if (r.includes("provisional")) cls += " provisional";
  return `<span class="${cls}">${htmlEscape(rating)}</span>`;
}

// Format date → "MMM YYYY". Accepts ISO ("YYYY-MM-DD") and the ACECQA
// payload's DD/MM/YYYY shape (services.approval_granted_date /
// .last_transfer_date — see centre_page.py docstring at line 1357).
function formatMonYYYY(s) {
  if (!s) return "—";
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  // DD/MM/YYYY → parse manually; Date() can't handle this format reliably.
  const dmy = String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (dmy) {
    const m = parseInt(dmy[2], 10);
    if (m >= 1 && m <= 12) return `${months[m - 1]} ${dmy[3]}`;
  }
  const d = new Date(s);
  if (isNaN(d.getTime())) return s;
  return `${months[d.getMonth()]} ${d.getFullYear()}`;
}

  const CATEGORY_INTRO = {

// Detect non-trajectory matrix rows so we can stamp them honestly.
// Returns "" (no annotation) | "census-3pt" | "static" | "monthly-state".
// Patrick queue #10 + the workforce scope stamp polish in #12.
// Synthetic rows that ARE current counts (operations / education
// cross-subtype etc.) carry period === "current" — they shouldn't get
// the "static snapshot" stamp because they aren't a historical snapshot,
// they're the present-state count.
function _l5RowAnnotation(row) {
  if (row.period === "current") return "";
  const spark = row.sparkline || [];
  if (spark.length <= 1) return "static";
  // Census 3-pt pattern — exactly 3 points at decade-class intervals
  // (2011/2016/2021 typical for Australian Census).
  if (spark.length === 3) {
    const years = spark.map(p => Number(String(p.period).match(/(\d{4})/)?.[1])).filter(Boolean);
    if (years.length === 3) {
      const sorted = years.slice().sort((a, b) => a - b);
      const g1 = sorted[1] - sorted[0];
      const g2 = sorted[2] - sorted[1];
      if (g1 >= 4 && g1 <= 6 && g2 >= 4 && g2 <= 6) return "census-3pt";
    }
  }
  return "";
}

function renderMatrixRow(row) {
  const drawerKey = row.drawer_key || `metric:${row.metric}`;
  const valueDisplay = fmtValue(row.current_value, row.value_format);
  // Period column gets an annotation stamp for static-snapshot / Census
  // 3-pt rows so readers don't expect a continuous trajectory.
  const annotation = _l5RowAnnotation(row);
  const annotationLabel = annotation === "census-3pt" ? "Census 3-pt"
                        : annotation === "static" ? "static snapshot"
                        : "";
  // Trend stamp under period (relocated 2026-05-12 per Patrick):
  // workforce JSA IVI rows carry trend3y_pct; school enrolment row carries
  // a normalised trend pct. Direction interpretation depends on metric:
  // workforce vacancies are inverse (falling = favourable for operator);
  // school enrolment direct (rising = favourable for ECEC demand).
  let trendStampHtml = "";
  if (row.trend3y_pct != null) {
    const pct = Number(row.trend3y_pct);
    const sign = pct >= 0 ? "+" : "−";
    const isVacancy = (row.metric || "").startsWith("jsa_ivi");
    let dirClass;
    if (Math.abs(pct) < 0.5) dirClass = "flat";
    else if (isVacancy) dirClass = pct < 0 ? "up" : "down";  // vacancies easing = up=favourable
    else                dirClass = pct > 0 ? "up" : "down";
    trendStampHtml = `<span class="trend-stamp ${dirClass}">${sign}${Math.abs(pct).toFixed(0)}% over 3y</span>`;
  }
  const periodHtml = row.period
    ? `<span class="period">${htmlEscape(row.period)}${annotationLabel ? `<span class="period-stamp">${htmlEscape(annotationLabel)}</span>` : ""}${trendStampHtml}</span>`
    : (trendStampHtml ? `<span class="period">${trendStampHtml}</span>` : "");
  const decileHtml = renderDecileStrip(row.decile, row.band, row.cohort_n);
  // Detect workforce scope stamps so they render with the dashed-italic
  // scope-stamp style instead of the band signal pill.
  const isScopeStamp = row.category === "workforce"
                       && typeof row.signal === "string"
                       && /no SA2 peer cohort/i.test(row.signal);
  const signalClass = isScopeStamp ? "scope-stamp" : signalClassForRow(row);
  // OBS / DER / COM badges colour-coded per tag (mirrors L3 register).
  // The title attribute carries the methodology shorthand — explicit
  // hover-enrichment with cohort + source + calibration detail is queued
  // as a follow-up.
  const _badgeTitle = (b) => ({
    OBS: "Observed — primary-source measurement",
    DER: "Derived — transparent formula from observed inputs",
    COM: "Commentary — rule-based band interpretation",
  }[b] || b);
  const badges = (row.obs_der_com || []).map(b =>
    `<span class="l5-badge l5-badge-${String(b).toLowerCase()}" title="${htmlEscape(_badgeTitle(b))}">${b}</span>`
  ).join('');
  const commentary = row.commentary || "";
  const v15Pending = row.v15_pending;

  // Surface the formatted value inline at the head of the commentary so
  // the row reads as a sentence ("37.6% · NES share captures…"). When
  // there's no numeric value (pending stubs, text-only rows) we just
  // render the commentary on its own.
  const hasValue = row.current_value != null && row.current_value !== "" && !v15Pending;
  const commHtml = hasValue
    ? `<span class="l5-comm-val">${valueDisplay}</span>${commentary ? ` · ${htmlEscape(commentary)}` : ""}`
    : htmlEscape(commentary);

  // Row body click = inline-expand the trend chart (for metric:* rows with
  // trajectory). › trigger click = open the methodology side drawer
  // (always — its event handler stops propagation so it doesn't also
  // toggle the inline expand). Routing logic lives in handleRowClick.
  // Rich-content drawer detection — Bundle 2 indicator 2026-05-12. Drawer
  // keys that surface name lists / event logs / per-line detail get a
  // distinct accent icon to signal "depth lives behind this row" vs the
  // plain methodology drawers on most position metrics.
  const richDrawerSet = new Set([
    "dec83:daily_rate", "dec83:conditions", "dec83:enforcement",
    "dec83:operator_group", "dec83:nqs", "dec83:vacancy",
    "ccs_coverage",
    "cross_subtype_oshc", "cross_subtype_ldc",
    "schools_in_catchment",
    "provider_approval_scale",
  ]);
  const richMetricSet = new Set([
    // Metric drawers that resolve to rich content via renderMetricDrawer
    "sa2_school_count_total",
    "sa2_school_enrolment_total",
    "sa2_nes_share",          // top-N languages preview
    "sa2_overseas_born_share",// top-N countries of birth preview
  ]);
  const isRich = richDrawerSet.has(drawerKey) || richMetricSet.has(row.metric);
  const triggerIcon = isRich
    // Layers / list icon — visually distinct from the plain › chevron
    ? `<svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`
    : `›`;
  const triggerClass = isRich ? "l5-trigger rich" : "l5-trigger";
  const triggerTitle = isRich
    ? "Rich content drawer — names, list detail, or full breakdown"
    : "Methodology + detail";

  return `
    <div class="l5-row" onclick="handleRowClick(event, '${htmlEscape(drawerKey)}')" data-metric="${htmlEscape(row.metric || '')}" data-category="${htmlEscape(row.category || '')}">
      <div></div>
      <div class="l5-metric-name">
        <span class="display">${htmlEscape(row.display || row.metric || "—")}</span>
        <span class="badges">${badges}</span>
      </div>
      <div class="l5-value">${valueDisplay}${periodHtml}</div>
      <div class="l5-decile">${decileHtml}</div>
      <div class="l5-signal ${signalClass}">${v15Pending ? htmlEscape(v15Pending) : htmlEscape(row.signal || "—")}</div>
      <div class="l5-comm">${commHtml}</div>
      <div class="${triggerClass}" title="${triggerTitle}" onclick="event.stopPropagation(); openDrawer('${htmlEscape(drawerKey)}')">${triggerIcon}</div>
    </div>
  `;
}

// Routes a matrix row click. dec83:* keys (rich content like daily-rate
// grid / conditions / enforcement log / NQS / top-N) always open the side
// drawer because their content doesn't fit inline. metric:* keys
// (trajectory-bearing position metrics) inline-expand the chart panel.
// The › trigger has its own stopPropagation onclick so it always routes
// to the drawer regardless of row body behaviour.
function handleRowClick(event, drawerKey) {
  if (!drawerKey) return;
  if (drawerKey.startsWith("dec83:")) {
    openDrawer(drawerKey);
    return;
  }
  if (drawerKey.startsWith("metric:")) {
    toggleRowExpand(event.currentTarget, drawerKey);
    return;
  }
  // Fallback: drawer
  openDrawer(drawerKey);
}
window.handleRowClick = handleRowClick;

function toggleRowExpand(rowEl, drawerKey) {
  if (!rowEl || !drawerKey) return;
  const metric = drawerKey.slice("metric:".length);

  // If this row already has an expand panel right below it, toggle it
  // closed and return.
  const nextEl = rowEl.nextElementSibling;
  const isOurExpand = nextEl && nextEl.classList && nextEl.classList.contains("l5-row-expand")
                      && nextEl.dataset.metric === metric;
  if (isOurExpand) {
    nextEl.remove();
    rowEl.classList.remove("expanded");
    return;
  }

  // Close any other open expand (single-expand-at-a-time)
  document.querySelectorAll(".l5-row-expand").forEach(el => {
    const prev = el.previousElementSibling;
    if (prev && prev.classList && prev.classList.contains("l5-row")) {
      prev.classList.remove("expanded");
    }
    el.remove();
  });

  // Create the expand container as a sibling immediately after the row
  const expand = document.createElement("div");
  expand.className = "l5-row-expand";
  expand.dataset.metric = metric;
  rowEl.insertAdjacentElement("afterend", expand);

  // Render the chart panel. Pull the position entry; if no trajectory is
  // available, render a graceful fallback with a deep-link to the drawer.
  const posEntry = _findPosEntry(_CENTRE, metric);
  const hasTraj = posEntry && Array.isArray(posEntry.trajectory) && posEntry.trajectory.length >= 2;
  if (!hasTraj) {
    expand.innerHTML = `
      <div class="l5-row-expand-empty">
        No trajectory available for this metric yet.
        <a href="#" onclick="event.preventDefault(); openDrawer('${htmlEscape(drawerKey)}'); return false;">Open methodology drawer →</a>
      </div>
    `;
  } else {
    // Full v1 register inline (compact:false) + a per-row trend window
    // selector above the chart. The window state is local to this metric
    // (stored in _INLINE_RANGE_BY_METRIC) and defaults to the L3 page-
    // primary window. Allows the user to scope this chart independently
    // of L3/L4 without scrolling back up to their bars.
    expand.innerHTML = _renderInlineExpandPanel(metric, posEntry);
    _flushPendingCharts({ keepExisting: true });
  }

  rowEl.classList.add("expanded");

  // Smooth-scroll so the expanded chart enters the viewport, but keep the
  // row itself visible at the top so the user retains context.
  setTimeout(() => {
    const rect = rowEl.getBoundingClientRect();
    if (rect.top < 120 || rect.bottom > window.innerHeight - 120) {
      rowEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }, 60);
}
window.toggleRowExpand = toggleRowExpand;

// Per-row trend window state lives in _INLINE_RANGE_BY_METRIC. Default
// (absent key) means inherit the L3 page-primary window. When the user
// clicks a button in an inline-expand range bar, we store the override
// and re-render just that one expand panel without disturbing the rest
// of the page.
function _setInlineRange(metric, years) {
  _INLINE_RANGE_BY_METRIC[metric] = years;
  const expand = document.querySelector(`.l5-row-expand[data-metric="${CSS.escape(metric)}"]`);
  if (!expand) return;
  const posEntry = _findPosEntry(_CENTRE, metric);
  if (!posEntry) return;
  expand.innerHTML = _renderInlineExpandPanel(metric, posEntry);
  _flushPendingCharts({ keepExisting: true });
}
window._setInlineRange = _setInlineRange;

function _renderInlineExpandPanel(metric, posEntry) {
  const localRange = _INLINE_RANGE_BY_METRIC[metric];
  const effectiveRange = localRange != null ? localRange : _TRAJECTORY_RANGE_YEARS;
  const rangeBar = _renderInlineRangeBar(metric, effectiveRange);
  const chartHtml = _renderChartPanel(metric, posEntry, {
    compact: false,
    rangeYears: effectiveRange,
  });
  return `${rangeBar}${chartHtml}`;
}

function _renderInlineRangeBar(metric, currentYears) {
  const opts = [
    { years: 3,  label: "3Y" },
    { years: 5,  label: "5Y" },
    { years: 10, label: "10Y" },
    { years: 0,  label: "All" },
  ];
  const safeMetric = String(metric).replace(/'/g, "\\'");
  const btns = opts.map(o => {
    const active = (o.years === currentYears);
    return `<button class="range-btn${active ? " active" : ""}" onclick="event.stopPropagation(); _setInlineRange('${safeMetric}', ${o.years})">${o.label}</button>`;
  }).join("");
  return `
    <div class="traj-range-bar" style="position:static;margin-bottom:12px;">
      <span class="label">Trend window</span>
      <div class="btns">${btns}</div>
      <span style="margin-left:auto;font-size:10.5px;color:var(--text-mute);">applies to this chart only</span>
    </div>
  `;
}

function signalClassForRow(row) {
  if (row.v15_pending) return "pending";
  // Industry band keys → colour mapping
  const cautionKeys = new Set(["saturated", "soft", "tight", "constrained", "severe", "desert", "undersupplied"]);
  const positiveKeys = new Set(["well_served", "viable", "strong", "balanced", "at_target", "at_bench"]);
  const ib = (row.industry_band || "").toLowerCase();
  if (cautionKeys.has(ib)) return "low";
  if (positiveKeys.has(ib)) return "high";
  // Fall back to band low/mid/high
  if (row.band === "low") return "low";
  if (row.band === "high") return "high";
  if (row.band === "mid") return "mid";
  return "neutral";
}

function renderDecileStrip(decile, band, cohortN) {
  if (decile == null) return `<span style="color:var(--text-mute);font-size:11px;">—</span>`;
  const cells = [];
  for (let i = 1; i <= 10; i++) {
    const isActive = (i === decile);
    let cls = "cell";
    if (isActive) {
      cls += " active " + (i <= 3 ? "low" : i <= 6 ? "mid" : "high");
    }
    cells.push(`<span class="${cls}"></span>`);
  }
  return `
    <div class="l5-decile-strip">${cells.join("")}</div>
    <span>D${decile}${cohortN ? ` · n=${cohortN}` : ""}</span>
  `;
}

function scrollToCategory(cat) {
  const target = document.getElementById(`cat-${cat}`);
  if (target) {
    target.scrollIntoView({behavior: "smooth", block: "start"});
  }
}

// ── Layer 6 Drawer infrastructure ────────────────────────────────────
function openDrawer(drawerKey) {
  if (!drawerKey || !_CENTRE) return;
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("drawer-overlay");
  const titleEl = document.getElementById("drawer-title");
  const subEl = document.getElementById("drawer-subtitle");
  const bodyEl = document.getElementById("drawer-body");

  const content = renderDrawerContent(drawerKey, _CENTRE);
  titleEl.textContent = content.title;
  subEl.textContent = content.subtitle || "";
  bodyEl.innerHTML = content.html;

  drawer.classList.add("drawer-open");
  drawer.setAttribute("aria-hidden", "false");
  overlay.classList.add("drawer-overlay-open");

  // URL fragment for shareable state
  history.replaceState(null, "", "#" + drawerKey);
  bodyEl.scrollTop = 0;
}

function closeDrawer() {
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("drawer-overlay");
  drawer.classList.remove("drawer-open");
  drawer.setAttribute("aria-hidden", "true");
  overlay.classList.remove("drawer-overlay-open");
  if (location.hash.startsWith("#dec83:") || location.hash.startsWith("#metric:")) {
    history.replaceState(null, "", location.pathname + location.search);
  }
}

function renderDrawerContent(drawerKey, centre) {
  // dec83:* keys → payload.drawer[key]
  if (drawerKey.startsWith("dec83:")) {
    const data = (centre.drawer || {})[drawerKey];
    if (!data) {
      return {title: drawerKey, subtitle: "", html: `<div class="state-msg">No drawer content available for ${htmlEscape(drawerKey)}.</div>`};
    }
    const topic = drawerKey.slice(6);
    return renderDec83Drawer(topic, data, centre);
  }
  // metric:* keys → derive from position
  if (drawerKey.startsWith("metric:")) {
    const metric = drawerKey.slice(7);
    return renderMetricDrawer(metric, centre);
  }
  // cross_subtype_oshc / cross_subtype_ldc → list services in catchment
  // (transition pathway for LDC subject, feeder pipeline for OSHC subject).
  // OSHC services include their nearest-school attachment status from
  // _compute_cross_subtype_competition (proximity match against
  // acara_schools, 300m threshold).
  if (drawerKey === "cross_subtype_oshc" || drawerKey === "cross_subtype_ldc") {
    const xs = centre.cross_subtype_competition || {};
    const services = xs.services || [];
    const titleSubtype = drawerKey === "cross_subtype_oshc" ? "Outside School Hours Care" : "Long Day Care";
    if (!services.length) {
      return {
        title: `${titleSubtype} in catchment`,
        subtitle: xs.target_label || "Comparable services",
        html: `<div class="state-msg">No ${xs.target_subtype || "comparable"} services currently active in this catchment SA2.</div>`,
      };
    }
    const isOshc = drawerKey === "cross_subtype_oshc";
    const rows = services.map(s => {
      const schoolLine = isOshc && s.nearest_school
        ? (s.school_attached
            ? `<span style="color:rgba(110,200,145,0.95);">▣ At <b>${htmlEscape(s.nearest_school.school_name)}</b></span> <span style="color:var(--text-mute);font-size:10.5px;">(${s.nearest_school_distance_m}m · ${htmlEscape(s.nearest_school.sector || "—")})</span>`
            : `<span style="color:var(--text-mute);">Stand-alone · nearest school ${htmlEscape(s.nearest_school.school_name)} ${s.nearest_school_distance_m != null ? `(${Math.round(s.nearest_school_distance_m)}m away)` : ""}</span>`)
        : "";
      return `
        <div class="drawer-list-row" onclick="window.location.href='centre_v2.html?id=${s.service_id}'" style="cursor:pointer;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:3px;">
            <span style="color:var(--text);font-weight:500;font-size:13px;">${htmlEscape(s.service_name)}</span>
            ${s.fee != null
              ? `<span style="color:var(--text);font-variant-numeric:tabular-nums;font-size:12.5px;"><b>$${Math.round(s.fee)}</b><span style="color:var(--text-mute);font-size:11px;">/day</span></span>`
              : `<span style="color:var(--text-mute);font-size:11px;font-style:italic;">fee pending</span>`}
          </div>
          <div style="display:flex;gap:14px;font-size:11.5px;color:var(--text-mute);flex-wrap:wrap;">
            <span>${s.places != null ? `${s.places} places` : "places —"}</span>
            <span>${s.nqs_overall ? htmlEscape(s.nqs_overall) : "Not yet rated"}</span>
            ${s.large_provider_name ? `<span>${htmlEscape(s.large_provider_name)}</span>` : ""}
          </div>
          ${schoolLine ? `<div style="margin-top:4px;font-size:11px;">${schoolLine}</div>` : ""}
        </div>
      `;
    }).join("");
    const framing = xs.framing || "";
    const attachedNote = (isOshc && xs.n_school_attached != null)
      ? `<div style="font-size:11px;color:var(--text-mute);margin-top:6px;">School-attached detection: ${xs.n_school_attached} of ${xs.count} services co-located with a school within ${xs.attach_threshold_m}m (ACARA School Location 2025 proximity match).</div>`
      : "";
    return {
      title: `${titleSubtype} in catchment`,
      subtitle: `${xs.count} service${xs.count === 1 ? "" : "s"} · ${xs.total_places.toLocaleString()} total approved places`,
      html: `
        ${framing ? `<div class="drawer-section"><div style="font-size:12.5px;color:var(--text-dim);line-height:1.55;font-style:italic;">${htmlEscape(framing)}</div>${attachedNote}</div>` : ""}
        <div class="drawer-section">
          <div class="drawer-section-head">Services (click any to open its centre page)</div>
          <div class="drawer-list">${rows}</div>
        </div>
      `,
    };
  }

  // schools_in_catchment → Bundle 2 main item. Per-school list with
  // names + sectors + types + enrolments + ICSEA. From the new
  // acara_schools row-level table.
  if (drawerKey === "schools_in_catchment") {
    const sc = centre.schools_in_catchment || {};
    const schools = sc.schools || [];
    if (!schools.length) {
      return {
        title: "Schools in catchment",
        subtitle: "",
        html: `<div class="state-msg">No schools currently mapped to this SA2 in the ACARA School Location 2025 ingest.</div>`,
      };
    }
    // Group by sector for skim-readability
    const bySector = { Government: [], Catholic: [], Independent: [], Other: [] };
    for (const s of schools) {
      (bySector[s.sector] || bySector.Other).push(s);
    }
    const renderSchool = (s) => `
      <div class="drawer-list-row" style="cursor:default;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:3px;">
          <span style="color:var(--text);font-weight:500;font-size:13px;">${htmlEscape(s.school_name)}</span>
          ${s.enrolments_total != null
            ? `<span style="color:var(--text);font-variant-numeric:tabular-nums;font-size:12.5px;"><b>${s.enrolments_total.toLocaleString()}</b><span style="color:var(--text-mute);font-size:11px;"> students</span></span>`
            : `<span style="color:var(--text-mute);font-size:11px;font-style:italic;">enrolment unavailable</span>`}
        </div>
        <div style="display:flex;gap:14px;font-size:11.5px;color:var(--text-mute);flex-wrap:wrap;">
          <span>${htmlEscape(s.school_type || "—")}</span>
          <span>${htmlEscape(s.sector || "—")}</span>
          ${s.icsea != null ? `<span>ICSEA ${s.icsea}</span>` : ""}
          <span>${htmlEscape(s.suburb || "")} ${htmlEscape(s.postcode || "")}</span>
        </div>
      </div>
    `;
    const sections = Object.keys(bySector)
      .filter(sec => bySector[sec].length > 0)
      .map(sec => `
        <div class="drawer-section">
          <div class="drawer-section-head">${htmlEscape(sec)} (${bySector[sec].length})</div>
          <div class="drawer-list">${bySector[sec].map(renderSchool).join("")}</div>
        </div>
      `).join("");
    return {
      title: "Schools in catchment",
      subtitle: `${schools.length} school${schools.length === 1 ? "" : "s"} located in this SA2 (ACARA School Location 2025)`,
      html: sections,
    };
  }

  // ccs_coverage → derived from top-level payload.ccs_coverage block
  if (drawerKey === "ccs_coverage") {
    const ccs = centre.ccs_coverage || {};
    const html = `
      <div class="drawer-section">
        <div class="drawer-section-head">Estimated value</div>
        <div style="font-size:28px;font-weight:600;color:var(--text);">
          ${ccs.value_pct != null ? Number(ccs.value_pct).toFixed(1) + "%" : "—"}
        </div>
        <div style="font-size:12px;color:var(--text-mute);margin-top:4px;">
          Band: <b>${htmlEscape(ccs.band || "—")}</b> · DER
        </div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-head">Inputs</div>
        <div class="drawer-kv-row"><span>Median weekly household income</span><b>$${ccs.median_weekly_aud != null ? Number(ccs.median_weekly_aud).toFixed(0) : "—"}/wk</b></div>
        <div class="drawer-kv-row"><span>Annualised</span><b>$${ccs.median_annual_aud != null ? Number(ccs.median_annual_aud).toLocaleString() : "—"}/yr</b></div>
        <div class="drawer-kv-row"><span>CCS full-benefit threshold</span><b>$${ccs.threshold_aud != null ? Number(ccs.threshold_aud).toLocaleString() : "—"}/yr</b></div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-head">Methodology</div>
        <div style="font-size:12.5px;color:var(--text-dim);line-height:1.5;">
          ${htmlEscape(ccs.methodology || "")}
        </div>
      </div>
    `;
    return {title: "CCS full-benefit coverage", subtitle: "Catchment affordability — derived", html};
  }
  return {title: drawerKey, subtitle: "", html: `<div class="state-msg">Unknown drawer key: ${htmlEscape(drawerKey)}.</div>`};
}
