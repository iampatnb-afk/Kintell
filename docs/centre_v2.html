<script>
const API = "/api";
const params = new URLSearchParams(location.search);
const SERVICE_ID = params.get("id");
const EMBED = params.get("embed") === "1";
if (EMBED) document.body.classList.add("embed");

let _CENTRE = null;  // last-loaded payload, used for drawer lookups

// ── Helpers ─────────────────────────────────────────────────────────
function htmlEscape(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"]/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function fmtN(n) {
  if (n == null) return "—";
  return Number(n).toLocaleString();
}
function fmtPct(n, decimals=1) {
  if (n == null || n === "") return "—";
  return Number(n).toFixed(decimals) + "%";
}
function fmtCurrency(n, prefix="$") {
  if (n == null) return "—";
  return prefix + Number(n).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
}
function fmtRatio(n, decimals=2) {
  if (n == null) return "—";
  return Number(n).toFixed(decimals) + "×";
}
// Bundle B #1 — within-SA2 peer-cohort range bar. Renders a slim horizontal
// range with p25/median/p75 ticks and a marker at currentValue. cohort
// payload shape: {n, min, p25, median, p75, max, meaningful} per
// _cohort_for_places / _cohort_for_daily_rate in centre_page.py. Returns
// empty string when cohort is missing, meaningful=false, currentValue null,
// or span is zero — caller can splat the result safely either way.
// Soft inferential read of the centre's combined size + price positioning
// against the SA2 cohort. Returns a short italic phrase (or empty string
// when neither cohort is meaningful). Tiered by p33/p66 of each cohort.
//
//   small + cheaper   → "Smaller + cheaper · likely budget operator"
//   small + pricier   → "Smaller + premium · likely quality/boutique positioning"
//   large + cheaper   → "Larger + cheaper · scale-budget positioning"
//   mid + mid         → "Mid-market on both size and price"
//   ... etc. When daily-rate cohort isn't meaningful, returns size-only phrasing.
function _positioningInference(placesCohort, placesValue, drCohort, drValue) {
  const tier = (cohort, v) => {
    if (!cohort || !cohort.meaningful || v == null) return null;
    const span = cohort.max - cohort.min;
    if (!(span > 0)) return null;
    const p = (v - cohort.min) / span;
    if (p < 0.33) return "low";
    if (p < 0.66) return "mid";
    return "high";
  };
  const sizeT = tier(placesCohort, placesValue);
  const priceT = tier(drCohort, drValue);
  if (!sizeT && !priceT) return "";
  // Daily-rate cohort missing: places-only phrasing
  if (!priceT) {
    if (sizeT === "low")  return "Smaller than SA2 peers · daily-rate cohort pending";
    if (sizeT === "high") return "Larger than SA2 peers · daily-rate cohort pending";
    return "Mid-cohort on size · daily-rate cohort pending";
  }
  // Places cohort missing: price-only phrasing
  if (!sizeT) {
    if (priceT === "low")  return "Cheaper than SA2 peers";
    if (priceT === "high") return "Pricier than SA2 peers";
    return "Mid-market on price";
  }
  // Both present
  const key = `${sizeT}-${priceT}`;
  return ({
    "low-low":   "Smaller + cheaper · likely budget operator",
    "low-mid":   "Smaller scale · mid-market on price",
    "low-high":  "Smaller + premium · likely quality / boutique positioning",
    "mid-low":   "Mid-size · cheaper than peers",
    "mid-mid":   "Sits mid-market on both size and price",
    "mid-high":  "Mid-size · premium on price",
    "high-low":  "Larger + cheaper · scale-budget positioning",
    "high-mid":  "Larger scale · mid-market on price",
    "high-high": "Larger + premium · top-of-market positioning",
  })[key] || "";
}

function _renderPeerRangeBar(cohort, currentValue, opts) {
  if (!cohort || !cohort.meaningful) return "";
  if (currentValue == null) return "";
  opts = opts || {};
  const fmt = opts.fmt || (v => Math.round(v).toLocaleString());
  const span = cohort.max - cohort.min;
  if (!(span > 0)) return "";
  const clamped = Math.max(cohort.min, Math.min(cohort.max, currentValue));
  const pct = (v) => ((v - cohort.min) / span) * 100;
  const captionPrefix = opts.captionPrefix || "SA2 cohort";
  // Competitor dots — one per value in the cohort. Skip values that match
  // the current centre (the marker covers them) within a 2% tolerance.
  const peerDots = (cohort.values || [])
    .filter(v => Math.abs(((v - clamped) / span) * 100) > 2)
    .map(v => `<div class="peer-dot" style="left: ${pct(v)}%;" title="${fmt(v)}"></div>`)
    .join("");
  return `
    <div class="tile-range-bar">
      <div class="tile-range-track">
        ${peerDots}
        <div class="tick" style="left: ${pct(cohort.p25)}%;" title="25th pctile: ${fmt(cohort.p25)}"></div>
        <div class="tick" style="left: ${pct(cohort.median)}%;" title="Median: ${fmt(cohort.median)}"></div>
        <div class="tick" style="left: ${pct(cohort.p75)}%;" title="75th pctile: ${fmt(cohort.p75)}"></div>
        <div class="tile-range-marker" style="left: ${pct(clamped)}%;" title="This centre: ${fmt(currentValue)}"></div>
      </div>
      <div class="tile-range-meta">
        <span>${fmt(cohort.min)}</span>
        <span>${fmt(cohort.max)}</span>
      </div>
      <div class="tile-range-caption">${htmlEscape(captionPrefix)}, n=${cohort.n}</div>
    </div>
  `;
}
function fmtValue(v, format) {
  if (v == null || v === "") return "—";
  switch(format) {
    case "percent":
    case "percent_share":
      return fmtPct(v);
    case "currency_weekly":
      return fmtCurrency(v) + "/wk";
    case "currency_annual":
      return fmtCurrency(v);
    case "currency_daily":
      return fmtCurrency(v) + "/day";
    case "ratio_x":
      return fmtRatio(v);
    case "int":
      return fmtN(Math.round(Number(v)));
    case "bool":
      return v === true ? "Yes" : (v === false ? "No" : "—");
    case "ratio_x_of_y":
    case "text":
    case "date":
    default:
      return htmlEscape(String(v));
  }
}

// ── Methodology legend bar (top of page, sets analytical tone) ─────
function renderMethodologyLegend() {
  return `
    <div class="methodology-legend">
      <span class="label">Methodology</span>
      <span><span class="ml-tag obs">OBS</span>Observed — primary-source data</span>
      <span><span class="ml-tag der">DER</span>Derived — transparent formula</span>
      <span><span class="ml-tag com">COM</span>Commentary — rule-based interpretation</span>
    </div>
  `;
}

// ── Layer 1 Header ──────────────────────────────────────────────────
function renderL1Header(centre) {
  const h = centre.header || {};
  const dec83 = centre.dec83 || {};
  const lp = dec83.large_provider;
  const snap = dec83.regulatory_snapshot || {};
  const addr = h.address || {};
  const addressParts = [addr.address_line, addr.suburb, addr.state, addr.postcode].filter(x => x);

  const places = centre.places || {};
  const subtype = places.service_sub_type || {};
  const catchment = centre.catchment || {};
  const ownership = h.parent_group?.ownership_type_code;
  const ownershipLabel = h.parent_group?.ownership_type_label;

  // Operator deep-link (centre → group hierarchy)
  const grpId = h.parent_group?.group_id;
  const grpName = h.parent_group?.name;
  const operatorLink = grpId
    ? `<a href="operator.html?id=${grpId}">${htmlEscape(grpName || "Operator")}</a>`
    : `<span>${htmlEscape(grpName || "—")}</span>`;

  // Ownership badge (Private/NFP/Government)
  let ownershipBadge = "";
  if (ownershipLabel) {
    const cls = ownership === "for_profit" ? "profit"
              : ownership === "not_for_profit" ? "nfp"
              : ownership === "government" ? "gov" : "muted";
    ownershipBadge = `<span class="l1-badge ${cls}">${htmlEscape(ownershipLabel)}</span>`;
  }

  // Brand badge
  const brandBadge = h.brand?.name
    ? `<span class="l1-badge muted">brand: ${htmlEscape(h.brand.name)}</span>`
    : `<span class="l1-badge no-brand">no brand</span>`;

  // Operator-group chain chip (DEC-83)
  const lpChip = lp ? `
    <span class="l1-chip" onclick="openDrawer('dec83:operator_group')" title="Click for chain detail">
      ${htmlEscape(lp.name)}
      <span class="l1-chip-mini">${lp.provider_count} prov · ${lp.service_count} svc</span>
    </span>
  ` : "";

  // Identity tiles row — places / daily-rate / subtype / SEIFA / remoteness / tenure / kinder
  const placesValue = places.approved_places?.value;
  const placesCohort = places.approved_places?.cohort;

  // Daily-rate tile (Bundle B #1 + Layer 1 rich-identity per feedback memo) —
  // headline pair = full_day × 36m-preschool for LDC/FDC/Preschool;
  // before_school × school-age for OSHC, mirroring chart 7 selection.
  // Renders placeholder state when this centre is outside the DEC-83 pilot
  // SA2 footprint so the layout doesn't orphan the slot pre national scale-up.
  const subtypeCodeUpper = (centre.header?.service_sub_type
                            || subtype?.code || "").toUpperCase();
  const isOshcSubtype = subtypeCodeUpper.includes("OSHC") || subtypeCodeUpper.includes("OUTSIDE");
  const drAge = isOshcSubtype ? "school-age" : "36m-preschool";
  const drSession = isOshcSubtype ? "before_school" : "full_day";
  const drCellKey = `${drAge}|${drSession}`;
  const drCells = (centre.dec83?.fees?.by_age_band_session) || [];
  const drCurrentCell = drCells.find(c => c.age_band === drAge && c.session_type === drSession);
  const drCurrentValue = drCurrentCell?.median_fee;
  const drCohort = (centre.dec83?.fees?.cohort_by_age_band_session || {})[drCellKey];
  const drFmt = v => "$" + Number(v).toFixed(0);

  // Inferential captions removed 2026-05-12 per Patrick: "I don't think
  // we need the comments underneath mid-size premium on price… you can
  // have a little bit more real estate. Potentially, you can make that
  // line a little more legible with the other competitors along it."
  // The positioning narrative now lives in the Layer 1.5 commentary block.

  const tileApprovedPlaces = placesValue != null
    ? `<div class="l1-tile">
        <div class="tile-value">${fmtN(placesValue)}</div>
        <div class="tile-label">Approved places</div>
        ${_renderPeerRangeBar(placesCohort, placesValue, { fmt: v => Math.round(v).toLocaleString() })}
      </div>` : "";

  const tileDailyRate = drCurrentValue != null
    ? `<div class="l1-tile">
        <div class="tile-value">${drFmt(drCurrentValue)}<span class="tile-qualifier">/day</span></div>
        <div class="tile-label">Daily rate · ${htmlEscape(drSession.replace("_", " "))} ${htmlEscape(drAge)}</div>
        ${_renderPeerRangeBar(drCohort, drCurrentValue, { fmt: drFmt })}
      </div>`
    : `<div class="l1-tile">
        <div class="tile-value tile-value-sm" style="color:var(--text-mute);">—</div>
        <div class="tile-label">Daily rate</div>
        <div class="tile-placeholder-note">Pending national<br>DEC-83 scale-up</div>
      </div>`;
  const subtypeText = subtype.label || "—";
  const subtypeCode = subtype.code ? `(${subtype.code})` : "";
  const tileSubtype = `<div class="l1-tile">
      <div class="tile-value tile-value-sm">${htmlEscape(subtypeText)} <span class="tile-qualifier">${htmlEscape(subtypeCode)}</span></div>
      <div class="tile-label">Subtype</div>
    </div>`;
  const seifaVal = catchment.seifa_decile?.value;
  const seifaDesc = catchment.seifa_decile?.description;
  const tileSeifa = seifaVal != null
    ? `<div class="l1-tile">
        <div class="tile-value">${seifaVal}<span class="tile-qualifier">/10</span></div>
        <div class="tile-label">SEIFA decile</div>
        ${seifaDesc ? `<div class="tile-caption">${htmlEscape(seifaDesc)}</div>` : ""}
      </div>` : "";
  const tileRemoteness = catchment.remoteness?.label
    ? `<div class="l1-tile">
        <div class="tile-value tile-value-sm">${htmlEscape(catchment.remoteness.label)}</div>
        <div class="tile-label">Remoteness</div>
      </div>` : "";

  // Tenure tile (Bundle B #3 — relocated from carryover renderTenureCard to
  // Layer 1 per Patrick's "Layer 1 = rich identity" framing in
  // feedback_centre_top_identity.md). Brownfield/Greenfield label + the
  // operative date (transfer for brownfield, approval for greenfield).
  const tenure = centre.tenure || {};
  const isBrown = tenure.status === "brownfield";
  const tenureDate = isBrown ? tenure.transfer_date : tenure.approval_granted_date;
  const tenureDateLabel = isBrown ? "transferred" : "approved";
  const tenureMonths = isBrown ? tenure.months_since_transfer : null;
  const tileTenure = tenure.label
    ? `<div class="l1-tile">
        <div class="tile-value tile-value-sm">${htmlEscape(tenure.label)}</div>
        <div class="tile-label">Tenure</div>
        ${tenureDate ? `<div class="tile-caption">${tenureDateLabel} ${htmlEscape(formatMonYYYY(tenureDate))}${tenureMonths != null ? ` · ${tenureMonths}m ago` : ""}</div>` : ""}
      </div>` : "";

  // Kinder tile — dual signals visible side-by-side so reader sees both:
  //   (a) ACECQA-record kinder approved (OBS, places.kinder_approved.value)
  //   (b) Name-match kinder (DER, places.kinder_name_match.value)
  // Agreement = strong evidence; ACECQA-only = official; name-only = soft
  // (caveat surfaced in drawer); neither = not flagged.
  const kAcecqa = places.kinder_approved?.value === true;
  const kName = places.kinder_name_match?.value === true;
  const kSummary = places.kinder_summary || {};
  const kHeadline = kSummary.headline || (kAcecqa || kName ? "Kinder evidence" : "Not flagged");
  const kAcecqaRow = `
    <div class="kinder-signal ${kAcecqa ? "positive" : "negative"}">
      <span class="glyph">${kAcecqa ? "✓" : "—"}</span>
      <span class="name">ACECQA</span>
      <span class="src">OBS</span>
    </div>`;
  const kNameRow = `
    <div class="kinder-signal ${kName ? "positive" : "negative"}">
      <span class="glyph">${kName ? "✓" : "—"}</span>
      <span class="name">Name match</span>
      <span class="src">DER</span>
    </div>`;
  const tileKinder = `<div class="l1-tile">
        <div class="tile-value tile-value-sm">${htmlEscape(kHeadline)}</div>
        <div class="tile-label">Kinder</div>
        <div class="kinder-signals">
          ${kAcecqaRow}
          ${kNameRow}
        </div>
      </div>`;

  // CCS Coverage Ratio tile — catchment affordability signal. Pricing surface
  // lens: high coverage → most catchment households receive full CCS benefit,
  // so fee headroom is constrained by the subsidy ceiling rather than family
  // discretionary income. Click opens drawer with the lognormal methodology.
  const ccs = centre.ccs_coverage || {};
  const ccsPct = ccs.value_pct;
  const ccsBand = ccs.band;
  const tileCcs = ccsPct != null
    ? `<div class="l1-tile" onclick="openDrawer('ccs_coverage')" style="cursor:pointer;" title="Click for methodology">
        <div class="tile-value">${ccsPct.toFixed(0)}<span class="tile-qualifier">%</span></div>
        <div class="tile-label">CCS full-benefit coverage</div>
        <div class="tile-caption">${htmlEscape(ccsBand || "—")} band · est. on $${(ccs.median_annual_aud/1000).toFixed(0)}K median income</div>
      </div>`
    : `<div class="l1-tile">
        <div class="tile-value tile-value-sm" style="color:var(--text-mute);">—</div>
        <div class="tile-label">CCS full-benefit coverage</div>
        <div class="tile-placeholder-note">Median household income not available</div>
      </div>`;

  // NQS rating tile — Patrick 2026-05-12: 3-part NQS card from the
  // carryover block (Overall rating + Rating issued + Inspection cadence)
  // relocates to Layer 1 as a tile. Click opens a drawer with the full
  // NQS history.
  const nqs = centre.nqs || {};
  const nqsRating = nqs.overall_rating?.value || null;
  const nqsIssued = nqs.rating_issued_date?.value || null;
  const nqsCadence = nqs.inspection_cadence || {};
  const nqsRatingClass = (() => {
    const r = String(nqsRating || "").toLowerCase();
    if (r.includes("exceeding")) return "exceeding";
    if (r.includes("meeting")) return "meeting";
    if (r.includes("working towards")) return "working-towards";
    if (r.includes("significant")) return "significant";
    if (r.includes("provisional")) return "provisional";
    return "none";
  })();
  const nqsCadenceClass = ({
    current: "green", due_soon: "amber", stale: "red", no_rating: "grey",
  })[nqsCadence.status] || "grey";
  const tileNqs = nqsRating
    ? `<div class="l1-tile">
        <div class="tile-value-pill nqs-pill ${nqsRatingClass}">${htmlEscape(nqsRating)}</div>
        <div class="tile-label">NQS rating</div>
        <div class="tile-caption">${nqsIssued ? `Issued ${htmlEscape(formatMonYYYY(nqsIssued))}` : "Issue date —"}</div>
        ${nqsCadence.label ? `<div class="tile-nqs-cadence ${nqsCadenceClass}">${htmlEscape(nqsCadence.label)}</div>` : ""}
      </div>`
    : `<div class="l1-tile">
        <div class="tile-value tile-value-sm" style="color:var(--text-mute);">Not rated</div>
        <div class="tile-label">NQS rating</div>
      </div>`;

  // Service offerings (ACECQA) tile — Patrick 2026-05-12: ACECQA's
  // per-service-type breakdown for the centre (Preschool standalone /
  // in school, OSHC before / after / vacation, Other). 2-column-wide
  // tile underneath the main row.
  const so = places.service_offerings || {};
  const offeringRows = [
    ["Preschool/Kindergarten — Part of a School", so.preschool_in_school],
    ["Preschool/Kindergarten — Stand alone",       so.preschool_standalone],
    ["Outside School Hours Care — Before School",  so.oshc_before_school],
    ["Outside School Hours Care — After School",   so.oshc_after_school],
    ["Outside School Hours Care — Vacation Care",  so.oshc_vacation_care],
    ["Other",                                       so.other],
  ];
  const _offeringNorm = (v) => {
    if (v == null || v === "") return { class: "na", text: "—" };
    const s = String(v).trim().toLowerCase();
    if (s === "yes" || s === "true" || s === "1" || s === "y") return { class: "yes", text: "Yes" };
    if (s === "no"  || s === "false"|| s === "0" || s === "n") return { class: "no",  text: "No"  };
    return { class: "na", text: String(v) };
  };
  const offeringRowsHtml = offeringRows.map(([name, val]) => {
    const v = _offeringNorm(val);
    return `<div class="name">${htmlEscape(name)}</div><div class="val ${v.class}">${htmlEscape(v.text)}</div>`;
  }).join("");
  const offeringsSourceLine = so.snapshot_quarter
    ? `Source: ACECQA NQAITS · ${htmlEscape(so.snapshot_quarter)} snapshot`
    : `Source: ACECQA NQAITS`;
  const tileServiceOfferings = `<div class="l1-tile span-2">
        <div class="tile-value tile-value-sm">Service offerings (ACECQA)</div>
        <div class="tile-label">What this centre offers</div>
        <div class="offerings-grid">${offeringRowsHtml}</div>
        <div class="offerings-source">${offeringsSourceLine}</div>
      </div>`;

  const tilesHtml = `
    <div class="l1-tiles">
      ${tileApprovedPlaces}${tileDailyRate}${tileCcs}${tileNqs}${tileSubtype}${tileSeifa}${tileRemoteness}${tileTenure}${tileKinder}${tileServiceOfferings}
    </div>
  `;

  // Tag chips (acecqa SAN / abr legal name / google search link)
  const san = h.service_approval_number;
  const entity = h.entity?.legal_name;
  const tags = [];
  if (san) tags.push(`<span class="l1-tag" title="ACECQA service approval number"><span class="key">acecqa:</span><span class="val">${htmlEscape(san)}</span></span>`);
  if (entity) tags.push(`<span class="l1-tag" title="Australian Business Register legal name"><span class="key">abr:</span><span class="val">${htmlEscape(entity)}</span></span>`);
  if (h.service_name) {
    const q = encodeURIComponent(`${h.service_name} ${addr.suburb || ''} childcare`);
    tags.push(`<a class="l1-tag" href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener" title="External search lookup"><span class="val">google</span></a>`);
  }
  const tagsHtml = tags.length ? `<div class="l1-tags">${tags.join("")}</div>` : "";

  const hoursLine = snap.hours_summary ? `
    <div class="l1-hours">
      <span class="label">Hours</span>
      <span>${htmlEscape(snap.hours_summary)}</span>
    </div>
  ` : "";

  const contactItems = [];
  if (snap.website_url) contactItems.push(`<a href="${htmlEscape(snap.website_url)}" target="_blank" rel="noopener">Website</a>`);
  if (snap.phone) contactItems.push(htmlEscape(snap.phone));
  if (snap.email) contactItems.push(`<a href="mailto:${htmlEscape(snap.email)}">${htmlEscape(snap.email)}</a>`);
  const contactLine = contactItems.length ? `
    <div class="l1-contact">${contactItems.join(' <span class="sep">·</span> ')}</div>
  ` : "";

  // Layer 1 reverted from the L1+L2 merge (Patrick 2026-05-12 reversal).
  // Intelligence panel returns to its full-width position below L1 with
  // the full sub-metric depth restored via the standalone renderL2Executive
  // call in the main render() flow.
  return `
    <section class="l1-header">
      <h2 class="l1-name">${htmlEscape(h.service_name || "Centre")}</h2>
      <div style="color:var(--text-dim);font-size:13px;margin-top:6px;">
        ${addressParts.length ? htmlEscape(addressParts.join(', ')) : ""}
      </div>
      <div class="l1-provider">
        <span class="label">operator:</span> ${operatorLink}
        ${ownershipBadge}
        ${brandBadge}
        ${entity ? `<span class="label" style="margin-left:8px;">entity:</span> <span style="color:var(--text);">${htmlEscape(entity)}</span>` : ""}
        ${lpChip}
      </div>
      ${tilesHtml}
      ${(() => {
        const sa2 = catchment.sa2 || {};
        if (sa2.code || sa2.name) {
          const parts = [];
          if (sa2.code) parts.push(`<b>${htmlEscape(sa2.code)}</b>`);
          if (sa2.name) parts.push(htmlEscape(sa2.name));
          return `<div class="l1-sa2"><span class="label">Catchment SA2:</span> ${parts.join(' — ')}</div>`;
        }
        return "";
      })()}
      ${tagsHtml}
      ${hoursLine}
      ${contactLine}
    </section>
  `;
}

// Layer 2 intelligence — compact sidebar variant for embedding in Layer 1
// (Patrick queue #3 2026-05-12). Renders the same payload as
// renderL2Executive but in a vertically-stacked tile list with only the
// headline summary per tile (sub-metric depth lives in the matrix below).
// Click any tile to scroll to its matrix category. Flag bar sits at the
// bottom of the sidebar. When executive payload is missing, returns an
// empty string so the grid collapses to identity-only gracefully.
function renderL2Sidebar(centre) {
  const exec = centre.executive || {};
  if (!exec.signals && !exec.headline) return "";
  const tilesHtml = (exec.signals || []).map(s => `
    <div class="l2-sidebar-tile" onclick="handleSignalClick('${htmlEscape(s.links_to || '')}')" title="${htmlEscape(s.label)} — click to scroll to matrix category">
      <span class="l2-sidebar-tile-label">${htmlEscape(s.label)}</span>
      <span class="l2-sidebar-tile-summary">${htmlEscape(s.summary || "—")}</span>
    </div>
  `).join('');
  const flags = exec.flags || {visible: [], spillover_count: 0};
  const flagsHtml = (flags.visible || []).map(f => `
    <span class="l2-flag ${f.severity}" onclick="handleFlagClick('${htmlEscape(f.links_to || '')}')" title="${htmlEscape(f.label)}">
      ${htmlEscape(f.label)}
    </span>
  `).join('');
  const spilloverHtml = (flags.spillover_count > 0)
    ? `<span class="l2-flag-spillover" onclick="scrollToCategory('quality')">+${flags.spillover_count} more</span>`
    : "";
  const flagsBlock = (flags.visible.length || flags.spillover_count)
    ? `<div class="l2-sidebar-flags">${flagsHtml}${spilloverHtml}</div>`
    : "";
  return `
    <aside class="l2-sidebar">
      <div class="l2-sidebar-head">Intelligence</div>
      ${exec.headline ? `<div class="l2-sidebar-headline">${htmlEscape(exec.headline)}</div>` : ""}
      <div class="l2-sidebar-tiles">${tilesHtml}</div>
      ${flagsBlock}
    </aside>
  `;
}

// ── Layer 1.5 — Competitive positioning panel ──────────────────────
// Bubble chart: x = daily fee, y = NQS rating band, bubble size = approved
// places, colour = NQS rating (muted institutional palette per Patrick spec),
// subject centre highlighted accent + larger. CCS hourly-cap reference line
// at ~$137. Hover surfaces a popover + the narrative strip below the chart
// swaps to a "vs subject centre" comparison with inferential read.
//
// State: l15 toggles live in module-scope object _L15_TOGGLES.
const _L15_TOGGLES = {
  market_avg:      false,
  fade_by_age:     false,
  cluster_op:      false,
  compact:         false,
};

// Muted institutional NQS palette (Patrick 2026-05-12 spec direction)
const _L15_NQS_COLOUR = {
  "Excellent":                          "#2d6a4f",   // deep muted green
  "Exceeding NQS":                      "#52b788",   // soft green
  "Exceeding National Quality Standard":"#52b788",
  "Meeting NQS":                        "#5a8aa6",   // muted blue
  "Meeting National Quality Standard":  "#5a8aa6",
  "Working Towards NQS":                "#e07a4f",   // soft amber
  "Working Towards National Quality Standard": "#e07a4f",
  "Significant Improvement Required":   "#bf4040",   // muted red
  "Provisional":                        "#7a7a8a",
  "Not yet rated":                      "#5a5a6a",
};
const _L15_NQS_ORDER = [
  "Excellent",
  "Exceeding NQS",
  "Meeting NQS",
  "Working Towards NQS",
  "Significant Improvement Required",
];
// Map full rating strings to their canonical band-row label
function _l15_nqsCanonical(raw) {
  if (!raw) return "Not yet rated";
  const s = String(raw);
  if (/excellent/i.test(s)) return "Excellent";
  if (/exceeding/i.test(s)) return "Exceeding NQS";
  if (/meeting/i.test(s)) return "Meeting NQS";
  if (/significant/i.test(s)) return "Significant Improvement Required";
  if (/working/i.test(s)) return "Working Towards NQS";
  if (/provisional/i.test(s)) return "Provisional";
  return "Not yet rated";
}

function renderL15CompetitivePositioning(centre) {
  const cp = centre.competitive_positioning || {};
  const centres = cp.centres || [];
  const sa2Name = centre.catchment?.sa2?.name || cp.sa2_code || "this catchment";
  const sa2Code = centre.catchment?.sa2?.code || cp.sa2_code || "";
  const comparableLabel = cp.comparable_group_label || "Comparable centres";
  if (!centres.length) {
    return `
      <section class="l15-panel">
        <div class="l15-head">
          <div class="l15-title">Competitive position — ${htmlEscape(sa2Name)}</div>
          <div class="l15-sub">${htmlEscape(comparableLabel)} in SA2 ${htmlEscape(sa2Code)}</div>
        </div>
        <div class="l15-methodology">
          <span class="lead">Methodology</span>
          ${htmlEscape(comparableLabel)} only. We compare centres on the same care type to ensure like-for-like market analysis. Daily fee = full day (10+ hours). Bubble size = approved places. Quality = current NQF rating.
        </div>
        <div style="padding:28px 14px;font-size:12px;color:var(--text-mute);text-align:center;border:1px dashed var(--border);border-radius:4px;margin-top:8px;font-style:italic;">
          Catchment cohort pending DEC-83 national fee-data scale-up. Currently populated for the Starting Blocks pilot SA2 footprint only.
        </div>
      </section>
    `;
  }
  const subject = centres.find(c => c.is_subject) || null;
  const headlinePair = cp.headline_pair || { age_band: "—", session_type: "—" };
  const sessionLabel = String(headlinePair.session_type).replace(/_/g, " ");
  const headlineLabel = `${sessionLabel} (10+ hours)`;

  // SVG chart geometry — wider plot area now toolbar is gone (Patrick
  // 2026-05-12: "use the additional horizontal space to improve chart
  // balance"); bubble max reduced ~17% (14 → 12) per refinement spec.
  const W = 1000;
  const H = 320;
  const padL = 120, padR = 40, padT = 22, padB = 50;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  // X scale: fee range with 8% padding
  const fees = centres.map(c => c.fee);
  const fMin = Math.min(...fees), fMax = Math.max(...fees);
  const fSpan = Math.max(fMax - fMin, 1);
  const fLo = fMin - fSpan * 0.08;
  const fHi = fMax + fSpan * 0.08;
  const xScale = (fee) => padL + ((fee - fLo) / (fHi - fLo)) * plotW;

  // Y scale: 5 NQS bands evenly distributed
  const bands = _L15_NQS_ORDER;
  const bandH = plotH / bands.length;
  const yScale = (canonical) => {
    const idx = bands.indexOf(canonical);
    if (idx < 0) return padT + plotH - bandH * 0.5;  // unknown → bottom band
    return padT + bandH * idx + bandH * 0.5;
  };

  // Bubble size: sqrt of places, capped. Reduced from 14 → 12 max per
  // Patrick 2026-05-12 refinement ("Bubble sizes still feel slightly too
  // large. Reduce max bubble scaling by ~15–20%.").
  const places = centres.map(c => c.places || 30);
  const pMax = Math.max(...places, 30);
  const sizeFor = (p) => {
    const base = Math.sqrt((p || 30) / pMax) * 12;
    return Math.max(4.5, Math.min(12, base));
  };

  // Background bands
  const bandRects = bands.map((b, i) => {
    const col = _L15_NQS_COLOUR[b] || "#5a5a6a";
    return `<rect class="l15-band-bg" x="${padL}" y="${padT + i * bandH}" width="${plotW}" height="${bandH}" fill="${col}"/>`;
  }).join("");

  const bandLabels = bands.map((b, i) => {
    const y = padT + i * bandH + bandH * 0.55;
    return `<text class="l15-band-label" x="${padL - 8}" y="${y}" text-anchor="end">${htmlEscape(b)}</text>`;
  }).join("");

  // X-axis ticks at $20 intervals
  const tickStep = fSpan > 80 ? 20 : 10;
  const tickStart = Math.ceil(fLo / tickStep) * tickStep;
  const tickEnd = Math.floor(fHi / tickStep) * tickStep;
  const xTicks = [];
  for (let t = tickStart; t <= tickEnd; t += tickStep) {
    const x = xScale(t);
    xTicks.push(`
      <line class="l15-axis-tick" x1="${x}" y1="${padT}" x2="${x}" y2="${padT + plotH}"/>
      <text class="l15-axis-label" x="${x}" y="${padT + plotH + 14}" text-anchor="middle">$${t}</text>
    `);
  }
  const xAxisTitle = `<text class="l15-axis-title" x="${padL + plotW / 2}" y="${H - 6}" text-anchor="middle">Daily fee (${htmlEscape(headlineLabel)})</text>`;

  // CCS hourly-cap reference line at ~$137
  const ccsX = xScale(cp.ccs_daily_cap_aud || 137.3);
  let ccsLine = "";
  if (ccsX >= padL && ccsX <= padL + plotW) {
    ccsLine = `
      <line class="l15-ccs-line" x1="${ccsX}" y1="${padT}" x2="${ccsX}" y2="${padT + plotH}"/>
      <text class="l15-ccs-label" x="${ccsX + 4}" y="${padT + 10}">CCS hourly cap × 10h ≈ $${Math.round(cp.ccs_daily_cap_aud || 137)}</text>
    `;
  }

  // Market average vertical line — now always on (toggles removed
  // 2026-05-12 per Patrick: "single highly refined default analytical view").
  const avgFee = fees.reduce((a, b) => a + b, 0) / fees.length;
  const avgX = xScale(avgFee);
  const marketAvg = `
    <line class="l15-mkt-avg-line" x1="${avgX}" y1="${padT}" x2="${avgX}" y2="${padT + plotH}"/>
    <text class="l15-axis-label" x="${avgX + 4}" y="${padT + 12}" style="fill:rgba(180,180,200,0.75);">Market average (SA2) $${avgFee.toFixed(0)}</text>
  `;

  // Bubble jitter to separate stacked points in same NQS band
  const inBand = {};
  centres.forEach((c, i) => {
    const k = _l15_nqsCanonical(c.nqs_overall);
    inBand[k] = (inBand[k] || 0) + 1;
  });
  const bandCursor = {};

  // Compute fade by assessment age (most-recent assessment = full opacity)
  const ages = centres.map(c => _l15_parseAssessedMonths(c.last_assessed_at)).filter(x => x != null);
  const ageMax = ages.length ? Math.max(...ages) : 1;

  // Operator grouping retired from default view 2026-05-12. The capability
  // is preserved as a hover-discoverable signal (large_provider_name in the
  // popover); always-on visual outlines added noise without enough payoff.
  const operatorMap = {};

  // Bubbles
  const bubbles = centres.map((c, i) => {
    const canonical = _l15_nqsCanonical(c.nqs_overall);
    const baseY = yScale(canonical);
    // jitter ±6px within band when >2 centres share the band
    const bandCount = inBand[canonical] || 1;
    const offset = bandCount > 1
      ? ((bandCursor[canonical] = (bandCursor[canonical] || 0) + 1) - (bandCount + 1) / 2) * 7
      : 0;
    const y = baseY + offset;
    const x = xScale(c.fee);
    const r = c.is_subject ? Math.max(sizeFor(c.places) * 1.5, 11) : sizeFor(c.places);
    const fill = c.is_subject ? "var(--accent)" : (_L15_NQS_COLOUR[canonical] || "#5a5a6a");
    const cls = c.is_subject ? "l15-bubble subject" : "l15-bubble";
    let opacity = c.is_subject ? 0.95 : 0.78;
    const stroke = c.is_subject ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.15)";
    const strokeW = c.is_subject ? 2 : 0.5;
    const strokeDash = "0";
    return `
      <circle class="${cls}" cx="${x}" cy="${y}" r="${r}"
              fill="${fill}" opacity="${opacity}"
              stroke="${stroke}" stroke-width="${strokeW}" stroke-dasharray="${strokeDash}"
              data-idx="${i}"
              onmouseenter="_l15HoverEnter(event, ${i})"
              onmouseleave="_l15HoverLeave()"
              onclick="_l15Click(${c.service_id})"/>
    `;
  }).join("");

  const commentaryDefault = _l15CommercialPositioning(subject, centres, cp);
  const commentaryId = `l15-commentary-${Math.random().toString(36).slice(2, 8)}`;
  const hoverStripId = `l15-hover-${Math.random().toString(36).slice(2, 8)}`;
  const popoverId = `l15-popover-${Math.random().toString(36).slice(2, 8)}`;

  // Stash data on window for hover handlers (re-render flushes the closure).
  // narrativeId aliased to commentaryId for backward-compat with the
  // _l15HoverEnter / _l15HoverLeave handlers below.
  window._L15_DATA = {
    centres, subject, cp,
    commentaryId, hoverStripId, popoverId, sa2Name,
    narrativeId: commentaryId,
  };

  return `
    <section class="l15-panel">
      <div class="l15-head">
        <div class="l15-title">Competitive position — ${htmlEscape(sa2Name)}</div>
        <div class="l15-sub">${htmlEscape(comparableLabel)} in SA2 ${htmlEscape(sa2Code)}</div>
      </div>
      <div class="l15-methodology">
        <span class="lead">Methodology</span>
        ${htmlEscape(comparableLabel)} only. We compare centres on the same care type to ensure like-for-like market analysis. Daily fee = ${htmlEscape(sessionLabel)} (10+ hours). Bubble size = approved places. Quality = current NQF rating.
      </div>
      <div class="l15-chart-wrap">
        <svg class="l15-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
          ${bandRects}
          ${xTicks.join("")}
          ${bandLabels}
          ${ccsLine}
          ${marketAvg}
          ${bubbles}
          ${xAxisTitle}
        </svg>
        <div id="${popoverId}" class="l15-popover"></div>
      </div>
      <div id="${hoverStripId}" class="l15-hover-strip"></div>
      <div id="${commentaryId}">${commentaryDefault}</div>
    </section>
  `;
}

// Months-since helper for assessment dates ("2025-05" / "2025-05-12" formats)
function _l15_parseAssessedMonths(raw) {
  if (!raw) return null;
  const m = String(raw).match(/^(\d{4})-(\d{1,2})/);
  if (!m) return null;
  const yr = parseInt(m[1], 10);
  const mo = parseInt(m[2], 10);
  const now = new Date();
  return (now.getFullYear() - yr) * 12 + (now.getMonth() + 1 - mo);
}

// Percentile of a value in an array (0-100)
function _l15_percentile(arr, v) {
  if (!arr.length) return null;
  const sorted = arr.slice().sort((a, b) => a - b);
  let count = 0;
  for (const x of sorted) if (x < v) count++;
  return (count / sorted.length) * 100;
}

// Commercial-positioning commentary — 3-column block replacing the
// percentile-heavy narrative per Patrick 2026-05-12 refinement spec.
// Columns: Positioning (heading + 3 supporting bullets), Key position at
// a glance (4 quantified facts vs cohort), Market context (3 contextual
// reads driven by cohort distribution + subject position).
function _l15CommercialPositioning(subject, centres, cp) {
  if (!subject) {
    return `
      <div class="l15-commentary">
        <div class="l15-comm-col">
          <div class="l15-comm-head">Positioning</div>
          <div class="l15-positioning-title">Subject not in cohort</div>
          <div class="l15-positioning-sub">No fee data available for this centre at the headline pair; commentary suspended.</div>
        </div>
      </div>
    `;
  }
  // Tier the subject across the three axes
  const fees = centres.map(c => c.fee).sort((a, b) => a - b);
  const places = centres.map(c => c.places || 0).filter(p => p > 0).sort((a, b) => a - b);
  const avgFee = fees.reduce((a, b) => a + b, 0) / fees.length;
  const subjNqsCanonical = _l15_nqsCanonical(subject.nqs_overall);
  const subjNqsRank = _L15_NQS_ORDER.indexOf(subjNqsCanonical);
  const feePct = _l15_percentile(fees, subject.fee);
  const placePct = subject.places ? _l15_percentile(places, subject.places) : null;
  const priceTier = feePct >= 66 ? "premium" : feePct <= 33 ? "value" : "mid";
  const scaleTier = placePct == null ? "—" : placePct >= 66 ? "large" : placePct <= 33 ? "small" : "mid";
  const qualityTier = subjNqsRank >= 0 && subjNqsRank <= 1 ? "high"
                    : subjNqsRank === 2 ? "mid"
                    : subjNqsRank >= 3 ? "low" : "—";

  // Positioning archetype: title + lead + heading icon + 3 supporting bullets
  let positioningTitle, positioningLead, headIcon, bullets;
  if (priceTier === "premium" && qualityTier === "high") {
    positioningTitle = "Premium positioning";
    positioningLead = "This centre is positioned in the premium price range and in the top tier of quality in this market.";
    headIcon = "award";
    bullets = [
      { i: "trending_up", c: "pos", h: "Higher fees are supported by higher quality and scale." },
      { i: "bar_chart",   c: "pos", h: "Stronger occupancy and lower customer churn are typical for this tier." },
      { i: "users",       c: "pos", h: "Well positioned to capture demand from quality-focused families." },
    ];
  } else if (priceTier === "value" && qualityTier === "high") {
    positioningTitle = "Quality-led value positioning";
    positioningLead = "Above-cohort quality rating at below-median pricing — institutional value-play candidate.";
    headIcon = "shield_check";
    bullets = [
      { i: "trending_up", c: "pos", h: "Operating efficiency converts to value at the catchment level." },
      { i: "shield_check",c: "pos", h: "Quality rating insulates from regulatory downgrade risk." },
      { i: "trending_up", c: "mid", h: "Fee headroom is the upside lever if positioning shifts." },
    ];
  } else if (priceTier === "premium" && qualityTier === "low") {
    positioningTitle = "Pricing outlier";
    positioningLead = "Premium fee without quality validation — scrutinise fee sustainability and operator strategy.";
    headIcon = "alert";
    bullets = [
      { i: "alert",         c: "neg", h: "Premium fee without quality validation — fee sustainability is the open question." },
      { i: "trending_down", c: "neg", h: "Vulnerable to a higher-quality entrant at comparable price." },
      { i: "target",        c: "mid", h: "NQS uplift is the highest-impact operational lever." },
    ];
  } else if (priceTier === "premium") {
    positioningTitle = "Premium positioning";
    positioningLead = "This centre is positioned in the premium price range of the local market.";
    headIcon = "award";
    bullets = [
      { i: "trending_up", c: "pos", h: "Above-cohort pricing — likely supported by location, brand or capacity." },

      { i: "target",        c: "mid", h: "Quality uplift is the highest-impact operational lever." },

    positioningTitle = "Quality-led positioning";
    positioningLead = "Mid-market pricing supported by above-cohort quality rating.";
    headIcon = "shield_check";
    bullets = [
      { i: "shield_check",c: "pos", h: "Quality rating insulates from regulatory downgrade risk." },
      { i: "trending_up", c: "pos", h: "Pricing headroom exists relative to quality positioning." },

  } else if (scaleTier === "large") {

    positioningLead = "Mid-market positioning with scale advantage — places count sits in the top tier of the cohort.";

    bullets = [

      { i: "users",    c: "mid", h: "Family-focused proposition typical of small-scale premium centres." },
      { i: "target",   c: "mid", h: "Upside via scale or fee uplift; limited operational leverage." },
    ];
  } else {
    positioningTitle = "Mid-market positioning";
    positioningLead = "Sits within the mid-market price + quality band of the local cohort.";
    headIcon = "target";
    bullets = [
      { i: "target",    c: "mid", h: "Sits within the central band of the cohort on both price and quality." },
      { i: "users",     c: "mid", h: "Limited differentiation — driven by location and operator brand." },
      { i: "trending_up", c: "mid", h: "Upside lever: quality uplift or pricing move at the cohort's central tendency." },
    ];
  }

  // KEY POSITION AT A GLANCE — 4 quantified facts vs cohort
  const feeDeltaAbs = subject.fee - avgFee;
  const feeDeltaPct = (feeDeltaAbs / avgFee) * 100;
  const feeDirection = feeDeltaAbs >= 0 ? "above" : "below";
  const feeArrow = feeDeltaAbs >= 0 ? "$" : "$";
  const feeIcon = feeDeltaAbs >= 0 ? "$+" : "$−";
  const feeFactClass = priceTier === "premium" ? "pos" : priceTier === "value" ? "neg" : "mid";
  const qualityFact = (() => {
    if (qualityTier === "high") {
      const nAtOrAbove = centres.filter(c => {

      return {

        d: `NQF rating (${subjNqsCanonical}) — at the cohort median.`,
        c: "mid", i: "star",
      };

  })();
  const placesFact = subject.places && placePct != null ? {
    h: scaleTier === "large" ? "Larger scale offering"
       : scaleTier === "small" ? "Smaller scale operation"
       : "Mid-scale operation",
    d: `At ${subject.places} approved places, this centre is ${
        scaleTier === "large" ? `larger than ${Math.round(placePct)}% of comparable centres in the SA2`
      : scaleTier === "small" ? `smaller than ${Math.round(100 - placePct)}% of comparable centres in the SA2`
      : `mid-cohort by places count`
      }.`,
    c: scaleTier === "large" ? "pos" : scaleTier === "small" ? "mid" : "mid",
    i: "building",
  } : null;
  const assessmentMonths = _l15_parseAssessedMonths(subject.last_assessed_at);
  const assessmentFact = subject.last_assessed_at ? {
    h: assessmentMonths != null && assessmentMonths <= 18 ? "Recent assessment"

    c: assessmentMonths != null && assessmentMonths > 36 ? "neg"

    i: "clock",
  } : null;
  const keyFacts = [
    { h: feeDeltaAbs >= 0 ? "Above market average" : "Below market average",
      d: `Fee ($${subject.fee.toFixed(0)}) is $${Math.abs(feeDeltaAbs).toFixed(0)} (${Math.abs(feeDeltaPct).toFixed(0)}%) ${feeDirection} the SA2 average ($${avgFee.toFixed(0)}).`,
      c: feeFactClass, i: "dollar" },
    qualityFact,
    placesFact,
    assessmentFact,
  ].filter(Boolean);

  // MARKET CONTEXT — three contextual reads from cohort distribution
  // 1. Quality-vs-fee correlation in this cohort
  // 2. Supply pressure (centre_events from catchment metrics — banked)
  // 3. Regulatory tail-risk distribution
  const highFeeHighQuality = centres.filter(c =>
    c.fee >= (avgFee * 1.1) && (() => {
      const r = _L15_NQS_ORDER.indexOf(_l15_nqsCanonical(c.nqs_overall));
      return r >= 0 && r <= 1;
    })()
  ).length;
  const totalAboveAvg = centres.filter(c => c.fee >= avgFee).length;
  const qualityFeeContext = totalAboveAvg > 0 && (highFeeHighQuality / totalAboveAvg) >= 0.5

        c: "pos", i: "scale" }
    : { h: "Mixed quality-fee relationship",
        d: "Above-average fees in this SA2 are not consistently aligned with higher NQF ratings.",

  const lowQualityN = centres.filter(c => {
    const r = _L15_NQS_ORDER.indexOf(_l15_nqsCanonical(c.nqs_overall));
    return r >= 3;
  }).length;
  const regulatoryContext = lowQualityN === 0
    ? { h: "Clean regulatory tail in cohort",
        d: "No centres in catchment sit at Working Towards or below — local quality floor is strong.",
        c: "pos", i: "shield_check" }
    : { h: `${lowQualityN} centre${lowQualityN === 1 ? "" : "s"} at regulatory risk`,
        d: `${lowQualityN} of ${centres.length} cohort centres are rated Working Towards or below — keeps relative tail-risk profile.`,
        c: "mid", i: "shield_check" };

  const ccsCap = cp.ccs_daily_cap_aud || 137.3;
  const aboveCcsCap = centres.filter(c => c.fee > ccsCap).length;
  const ccsContext = aboveCcsCap === 0
    ? { h: "Entire cohort within CCS efficiency",

        c: "pos", i: "percent" }
    : aboveCcsCap === centres.length
    ? { h: "Cohort sits above CCS cap",
        d: `Every centre is above the CCS hourly-cap × 10h ($${Math.round(ccsCap)}) — fee gap is out-of-pocket for all families.`,
        c: "neg", i: "percent" }
    : { h: "Mixed CCS efficiency in cohort",
        d: `${aboveCcsCap} of ${centres.length} centres priced above the CCS hourly-cap × 10h ($${Math.round(ccsCap)}); the gap above is unsubsidised.`,
        c: "mid", i: "percent" };

  const marketContext = [qualityFeeContext, regulatoryContext, ccsContext];

  // Render
  const bulletsHtml = bullets.map(b => `
    <div class="l15-comm-item">
      <span class="icon ${b.c}">${_l15Icon(b.i)}</span>

  const keyFactsHtml = keyFacts.map(f => `
    <div class="l15-comm-item">

      <div class="body"><span class="h">${htmlEscape(f.h)}</span><span class="d">${htmlEscape(f.d)}</span></div>
    </div>
  `).join("");
  const marketHtml = marketContext.map(m => `
    <div class="l15-comm-item">
      <span class="icon ${m.c}">${_l15Icon(m.i)}</span>
      <div class="body"><span class="h">${htmlEscape(m.h)}</span><span class="d">${htmlEscape(m.d)}</span></div>
    </div>
  `).join("");

  return `
    <div class="l15-commentary">
      <div class="l15-comm-col">
        <div class="l15-comm-head">Positioning</div>
        <div class="l15-positioning-title">

        ${bulletsHtml}
      </div>
      <div class="l15-comm-col">
        <div class="l15-comm-head">Key position at a glance</div>
        ${keyFactsHtml}

      <div class="l15-comm-col">
        <div class="l15-comm-head">Market context</div>
        ${marketHtml}
      </div>

}

// Hover handlers — update popover position + narrative strip with deltas
function _l15HoverEnter(ev, idx) {
  const data = window._L15_DATA || {};
  const c = (data.centres || [])[idx];
  if (!c) return;
  const popover = document.getElementById(data.popoverId);
  const hoverStrip = document.getElementById(data.hoverStripId);
  if (popover) {
    const ageStr = c.last_assessed_at ? ` · last assessed ${c.last_assessed_at}` : "";
    const provStr = c.large_provider_name ? `<div class="meta">${htmlEscape(c.large_provider_name)}</div>` : "";
    popover.innerHTML = `
      <div class="name">${htmlEscape(c.service_name)}</div>
      <div class="meta">$${c.fee.toFixed(0)}/day · ${c.places || "—"} places · ${htmlEscape(_l15_nqsCanonical(c.nqs_overall))}${ageStr}</div>
      ${provStr}
    `;
    popover.classList.add("visible");
    const wrap = ev.currentTarget.closest(".l15-chart-wrap");
    if (wrap) {
      const r = wrap.getBoundingClientRect();
      const px = ev.clientX - r.left + 12;
      const py = ev.clientY - r.top + 12;
      popover.style.left = `${Math.min(px, r.width - 240)}px`;
      popover.style.top = `${Math.min(py, r.height - 70)}px`;
    }
  }
  // Hover strip slides in below the chart; commentary block stays put
  // underneath. Hover state and commentary co-exist so the reader can
  // compare without losing the positioning context.
  if (hoverStrip) {
    hoverStrip.innerHTML = _l15ComparisonStrip(c, data.subject);
    hoverStrip.classList.add("visible");
  }
}
window._l15HoverEnter = _l15HoverEnter;

function _l15HoverLeave() {

  if (popover) popover.classList.remove("visible");

// Comparison strip: deltas vs subject centre + inferential read.
function _l15ComparisonStrip(hovered, subject) {
  if (!hovered || !subject) return _l15TopNNarrative(subject, (window._L15_DATA || {}).centres || []);
  if (hovered.is_subject) {
    return `<div class="header">${htmlEscape(hovered.service_name)} — this is the subject centre.</div>`;
  }
  const feeDelta = hovered.fee - subject.fee;
  const feeClass = feeDelta < -1 ? "delta-pos" : feeDelta > 1 ? "delta-neg" : "delta-flat";
  const feeStr = `<span class="${feeClass}">${feeDelta < 0 ? "−" : "+"}$${Math.abs(feeDelta).toFixed(0)}</span>`;
  const placeDelta = (hovered.places || 0) - (subject.places || 0);
  const placeClass = placeDelta > 0 ? "delta-pos" : placeDelta < 0 ? "delta-neg" : "delta-flat";
  const placeStr = `<span class="${placeClass}">${placeDelta > 0 ? "+" : placeDelta < 0 ? "−" : "±"}${Math.abs(placeDelta)}</span>`;
  const hvNqs = _l15_nqsCanonical(hovered.nqs_overall);
  const subjNqs = _l15_nqsCanonical(subject.nqs_overall);
  const nqsRankDelta = _L15_NQS_ORDER.indexOf(hvNqs) - _L15_NQS_ORDER.indexOf(subjNqs);
  const nqsStr = nqsRankDelta === 0
    ? `<span class="delta-flat">same NQS</span>`
    : nqsRankDelta < 0
    ? `<span class="delta-pos">${htmlEscape(hvNqs)} (higher)</span>`
    : `<span class="delta-neg">${htmlEscape(hvNqs)} (lower)</span>`;
  const ageH = _l15_parseAssessedMonths(hovered.last_assessed_at);
  const ageS = _l15_parseAssessedMonths(subject.last_assessed_at);
  let ageStr = "";
  if (ageH != null && ageS != null) {
    const diff = ageS - ageH;
    if (diff === 0) ageStr = ` · <span class="delta-flat">assessed same period</span>`;
    else if (diff > 0) ageStr = ` · <span class="delta-pos">assessed ${diff}mo more recently</span>`;
    else ageStr = ` · <span class="delta-neg">assessed ${-diff}mo earlier</span>`;
  }
  // Inferential read on the comparison
  const subjPricier = feeDelta < 0;
  const subjLarger = placeDelta < 0;
  const subjHigherNqs = nqsRankDelta > 0;
  let inference = "";
  if (subjPricier && subjLarger && subjHigherNqs) {
    inference = "Subject is the dominant comp — pricier, larger, and higher-rated.";
  } else if (!subjPricier && !subjLarger && !subjHigherNqs) {
    inference = "Direct comp threat — cheaper, larger, higher-rated than subject.";
  } else if (subjPricier && subjHigherNqs) {
    inference = "Subject's premium pricing is supported by superior quality rating.";
  } else if (subjPricier && !subjHigherNqs) {
    inference = "Subject is pricier without higher quality — value-gap exposure.";
  } else if (!subjPricier && subjHigherNqs) {
    inference = "Subject undercuts on price with higher quality — strong value position.";
  } else if (subjLarger && !subjHigherNqs) {
    inference = "Subject is larger but not rated higher — scale-only differentiator.";
  } else {
    inference = "Comparable position with modest differentiation.";
  }
  return `
    <div>
      <span class="header">vs ${htmlEscape(hovered.service_name)}:</span>
      ${feeStr} fee · ${placeStr} places · ${nqsStr}${ageStr}
    </div>
    <div class="inference">${htmlEscape(inference)}</div>
  `;
}

// ── Layer 2 Executive interpretation ────────────────────────────────
function renderL2Executive(centre) {
  const exec = centre.executive || {};
  if (!exec.signals && !exec.headline) {
    return `<section class="l2-exec"><div class="state-msg">Executive view unavailable for this centre.</div></section>`;
  }
  const tilesHtml = (exec.signals || []).map(s => {
    // Sub-metric depth rows under the headline summary (Layer 2 upgrade
    // 2026-05-13). 2-3 mini-rows: name + value + small band pill. Reader
    // sees signal composition at a glance, clicks tile to scroll to the
    // matching matrix category.
    const subs = (s.sub_metrics || []);
    const subsHtml = subs.length ? `
      <div class="l2-tile-submetrics">
        ${subs.map(sm => `
          <div class="l2-submetric">
            <span class="name">${htmlEscape(sm.name)}</span>
            <span class="value">${htmlEscape(sm.value_display)}</span>
            <span class="band-pill ${htmlEscape(sm.band_class || 'no-rating')}">${htmlEscape((sm.band || sm.band_class || '—').toString())}</span>
          </div>
        `).join('')}
      </div>
    ` : "";
    return `
      <div class="l2-tile" onclick="handleSignalClick('${htmlEscape(s.links_to || '')}')" title="${htmlEscape(s.label)}">
        <div class="l2-tile-label">${htmlEscape(s.label)}</div>
        <div class="l2-tile-summary">${htmlEscape(s.summary || "—")}</div>
        ${subsHtml}
      </div>
    `;
  }).join('');

  const flags = exec.flags || {visible: [], spillover_count: 0};
  const flagsHtml = flags.visible.map(f => `
    <span class="l2-flag ${f.severity}" onclick="handleFlagClick('${htmlEscape(f.links_to || '')}')" title="${htmlEscape(f.label)}">
      ${htmlEscape(f.label)}
    </span>
  `).join('');
  const spilloverHtml = (flags.spillover_count > 0) ? `
    <span class="l2-flag-spillover" onclick="scrollToCategory('quality')">
      +${flags.spillover_count} more
    </span>
  ` : "";

  return `
    <section class="l2-exec">
      <h3 class="l2-headline">
        <span class="label">Headline</span>${htmlEscape(exec.headline || "—")}
      </h3>
      <div class="l2-tiles">${tilesHtml}</div>
      ${(flags.visible.length || flags.spillover_count) ? `<div class="l2-flags">${flagsHtml}${spilloverHtml}</div>` : ""}
    </section>
  `;
}

// ── Chart.js plugins ported from centre.html v3.31 ──────────────────
// _kintellExternalReadout: hover values surface in a fixed div above
// each canvas (id="readout-{canvasId}") instead of in the native tooltip
// box. Combined with _kintellCrosshair (vertical dashed line at active
// data point) gives v1's "scrubbing a ruler" hover register.
function _kintellExternalReadout(context) {
  const chart = context.chart;
  const tt = context.tooltip;
  const canvasId = chart.canvas && chart.canvas.id;
  if (!canvasId) return;
  const slot = document.getElementById("readout-" + canvasId);
  if (!slot) return;
  if (!tt || tt.opacity === 0) {
    slot.innerHTML = '<span class="placeholder">hover the line to read values</span>';
    return;
  }
  const titleLines = tt.title || [];
  const beforeBody = tt.beforeBody || [];
  const bodyItems = tt.body || [];
  const afterBody = tt.afterBody || [];
  const lines = [];
  beforeBody.forEach(l => { if (l) lines.push(l); });
  bodyItems.forEach(b => {
    (b.before || []).forEach(l => { if (l) lines.push(l); });
    (b.lines  || []).forEach(l => { if (l) lines.push(l); });
    (b.after  || []).forEach(l => { if (l) lines.push(l); });
  });
  afterBody.forEach(l => { if (l) lines.push(l); });
  const titleHtml = titleLines.length
    ? `<span style="color:var(--text-mute);font-size:11.5px;margin-right:10px;">${htmlEscape(titleLines[0])}</span>`
    : "";
  const linesHtml = lines.map((l, i) =>
    i === 0
      ? `<b style="color:var(--text);">${htmlEscape(l)}</b>`
      : `<span style="color:var(--text-mute);font-size:11.5px;margin-left:10px;">${htmlEscape(l)}</span>`
  ).join("");
  // Event-line enrichment (Phase 5c polish 2026-05-13): when the hovered
  // period matches a centre_events quarter, surface the centre names
  // alongside the value readout so the reader sees what drove the supply
  // change without needing the drawer click-through. Matches both exact
  // quarter labels ("Q1 2022") and year-only labels ("2022") to support
  // both catchment (quarterly) and population (annual) chart cadences.
  const evCfg = chart.options && chart.options.plugins && chart.options.plugins.kintellEventAnnotation;
  let eventHtml = "";
  if (evCfg && evCfg.events && evCfg.events.length && titleLines.length) {
    const hoveredPeriod = String(titleLines[0]);
    const yearMatch = hoveredPeriod.match(/(\d{4})/);
    const hoveredYear = yearMatch ? yearMatch[1] : null;
    const ev = evCfg.events.find(e => {
      if (e.quarter === hoveredPeriod) return true;
      if (hoveredYear && String(e.quarter || "").includes(hoveredYear)) return true;
      return false;
    });
    if (ev) {
      const added = (ev.new_names || []);
      const removed = (ev.removed_names || []);
      const bits = [];
      if (added.length) bits.push(`<span style="color:rgba(74,222,128,0.85);font-weight:500;">+${added.length} new</span>: ${added.map(htmlEscape).join(", ")}`);
      if (removed.length) bits.push(`<span style="color:rgba(248,113,113,0.85);font-weight:500;">−${removed.length} closed</span>: ${removed.map(htmlEscape).join(", ")}`);
      if (bits.length) {
        eventHtml = `<div style="margin-top:4px;font-size:10.5px;color:var(--text-dim);line-height:1.35;">${bits.join(" · ")}</div>`;
      }
    }
  }
  slot.innerHTML = titleHtml + linesHtml + eventHtml;
}

const _kintellCrosshair = {
  id: "kintellCrosshair",
  afterDraw(chart) {
    const tt = chart.tooltip;
    if (!tt || !tt.opacity) return;
    const active = tt.dataPoints && tt.dataPoints[0];
    if (!active) return;
    const ctx = chart.ctx;
    const ca = chart.chartArea;
    const x = active.element.x;
    ctx.save();
    ctx.strokeStyle = "rgba(180,200,230,0.40)";
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, ca.top);
    ctx.lineTo(x, ca.bottom);
    ctx.stroke();
    ctx.restore();
  }
};

// Centre-events overlay: vertical dashed lines at quarters when centres
// of the matching subtype opened (green) or closed (red) or churned net-zero
// (grey) in this SA2. Reads chart.options.plugins.kintellEventAnnotation.events.
const _kintellEventAnnotation = {
  id: "kintellEventAnnotation",
  afterDraw(chart) {
    const cfg = chart.options && chart.options.plugins && chart.options.plugins.kintellEventAnnotation;
    if (!cfg || !cfg.events || !cfg.events.length) return;
    const events = cfg.events;
    const ctx2 = chart.ctx;
    const xAxis = chart.scales.x;
    const yAxis = chart.scales.y;
    if (!xAxis || !yAxis) return;
    const labels = chart.data.labels || [];
    events.forEach(ev => {
      let idx = labels.indexOf(ev.quarter);
      // Annual-chart fallback: events carry quarter strings like "Q1 2022"
      // but population / births / under-5 charts use year labels like
      // "2022". When the exact quarter isn't a label, extract the year
      // and look for a year-bearing label match. If multiple quarters
      // fall in the same year, they'll all draw at that year's tick
      // (acceptable visual — quarter-precision overlay on annual cadence
      // would need extra X-fractional positioning).
      if (idx < 0) {
        const m = String(ev.quarter || "").match(/(\d{4})/);
        if (m) {
          const yr = m[1];
          idx = labels.findIndex(l => String(l).includes(yr));
        }
      }
      if (idx < 0) return;
      let xPixel = xAxis.getPixelForValue(idx);
      if (xPixel < xAxis.left || xPixel > xAxis.right) return;
      // Edge-event visibility: if the event sits at the very first or last
      // data point, its x-pixel lands on the axis grid line and the dashed
      // line becomes invisible. Nudge inward ~4px so it's distinct from
      // the axis. Small enough not to misrepresent the quarter.
      if (xPixel - xAxis.left < 4) xPixel = xAxis.left + 4;
      if (xAxis.right - xPixel < 4) xPixel = xAxis.right - 4;
      const net = Number(ev.net_centres) || 0;
      const placesChg = Number(ev.places_change) || 0;
      const color = net > 0 ? "rgba(74,222,128,0.55)"
                  : net < 0 ? "rgba(248,113,113,0.55)"
                  :           "rgba(155,155,155,0.40)";
      const labelBg = net > 0 ? "rgba(74,222,128,0.92)"
                    : net < 0 ? "rgba(248,113,113,0.92)"
                    :           "rgba(155,155,155,0.78)";
      ctx2.save();
      ctx2.strokeStyle = color;
      ctx2.lineWidth = 1.5;
      ctx2.setLineDash([4, 3]);
      ctx2.beginPath();
      ctx2.moveTo(xPixel, yAxis.top);
      ctx2.lineTo(xPixel, yAxis.bottom);
      ctx2.stroke();
      ctx2.restore();

      // Annotation badge at top of line — surfaces "+6 · +448p" so the
      // reader sees scale-of-change without hovering.
      // Compact format: net centres + places change. Centre names go in
      // the metric drawer (queued for richer drawer follow-up).
      const parts = [];
      if (net !== 0) parts.push(`${net > 0 ? "+" : ""}${net}`);
      if (placesChg !== 0) parts.push(`${placesChg > 0 ? "+" : ""}${placesChg}p`);
      if (parts.length) {
        const label = parts.join(" · ");
        ctx2.save();
        ctx2.setLineDash([]);
        ctx2.font = "600 9px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        const textW = ctx2.measureText(label).width;
        const padX = 5, padY = 2;
        const boxW = textW + padX * 2;
        const boxH = 14;
        // Place badge above the chart area; clamp horizontally to stay
        // within xAxis bounds so it doesn't get clipped at the edges.
        let boxX = xPixel - boxW / 2;
        if (boxX < xAxis.left) boxX = xAxis.left;
        if (boxX + boxW > xAxis.right) boxX = xAxis.right - boxW;
        const boxY = yAxis.top - boxH - 2;
        if (boxY > 0) {  // only draw if there's vertical room above the chart
          ctx2.fillStyle = labelBg;
          if (typeof ctx2.roundRect === "function") {
            ctx2.beginPath();
            ctx2.roundRect(boxX, boxY, boxW, boxH, 3);
            ctx2.fill();
          } else {
            ctx2.fillRect(boxX, boxY, boxW, boxH);
          }
          ctx2.fillStyle = "#1a1f29";  // dark text on bright pill
          ctx2.textBaseline = "middle";
          ctx2.fillText(label, boxX + padX, boxY + boxH / 2);
        }
        ctx2.restore();
      }
    });
  }
};

// Horizontal reference line plugin. Reads
// chart.options.plugins.kintellReferenceLine = { y, label, color }.
// Used for ratio metrics where a specific y value carries analytical meaning
// (e.g., sa2_supply_ratio at y=1.0 → supply = demand break-even).
const _kintellReferenceLine = {
  id: "kintellReferenceLine",
  afterDatasetsDraw(chart) {
    const cfg = chart.options && chart.options.plugins && chart.options.plugins.kintellReferenceLine;
    if (!cfg || cfg.y == null) return;
    const yAxis = chart.scales.y;
    const xAxis = chart.scales.x;
    if (!yAxis || !xAxis) return;
    const yPixel = yAxis.getPixelForValue(cfg.y);
    if (yPixel < yAxis.top || yPixel > yAxis.bottom) return;
    const ctx2 = chart.ctx;
    const color = cfg.color || "rgba(180, 180, 200, 0.45)";
    ctx2.save();
    ctx2.strokeStyle = color;
    ctx2.lineWidth = 1;
    ctx2.setLineDash([3, 3]);
    ctx2.beginPath();
    ctx2.moveTo(xAxis.left, yPixel);
    ctx2.lineTo(xAxis.right, yPixel);
    ctx2.stroke();
    if (cfg.label) {
      ctx2.setLineDash([]);
      ctx2.font = "500 9.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const textW = ctx2.measureText(cfg.label).width;
      const padX = 4, padY = 1.5;
      const boxW = textW + padX * 2;
      const boxH = 13;
      const boxX = xAxis.right - boxW - 2;
      const boxY = yPixel - boxH / 2;
      ctx2.fillStyle = "rgba(20, 24, 33, 0.85)";
      if (typeof ctx2.roundRect === "function") {
        ctx2.beginPath();
        ctx2.roundRect(boxX, boxY, boxW, boxH, 2);
        ctx2.fill();
      } else {
        ctx2.fillRect(boxX, boxY, boxW, boxH);
      }
      ctx2.fillStyle = "rgba(200, 200, 220, 0.85)";
      ctx2.textBaseline = "middle";
      ctx2.fillText(cfg.label, boxX + padX, boxY + boxH / 2);
    }
    ctx2.restore();
  }
};

function _strokeFor(metric) { return _CHART_STROKE_BY_METRIC[metric] || "#4a9eff"; }
function _fillFor(metric)   {
  const stroke = _strokeFor(metric);
  return stroke.startsWith("#") ? hexToRgba(stroke, 0.08) : "rgba(74,158,255,0.08)";
}
function hexToRgba(hex, alpha) {
  const h = hex.replace("#", "");
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function _yearOfPeriod(period) {
  const m = /(\d{4})/.exec(String(period));
  return m ? parseInt(m[1], 10) : NaN;
}
// "Since opening" sentinel — when the trend-window state holds this value,
// filter resolves cutoff dynamically from the subject centre's opening date
// (greenfield → approval_granted_date; brownfield → last_transfer_date,
// which is the current operator's commencement and the more relevant lens).
const _RANGE_SINCE_OPENING = -1;

function _resolveOpeningYear(centre) {
  const t = (centre || {}).tenure || {};
  const isBrown = t.status === "brownfield";
  const raw = isBrown ? t.transfer_date : t.approval_granted_date;
  if (!raw) return null;
  // Match DD/MM/YYYY (ACECQA format) or YYYY-MM-DD (ISO)
  const dmy = String(raw).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (dmy) return parseInt(dmy[3], 10);
  const m = String(raw).match(/(\d{4})/);
  return m ? parseInt(m[1], 10) : null;
}

function _filterTrajectoryByRange(points, years) {
  if (!points.length) return points;
  if (years === _RANGE_SINCE_OPENING) {
    const openYear = _resolveOpeningYear(_CENTRE);
    if (openYear == null) return points;  // graceful fallback to All
    return points.filter(pt => {
      const y = _yearOfPeriod(pt.period);
      return !isNaN(y) && y >= openYear;
    });
  }
  if (!years || years <= 0) return points;
  const lastYear = _yearOfPeriod(points[points.length - 1].period);
  if (isNaN(lastYear)) return points;
  const cutoff = lastYear - years;
  return points.filter(pt => _yearOfPeriod(pt.period) > cutoff);
}
function _computeTrendPct(points) {
  if (!points || points.length < 2) return null;
  const sv = Number(points[0].value);
  const ev = Number(points[points.length-1].value);
  if (!isFinite(sv) || !isFinite(ev) || sv === 0) return null;
  return ((ev - sv) / sv) * 100;
}
function _formatTrendPct(pct) {
  if (pct == null || !isFinite(pct)) return "";
  const abs = Math.abs(pct).toFixed(1);
  if (pct > 0.05) return `+${abs}%`;
  if (pct < -0.05) return `−${abs}%`;
  return "≈ 0%";
}

// Full-render helper that preserves the L4 accordion's open state so that
// changing either trend window doesn't surprise-collapse the user's L4 view.

  render(centre);
  if (wasL4Open) {
    const acc = document.querySelector('.l4-accordion');

}

function _setTrajectoryRange(years, btn) {
