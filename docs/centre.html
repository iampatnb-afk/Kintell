// ── Workforce supply context block (DEC-76, sub-pass 4.3.9) ─────────
//
// Default-open page-level block alongside Population and Labour Market.
// 4 rows from the workforce_supply payload:
//   1. Child carer vacancy index (ANZSCO 4211) — JSA IVI, state-monthly
//   2. Early childhood teacher vacancy index (ANZSCO 2411) — JSA IVI
//   3. ECEC Award minimum rates — Fair Work, national
//   4. Three-Day Guarantee policy — national policy fact (Jan 2026)
//
// All rows are Context-only weight per DEC-75 (no SA2 peer cohort).
// Each row carries a "state-level" or "national" stamp + intent copy.
// JSA IVI rows render a state-level sparkline when data is live; render
// as deferred otherwise (the IVI table-name wire-up is the bundle's
// follow-up task — see workforce_supply probe artefact).
// ── Layer 4.2-A.3a-fix iter 3: workforce window state ────────
// Workforce Supply Context has its own trend-window selector.
// The page-top bar applies only to annual/quarterly trajectory
// charts; workforce data is monthly with much shorter useful
// horizons. State is just a number-of-months value; 0 = "All".
let _WFS_WINDOW_MONTHS = 24;  // default 2Y

// Period strings expected: "YYYY-MM" (JSA IVI monthly).
// Tolerates "YYYY-Qn" and "YYYY". Returns {y, m} or null.
function _wfsParsePeriod(p) {
  const s = String(p);
  const mm = /^(\d{4})-(\d{2})$/.exec(s);
  if (mm) return { y: parseInt(mm[1], 10),
                   m: parseInt(mm[2], 10) };
  const qq = /^(\d{4})-Q([1-4])$/.exec(s);
  if (qq) return { y: parseInt(qq[1], 10),
                   m: parseInt(qq[2], 10) * 3 };
  const yy = /^(\d{4})$/.exec(s);
  if (yy) return { y: parseInt(yy[1], 10), m: 12 };
  return null;
}

function _wfsFilterByWindow(points, months) {
  if (!months || months <= 0 || !points || !points.length) {
    return points;
  }
  const last = _wfsParsePeriod(
    points[points.length - 1].period);
  if (!last) return points;
  let cy = last.y;
  let cm = last.m - months;
  while (cm <= 0) { cy -= 1; cm += 12; }
  return points.filter(pt => {
    const p = _wfsParsePeriod(pt.period);
    if (!p) return true;
    if (p.y > cy) return true;
    if (p.y < cy) return false;
    return p.m >= cm;
  });
}

// Workforce-scoped chart re-instantiation: destroys only
// chart instances whose canvas id starts with "wfs-",
// then runs queued instantiations. Other charts (catchment,
// population, labour) are left alone.
function _flushPendingChartsWorkforceScoped() {
  Object.keys(_CHART_INSTANCES).forEach(id => {
    if (!id.startsWith("wfs-")) return;
    try { _CHART_INSTANCES[id].destroy(); } catch (e) {}
    delete _CHART_INSTANCES[id];
  });
  while (_CHART_PENDING.length) {
    const fn = _CHART_PENDING.shift();
    try { fn(); } catch (e) {
      console.warn("chart init failed:", e);
    }
  }
}

function _setWfsWindow(months, btn) {
  _WFS_WINDOW_MONTHS = months;
  if (!window._kintellLastCentre) return;
  const old = document.getElementById("kintell-wfs-card");
  if (!old) return;
  // Replace the card HTML in-place. The replacement is the
  // full <section> string; outerHTML re-parses + injects.
  old.outerHTML = renderWorkforceSupplyCard(
    window._kintellLastCentre);
  // Now drain pending chart instantiations, scoped to wfs.
  _flushPendingChartsWorkforceScoped();
}

function _renderWfsRangeBar() {
  const opts = [
    { months: 6,  label: "6M" },
    { months: 12, label: "1Y" },
    { months: 24, label: "2Y" },
    { months: 60, label: "5Y" },
    { months: 0,  label: "All" },
  ];
  const btns = opts.map(o => {
    const isActive = (o.months === _WFS_WINDOW_MONTHS);
    return `<button class="range-btn${isActive ? " active" : ""}" `
         + `onclick="_setWfsWindow(${o.months}, this)">${o.label}</button>`;
  }).join("");
  return `
    <div class="traj-range-bar" style="margin-top:8px;margin-bottom:12px;">
      <span class="label">Window</span>
      <div class="btns">${btns}</div>
      <span style="margin-left:auto;font-size:10.5px;color:var(--text-mute);">
        applies to workforce sparklines
      </span>
    </div>
  `;
}

function renderWorkforceSupplyCard(centre) {
  const ws = centre && centre.workforce_supply;
  if (!ws || !Array.isArray(ws.rows) || !ws.rows.length) return "";

  const rows = ws.rows.map(r => _renderWorkforceSupplyRow(r)).join("");

  return `
    <section class="op-section" id="kintell-wfs-card">
      <h3>Workforce supply context
        <span class="note">state &amp; national signals · default open</span>
      </h3>
      ${_renderWfsRangeBar()}
      ${rows}
    </section>
  `;
}

function _renderWorkforceSupplyRow(r) {
  const intentCopyHtml = r.intent_copy
    ? `<div style="margin-top:6px;font-size:11.5px;font-style:italic;color:var(--text-mute);line-height:1.5;">
         ${htmlEscape(String(r.intent_copy))}
       </div>`
    : "";

  // v3.17: about_data — permanent visible methodology block.
  // Rendered as a subtle "About this measure" panel beneath
  // the intent copy. Silent absence when payload doesn't
  // populate it (e.g. ECEC Award, 3-Day Guarantee rows).
  const aboutDataHtml = r.about_data
    ? `<div style="margin-top:8px;padding:6px 10px;background:rgba(255,255,255,0.02);border-radius:4px;border-left:2px solid var(--border);font-size:11px;color:var(--text-mute);line-height:1.5;">
         <span style="font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:10px;color:var(--text-dim);">About this measure</span>
         <span style="margin-left:6px;">${htmlEscape(String(r.about_data))}</span>
       </div>`
    : "";

  // Scope stamp — state-level or national
  const scopeStampHtml = r.scope_stamp
    ? `<span style="font-size:11px;color:var(--text-mute);font-style:italic;">${htmlEscape(r.scope_stamp)}</span>`
    : "";

  // Latest-value or fact, depending on row type
  let valueHtml = "";
  let trajectoryHtml = "";

  if (r.confidence === "live" && r.latest) {
    // JSA IVI live row: latest value + state-level sparkline.
    // v3.9 — integer-aware formatting: raw counts (e.g. JSA IVI
    // vacancy_count) render as "6,543" with thousands separator;
    // decimal values render with 1 decimal place.
    const latest = r.latest;
    const v = latest.value;
    const formatted = (typeof v === "number")
      ? (Number.isInteger(v) ? v.toLocaleString() : v.toFixed(1))
      : htmlEscape(String(v));
    valueHtml = `
      <span style="display:inline-flex;gap:8px;align-items:baseline;">
        <b style="font-variant-numeric:tabular-nums;color:var(--text);font-weight:600;font-size:14px;">
          ${formatted}
        </b>
        <span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(String(latest.period))})</span>
      </span>
    `;
    trajectoryHtml = _renderWorkforceSupplySparkline(r);
  } else if (r.confidence === "live" && r.fact) {
    // National policy fact row — single-line statement
    valueHtml = `<span style="color:var(--text);font-size:13px;font-weight:500;">${htmlEscape(r.fact)}</span>`;
  } else {
    // Deferred / pending wire-up — render as honest placeholder
    valueHtml = `<span style="color:var(--text-mute);font-style:italic;">— pending</span>`;
  }

  const obsBadge = renderBadge("OBS", { source: r.source || "—" }, true);
  const statusNoteHtml = (r.status_note && r.confidence !== "live")
    ? `<div style="margin-top:4px;font-size:11px;color:var(--text-mute);font-style:italic;">${htmlEscape(r.status_note)}</div>`
    : "";

  return `
    <div style="padding:10px 0;border-bottom:1px dashed var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;">
        <span style="color:var(--text-dim);font-size:13px;">${htmlEscape(r.display)}</span>
        <span style="display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          ${valueHtml}
          ${obsBadge}
        </span>
      </div>
      <div style="margin-top:4px;">${scopeStampHtml}</div>
      ${trajectoryHtml}
      ${intentCopyHtml}
      ${aboutDataHtml}
      ${statusNoteHtml}
    </div>
  `;
}

function _renderWorkforceSupplySparkline(r) {
  const fullTraj = (r && r.trajectory) || [];
  if (fullTraj.length < 2) return "";
  // v3.16: filter to active window before plotting.
  const traj = _wfsFilterByWindow(fullTraj, _WFS_WINDOW_MONTHS);
  if (traj.length < 2) return "";
  const stroke = "#3d7eff";
  const fill = "rgba(61,126,255,0.08)";
  const labels = traj.map(pt => String(pt.period));
  const data = traj.map(pt => Number(pt.value));

  const canvasId = `wfs-${r.metric}-${Math.random().toString(36).slice(2, 8)}`;
  _CHART_PENDING.push(() => {
    const el = document.getElementById(canvasId);
    if (!el) return;
    const dataset = _kintell_makeLine(r.display, data, stroke, fill);
    // v3.15: dot points visible at every period (matches
    // trajectory polish on Population / Labour / Catchment).
    dataset.pointRadius      = 2;
    dataset.pointHoverRadius = 6;
    dataset.pointBackgroundColor = stroke;
    dataset.pointBorderColor     = stroke;
    const opts = _kintell_makeOpts(null, null);
    // v3.16: optimise Y-axis to show variance. Compute
    // padded min/max from filtered data; beginAtZero=false.
    if (data.length) {
      const dmin = Math.min.apply(null, data);
      const dmax = Math.max.apply(null, data);
      const range = Math.max(dmax - dmin, 1);
      const pad = range * 0.08;
      opts.scales.y.beginAtZero = false;
      opts.scales.y.min = Math.max(0, dmin - pad);
      opts.scales.y.max = dmax + pad;
    }
    // v3.11: workforce sparkline gets sparse year labels.
    opts.scales.x.ticks.display = true;
    opts.scales.x.ticks.maxTicksLimit = 5;
    opts.scales.x.ticks.autoSkip = true;
    opts.scales.x.ticks.font = { size: 9 };
    // v3.15: switch native tooltip OFF, route to external
    // HTML readout (defined globally in v3.13). Same
    // pattern as trajectory charts.
    if (!opts.plugins) opts.plugins = {};
    opts.plugins.tooltip = {
      enabled: false,
      external: _kintellExternalReadout,
      displayColors: false,
    };
    _CHART_INSTANCES[canvasId] = new Chart(el, {
      type: "line",
      data: { labels, datasets: [dataset] },
      options: opts,
      plugins: [_kintellCrosshair],
    });
  });

  return `
    <div id="readout-${canvasId}" style="height:18px;font-size:12.5px;line-height:18px;color:var(--text);margin-top:6px;margin-bottom:2px;padding:0 4px;">
      <span style="color:var(--text-mute);font-style:italic;">hover the line to read values</span>
    </div>
    <div style="height:42px;position:relative;">
      <canvas id="${canvasId}"></canvas>
    </div>
  `;
}

function renderQaCard(centre) {
  const qa = centre.qa_scores || [];
  if (qa.length === 0) {
    return `
      <section class="op-section">
        <h3>Quality Assessment Areas</h3>
        <div class="qa-empty">No quality assessment scores on record.</div>
      </section>
    `;
  }
  return `
    <section class="op-section">
      <h3>Quality Assessment Areas <span class="note">${qa.length} populated</span></h3>
      <div class="qa-grid">
        ${qa.map(q => `
          <div class="qa-row">
            <span class="qa-key">${htmlEscape(q.key.toUpperCase())}</span>
            <span class="qa-label">${htmlEscape(q.label)}</span>
            <span>${nqsPill(q.rating)}</span>
          </div>
        `).join("")}
      </div>
    </section>
  `;
}

function renderTenureCard(centre) {
  const t = centre.tenure;
  const isBrown = t.status === "brownfield";
  const pillClass = isBrown ? "amber" : "green";
  const transferLine = isBrown && t.transfer_date
    ? `<div class="fact">
        <span class="k">Last transfer</span>
        <span class="v">
          <b>${htmlEscape(formatMonYYYY(t.transfer_date))}</b>
          <span style="color:var(--text-mute);font-size:11px;">(${t.months_since_transfer} months ago)</span>
          ${renderBadge("OBS", { source: "ACECQA last_transfer_date" }, true)}
        </span>
      </div>`
    : "";

  const approvalLine = t.approval_granted_date
    ? `<div class="fact">
        <span class="k">Original approval</span>
        <span class="v">
          <b>${htmlEscape(formatMonYYYY(t.approval_granted_date))}</b>
          ${renderBadge("OBS", { source: "ACECQA approval_granted_date" }, true)}
        </span>
      </div>`
    : "";

  return `
    <section class="op-section">
      <h3>Tenure</h3>
      <div class="fact">
        <span class="k">Acquisition type</span>
        <span class="v">
          <span class="status-pill ${pillClass}">${htmlEscape(t.label)}</span>
          ${renderBadge("DER", {
            rule: "Brownfield iff last_transfer_date > approval_granted_date.",
            inputs: "<code>approval_granted_date, last_transfer_date</code>"
          }, true)}
        </span>
      </div>
      ${approvalLine}
      ${transferLine}
    </section>
  `;
}

function renderCommentary(centre) {
  const lines = centre.commentary || [];
  if (lines.length === 0) return "";
  return lines.map(l => `
    <div class="com-line severity-${htmlEscape(l.severity || "info")}">
      ${renderBadge("COM", {
        rule: "Auto-generated from centre payload.",
        asAt: "real-time"
      })}
      <div class="com-text">${htmlEscape(l.text)}</div>
    </div>
  `).join("");
}

// ── Main render ─────────────────────────────────────────────────────
function render(centre) {
  // v3.16: stash so the workforce window selector can
  // re-render its card in-place without a full reload.
  window._kintellLastCentre = centre;
  // Capture for trajectory-range button re-render (Layer 4.2-B-fix2)
  _LAST_CENTRE = centre;

  const breadcrumb = document.getElementById("breadcrumb");
  const grpId = centre.header.parent_group?.group_id;
  const grpName = centre.header.parent_group?.name || "Operator";
  if (grpId) {
    breadcrumb.innerHTML = `<a href="operator.html?id=${grpId}">${htmlEscape(grpName)}</a> › ${htmlEscape(centre.header.service_name || "Centre")}`;
  } else {
    breadcrumb.textContent = centre.header.service_name || "Centre";
  }

  const main = document.getElementById("main");
  // Layer 4.2-A.3 page reorder (option α): credit block first
  // (Catchment position / Population / Labour / Workforce),
  // operational block second (NQS / Places / Catchment-meta /
  // Tenure / QA). Trend-window bar sits above the credit block
  // since all trajectory charts live in those four cards.
  main.innerHTML = `
    ${renderHeader(centre)}

    ${_pageHasFullTrajectory(centre) ? _renderTrajectoryRangeBar() : ""}

    <!-- ── credit block ── -->
    ${renderCatchmentPositionCard(centre)}
    ${renderPopulationCard(centre)}
    ${renderLabourMarketCard(centre)}
    ${renderWorkforceSupplyCard(centre)}

    <hr style="border:0;border-top:1px solid var(--border);margin:28px 0 12px;">

    <!-- ── operational block ── -->
    <div class="section-row">
      ${renderNqsCard(centre)}
      ${renderPlacesCard(centre)}
    </div>
    <div class="section-row">
      ${renderCatchmentCard(centre)}
      ${renderTenureCard(centre)}
    </div>
    ${renderQaCard(centre)}
    ${renderCommentary(centre)}
  `;

  // Layer 4.2-B-fix: instantiate any Chart.js canvases queued during
  // string-template render. Canvases need to be in the DOM first, which
  // is why this runs after main.innerHTML is set.
  _flushPendingCharts();
}

async function load() {
  if (!SERVICE_ID) {
    document.getElementById("main").innerHTML =
      `<div class="state-msg error">No <code>?id=&lt;service_id&gt;</code> in URL.</div>`;
    return;
  }
  try {
    const r = await api(`/centre/${SERVICE_ID}`);
    if (!r.ok || !r.centre) {
      document.getElementById("main").innerHTML =
        `<div class="state-msg error">Centre not found (service_id ${htmlEscape(SERVICE_ID)}).</div>`;
      return;
    }
    render(r.centre);
  } catch (e) {
    document.getElementById("main").innerHTML =
      `<div class="state-msg error">Failed to load centre: ${htmlEscape(String(e.message || e))}</div>`;
  }
}

load();
</script>
