<!DOCTYPE html>
<!-- centre.html v3.30 (2026-05-10) — Layer 4.4 A3 + Stream C bundle: 4 new Lite rows appended to the Demographic mix sub-panel inside Catchment Position card (sa2_parent_cohort_25_44_share + sa2_partnered_25_44_share + sa2_women_35_44_with_child_share + sa2_women_25_34_with_child_share). One surgical change: demoMetrics array in renderCatchmentPositionCard extended with the 4 new keys after sa2_single_parent_family_share. No new render helpers needed; existing _renderLiteRow + _renderLiteDelta handle annual (parent-cohort 6-point 2019-2024) and 3-point (Census) trajectories transparently via p.value_format + p.trajectory. Pairs with centre_page.py v22 (LAYER3_METRIC_META + INTENT_COPY + TRAJECTORY_SOURCE + POSITION_CARD_ORDER mirror, 4 entries each) in same commit. -->
<!-- centre.html v3.29 (2026-05-10) — Layer 4.4 A10 + C8 Demographic Mix bundle ship (header comment back-filled): renderCatchmentPositionCard split into creditMetrics + demoMetrics with a dashed-divider sub-panel header "Demographic mix"; new _renderTopNCountriesOfBirth + _renderTopNLanguagesAtHome helpers via shared _renderTopNContext renderer. Pairs with centre_page.py v21 + new abs_sa2_country_of_birth_top_n + abs_sa2_language_at_home_top_n tables. -->
<!-- centre.html v3.28 (2026-05-05) — OI-36b fix: _renderLiteDelta currency branch corrected. v3.27 matched 'currency_aud' which does not exist in this codebase; the actual formats are currency_weekly (sa2_median_household_income) and currency_annual (sa2_median_employee_income, sa2_median_total_income). Branch now matches both, with '/week' suffix appended for currency_weekly to match the parent value's display unit (e.g. '+$291/week from 2011 to 2021' for Bayswater median household income). currency_annual renders without suffix ('+$N,NNN from YYYY to YYYY'); these are currently Full-weight so don't render the badge in practice but the branch is kept consistent for future Lite re-classifications. No data-side change. -->
<!-- centre.html v3.27 (2026-05-05) — OI-36b: delta badge on all Lite rows. New _renderLiteDelta(p) helper reads p.trajectory and emits a small first-to-last delta badge ('+9.5pp from 2011 to 2021' for NES Bayswater) inside the Lite row template, alongside the existing 'as at YYYY' stamp. Unit-aware via p.value_format (percent/percent_share -> 'pp', currency_aud -> '$N', ratio_x -> 'N×', else plain numeric). P-2 silent absence for <2 numeric points / unreadable years / zero delta. Always-show (P1); window-aware variant (P2) banked as future OI since _setTrajectoryRange does not trigger Lite re-render. Affects sa2_lfp_persons / sa2_lfp_females / sa2_lfp_males / sa2_median_household_income / sa2_nes_share. No data-side change. -->
<!-- centre.html v3.26 (2026-05-05) — OI-36 close: sa2_nes_share added to renderCatchmentPositionCard.order so the Lite NES row renders in the Catchment Position card. Data-side already shipped at 3ddcf18 (LAYER3_METRIC_META + INTENT_COPY + TRAJECTORY_SOURCE entries for sa2_nes_share). Surgical scope: one entry added to one hardcoded array. Refactor to drive render order from POSITION_CARD_ORDER payload (eliminating JS-side hardcoded array entirely) banked as separate housekeeping OI. Companion centre_page.py v21 (POSITION_CARD_ORDER mirror) in same commit. -->
<!-- centre.html v3.25 (2026-05-04) — C3 ship: absolute-change ("+N places · +M centres") rendered alongside trend % on the 4 catchment trajectory charts. New _computeEventAbsChange(events, startPeriod) helper sums centre_events.places_change and centre_events.net_centres for events at or after the active trend-window startPeriod. Inline with existing _formatTrendPct label inside the trendLabel HTML. Silent absence when p.centre_events absent or empty (Population / Labour Market / Workforce rows unaffected per P-2). -->
<!-- centre.html v3.24 (2026-05-03) — OI-32 polish round 3 (operator review). Three additive renderer changes: (a) cohort distribution histogram now ships a centred explainer line below the bars ("Distribution of values across the peer cohort. The highlighted bar shows where this SA2 sits; the decile strip below converts that position to the 1–10 scale.") plus the existing cohort-note line switched from right-aligned to centre for visual consistency. (b) New _renderMiniDecileStrip helper renders a compact 10-cell horizontal strip using the same colour grammar as _renderDecileStrip (per-decile tones 6%/13%/20%, accent + outline on active cell, structural gaps between bands). (c) SEIFA decile fact in the Catchment section now calls _renderMiniDecileStrip inline so the SES position is visible at a glance — chosen over colour-coding because SES has no valence in LDC credit (high SES = higher fee tolerance AND more competition). Pairs with centre_page.py v20 (INDUSTRY band relabelling + about_data tightening) in same commit. -->
<!-- centre.html v3.23 (2026-05-03) — OI-32 polish round (operator review of v3.22): About-this-measure panel font bumped 11.5px -> 12.5px for readability on the longer explainer text. No structural change; _renderAboutData logic unchanged. Pairs with centre_page.py v18 (text edits to sa2_demand_supply about_data + industry-band labels/notes; same commit). -->
<!-- centre.html v3.22 (2026-05-03) — OI-32 close (Bug 4): catchment metric explainer text. New _renderAboutData(p) helper renders p.about_data as a permanent visible "About this measure" panel inside _renderFullRow, positioned after _renderIntentCopy and before the DER/COM badge row. Reuses the visual pattern established by the workforce row about_data block (v3.17). Splits on \n\n for paragraph breaks; \n within a paragraph becomes <br>. Silent absence per P-2 when p.about_data is null (non-catchment metrics, or catchment metrics with no copy yet). Pairs with centre_page.py v17 in same commit. -->
<!-- centre.html v3.21 (2026-05-03) — Layer 4.2-A.3c Bug 1b fix: second copy of year-extraction regex in _filterTrajectoryByRange also un-anchored. v3.20 fixed _yearOfPeriod (used for the trend label) but missed this duplicate copy used by the trend window filter. Net effect of the bug: trend window buttons (3Y/5Y/10Y/All) had no effect on catchment trajectory charts. With both copies fixed, the filter clips correctly and the trend label updates with the selected window. -->
<!-- centre.html v3.20 (2026-05-03) — Layer 4.2-A.3c Bug 1 fix: _yearOfPeriod() regex updated to find first 4-digit run anywhere in the period string (was anchored to start of string, returned NaN for quarter-format strings like "Q3 2013"). Restores trend-since labels on the 4 catchment trajectory charts that landed in v3.19. Backward compatible with annual ("2024") and census ("2024-Q3") formats. -->
<!-- centre.html v3.19 (2026-05-03) — Layer 4.2-A.3c Part 3b: centre-entry/exit overlay added to the 4 catchment_position trajectory charts (supply_ratio, child_to_place, demand_supply, adjusted_demand). New _kintellEventAnnotation Chart.js plugin draws vertical dashed lines at quarters when centres of the matching subtype opened (green) or closed (red) or churned net-zero (grey) in this SA2. Plugin is data-driven via opts.plugins.kintellEventAnnotation = {events}; absent events = silent no-op (Population/Labour Market/Workforce charts unaffected). Companion to centre_page.py v15 which attaches p.centre_events to the 4 catchment metric entries. -->
<!-- centre.html v3.18 (2026-05-03) — Layer 4.2-A.4: STD-34 calibration metadata surfaced in DER tooltip on the 3 catchment_position metrics that derive from the participation_rate calibration (sa2_adjusted_demand, sa2_demand_supply, sa2_demand_share_state). New _buildCalibrationRow helper formats `calibrated_rate=X.XX — <rule_text>` for inclusion as a "Calibration" row in the DER tooltip; renderBadge gains a calibration field handler; _renderContextRow gains a conditional DER badge (no cohort/decile fields — Context has no peer cohort by design; carries source + calibration only when present). Companion to centre_page.py v13. -->
<!-- centre.html v3.17 (2026-04-30) — Layer 4.2-A.3a-fix iter 4 (F1-β): r.about_data rendered as a permanent visible "About this measure" block below the chart on workforce IVI rows. Silent absence when not populated. Pairs with centre_page.py v12. -->
<!-- centre.html v3.16 (2026-04-30) — Layer 4.2-A.3a-fix iter 3: workforce-section local trend window. New 6M / 1Y / 2Y / 5Y / All selector at top of Workforce Supply Context, default 2Y. Sparklines filter to selected window; Y-axis now uses beginAtZero=false so monthly variance is visible. Re-render is workforce-scoped (other charts untouched). Global trajectory range bar caption corrected. -->
<!-- centre.html v3.15 (2026-04-30) — Layer 4.2-A.3a-fix extension: workforce supply sparklines now have the same trajectory-polish treatment as Population / Labour Market / Catchment — dot points, vertical crosshair, external HTML readout slot above each chart, all in place. Reuses previously-defined _kintellExternalReadout (v3.13) and _kintellCrosshair (v3.12). -->
<!-- centre.html v3.14 (2026-04-30) — Layer 4.2-A.3b (renderer): industry-absolute band line wired beneath the band chips for catchment metrics. Reads payload fields industry_band / industry_band_label / industry_band_note (centre_page.py v10). Renders only when populated; silent absence otherwise. -->
<!-- centre.html v3.13 (2026-04-30) — Layer 4.2-A.3a-fix iter 2: external HTML readout above each trajectory chart, replacing Chart.js native tooltip. Chart.js tooltip disabled (enabled:false); external callback updates a fixed-position <div> above the canvas. Line + crosshair + active dot fully visible underneath; readout never overlaps. -->
<!-- centre.html v3.12 (2026-04-30) — Layer 4.2-A.3a-fix: three trajectory polish items — (A) tooltip clipping resolved properly via wrapper padding-top headroom; (B) sparkline now shows individual dot points (pointRadius 2, hover 6) so periods are visible; (C) new crosshair plugin draws a vertical dashed line at the snapped data index, turning hover into a measurement experience. -->
<!-- centre.html v3.11 (2026-04-30) — Layer 4.2-A.3a: two visual fixes — (1) Chart.js tooltip clipping resolved via yAlign=bottom + position=nearest; (2) sparkline X-axis labels re-enabled (maxTicksLimit=5, autoSkip), canvas height bumped 48->64 to accommodate. Tooltip no longer overlaps into the histogram below; charts now show year ticks on sparkline mode. -->
<!-- centre.html v3.10 (2026-04-30) — Layer 4.2-A.3: catchment ratios wired in as new "Catchment position" card (5 rows: supply_ratio, demand_supply, child_to_place, adjusted_demand, demand_share_state). Page reorder per option α: credit block (Catchment / Population / Labour / Workforce) at top, operational block (NQS / Places / Catchment-meta / Tenure / QA) below. Companion to centre_page.py v9. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kintell — Centre</title>
<!-- Chart.js for trend rendering. Same version as index.html / dashboard.html
     so trajectory charts on this page visually match the industry-snapshot
     and dashboard charts. Per visual_consistency_audit Option 1 / E1. -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* Inherits the visual language of operator.html v8 — same CSS vars,
     same .op-section / .fact / .km-badge / .nqs-pill / .com-line classes
     so look-and-feel is automatic. */
  :root {
    --bg: #0f1419;
    --panel: #1a1f26;
    --panel-2: #232933;
    --panel-3: #2a313c;
    --border: #2d343f;
    --text: #e6e8eb;
    --text-dim: #9aa4b1;
    --text-mute: #6b7684;
    --accent: #4a9eff;
    --green: #4ade80;
    --green-bg: #14301e;
    --amber: #fbbf24;
    --amber-bg: #2f2310;
    --red: #f87171;
    --red-bg: #2e1414;
    --purple: #a78bfa;
    --purple-bg: #1f1a2e;
    --grey: #94a3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* App header */
  header.app {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 16px;
  }
  header.app h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header.app .breadcrumb { color: var(--text-mute); font-size: 13px; }
  header.app .breadcrumb a { color: var(--text-dim); }
  header.app .breadcrumb a:hover { color: var(--accent); }
  header.app .right { margin-left: auto; display: flex; gap: 12px; font-size: 13px; }
  body.embed header.app { display: none; }

  main {
    padding: 18px 24px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }
  body.embed main { padding: 8px 16px 28px; }

  /* States */
  .state-msg {
    text-align: center; padding: 60px 20px;
    color: var(--text-mute); font-size: 14px;
  }
  .state-msg.error {
    color: var(--red); background: var(--red-bg);
    border: 1px solid #5c2626; border-radius: 8px;
    padding: 24px; margin: 40px 0;
  }

  /* Centre header card */
  .centre-header {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 18px;
  }
  .centre-name {
    font-size: 26px; font-weight: 600; line-height: 1.2;
    margin: 0;
  }
  .centre-address {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 6px;
  }
  .centre-meta-row {
    display: flex; flex-wrap: wrap; gap: 10px 18px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--text-dim);
    align-items: center;
  }
  .centre-meta-row .sep { color: var(--text-mute); }
  .centre-meta-row b { color: var(--text); font-weight: 500; }

  /* Quick-fact strip */
  .scale-strip {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px;
  }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px 6px;
    display: flex; flex-direction: column;
    min-width: 96px;
  }
  .chip .n {
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .chip .l {
    font-size: 10px; color: var(--text-mute);
    letter-spacing: 0.08em; text-transform: uppercase;
    font-weight: 600;
  }

  /* External tools row */
  .ext-tools {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px;
  }
  .ext-tools a {
    font-size: 12px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px; border-radius: 3px;
  }
  .ext-tools a:hover { color: var(--accent); text-decoration: none; }

  /* Section cards (mirrors operator.html) */
  .section-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .op-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px 14px;
    margin-bottom: 14px;
  }
  .op-section h3 {
    margin: 0 0 10px 0;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.10em;
    text-transform: uppercase;
  }
  .op-section h3 .note {
    float: right;
    font-size: 10px;
    color: var(--text-mute);
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .placeholder {
    color: var(--text-mute); font-size: 13px;
    font-style: italic;
    padding: 6px 0;
  }
  .placeholder .will-show {
    display: block;
    margin-top: 6px;
    color: var(--text-dim); font-style: normal;
    font-size: 12px;
  }

  .fact {
    display: flex; justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
    gap: 12px;
    align-items: baseline;
  }
  .fact:last-child { border-bottom: none; }
  .fact b { font-variant-numeric: tabular-nums; color: var(--text); }
  .fact .k { color: var(--text-dim); flex-shrink: 0; }
  .fact .v {
    text-align: right;
    display: inline-flex; gap: 8px; align-items: center;
    flex-wrap: wrap; justify-content: flex-end;
  }
  .fact .v b { font-weight: 500; }

  /* NQS pill */
  .nqs-pill {
    display: inline-block;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .nqs-pill.excellent     { background: #14301e; color: #22c55e; }
  .nqs-pill.exceeding     { background: var(--green-bg); color: var(--green); }
  .nqs-pill.meeting       { background: rgba(74,222,128,0.15); color: #a7f3b8; }
  .nqs-pill.working       { background: var(--amber-bg); color: var(--amber); }
  .nqs-pill.significant   { background: var(--red-bg); color: var(--red); }
  .nqs-pill.provisional   { background: var(--panel-3); color: var(--text-dim); }
  .nqs-pill.notrated      { background: var(--panel-3); color: var(--text-mute); font-style: italic; }

  /* Status pills (cadence, tenure) */
  .status-pill {
    display: inline-block;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .status-pill.green  { background: var(--green-bg); color: var(--green); }
  .status-pill.amber  { background: var(--amber-bg); color: var(--amber); }
  .status-pill.red    { background: var(--red-bg);   color: var(--red); }
  .status-pill.grey   { background: var(--panel-3);  color: var(--text-dim); }

  .brand-chip {
    font-size: 11px; color: var(--purple);
    background: var(--purple-bg); border: 1px solid #352957;
    padding: 0 6px; border-radius: 3px; font-weight: 500;
  }
  .brand-chip.none {
    color: var(--text-mute);
    background: var(--panel-3);
    border-color: var(--border);
    font-style: italic;
    font-weight: 400;
  }

  .ownership-pill {
    display: inline-block;
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 3px;
    background: var(--panel-3);
    color: var(--text-dim);
    font-weight: 500;
  }

  /* QA scores grid */
  .qa-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 4px;
  }
  .qa-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 10px;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 12.5px;
  }
  .qa-row:last-child { border-bottom: none; }
  .qa-row .qa-key {
    color: var(--text-mute);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .qa-row .qa-label { color: var(--text-dim); }
  .qa-empty {
    color: var(--text-mute);
    font-style: italic;
    font-size: 12.5px;
    padding: 6px 0;
  }

  /* OBS/DER/COM badges (copied verbatim from operator.html v8) */
  .km-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 5px;
    border-radius: 3px;
    border: 1px solid transparent;
    line-height: 1;
    vertical-align: middle;
    cursor: help;
    user-select: none;
    position: relative;
  }
  .km-badge.obs {
    color: var(--text-mute);
    background: rgba(107, 118, 132, 0.10);
    border-color: rgba(107, 118, 132, 0.35);
  }
  .km-badge.der {
    color: var(--accent);
    background: rgba(74, 158, 255, 0.10);
    border-color: rgba(74, 158, 255, 0.35);
  }
  .km-badge.com {
    color: var(--amber);
    background: rgba(251, 191, 36, 0.10);
    border-color: rgba(251, 191, 36, 0.35);
  }
  .km-badge .km-tip {
    visibility: hidden; opacity: 0;
    transition: opacity 0.12s ease;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    z-index: 30;
    width: 320px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
    color: var(--text);
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0;
    text-align: left;
    pointer-events: none;
    cursor: default;
  }
  .km-badge:hover .km-tip,
  .km-badge:focus-within .km-tip {
    visibility: visible; opacity: 1;
  }
  .km-tip .km-row {
    display: grid;
    grid-template-columns: 60px 1fr;
    column-gap: 8px;
    padding: 3px 0;
  }
  .km-tip .km-row + .km-row { border-top: 1px dashed var(--border); }
  .km-tip .km-key {
    color: var(--text-mute);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 2px;
  }
  .km-tip .km-val { color: var(--text); }
  .km-tip .km-val code {
    font-family: "SF Mono", "Consolas", monospace;
    font-size: 10.5px;
    background: rgba(74, 158, 255, 0.08);
    padding: 1px 4px;
    border-radius: 3px;
    color: var(--text);
  }
  .km-badge.right-anchor .km-tip { left: auto; right: 0; }

  /* Methodology legend */
  .methodology-legend {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 14px;
    padding: 8px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11.5px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .methodology-legend .ml-label {
    color: var(--text-mute);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-right: 4px;
    border-right: 1px solid var(--border);
    margin-right: 4px;
  }
  .methodology-legend .ml-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  /* COM commentary line */
  .com-line {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 12px;
    background: var(--amber-bg);
    border: 1px solid rgba(251, 191, 36, 0.30);
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .com-line.severity-green { background: var(--green-bg); border-color: rgba(74,222,128,0.30); }
  .com-line.severity-red   { background: var(--red-bg);   border-color: rgba(248,113,113,0.30); }
  .com-line.severity-info  { background: var(--panel-2);  border-color: var(--border); }
  .com-line .km-badge { flex-shrink: 0; margin-top: 1px; }
  .com-line .com-text { flex: 1; }

  /* Responsive */
  @media (max-width: 960px) {
    .section-row { grid-template-columns: 1fr; }
  }

  /* Layer 4.2-B-fix2: trajectory range buttons.
     Lifted from index.html .range-btn pattern; mapped onto Palette A
     tokens (--accent / --panel-2 / --border / --text). */
  .range-btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    font: inherit;
    font-size: 11.5px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .range-btn:hover { color: var(--text); border-color: var(--accent); }
  .range-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 500;
  }
  .traj-range-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding: 8px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--text-mute);
  }
  .traj-range-bar .label {
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    font-size: 10.5px;
  }
  .traj-range-bar .btns { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>

<header class="app">
  <h1>Kintell</h1>
  <span class="breadcrumb" id="breadcrumb">Centre</span>
  <span class="right">
    <a href="review.html">Review queue</a>
  </span>
</header>

<main id="main">
  <div class="state-msg" id="loading">Loading centre…</div>
</main>

<script>
const API = "/api";
const params = new URLSearchParams(location.search);
const SERVICE_ID = params.get("id");
const EMBED = params.get("embed") === "1";
if (EMBED) document.body.classList.add("embed");

// ── Helpers (mirrored from operator.html v8) ────────────────────────
function htmlEscape(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"]/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
function fmtN(n) {
  if (n == null) return "—";
  return Number(n).toLocaleString();
}
async function api(path, opts={}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: { "Content-Type": "application/json", ...(opts.headers||{}) }
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
function urlGoogle(name, extra="") {
  return "https://www.google.com/search?q=" +
    encodeURIComponent(`${name} ${extra}`.trim());
}
function urlAcecqa(serviceApprovalNumber) {
  return "https://www.acecqa.gov.au/resources/national-registers/services?service_search=" +
    encodeURIComponent(serviceApprovalNumber || "");
}
function urlAbn(name) {
  return "https://abr.business.gov.au/Search/Run?searchText=" +
    encodeURIComponent(name);
}

const NQS_CLASSES = {
  "Excellent":                         "excellent",
  "Exceeding NQS":                     "exceeding",
  "Meeting NQS":                       "meeting",
  "Working Towards NQS":               "working",
  "Significant Improvement Required":  "significant",
  "Provisional — Not Yet Assessed":    "provisional",
  "(not rated)":                       "notrated",
};
function nqsClass(label) {
  return NQS_CLASSES[label] || "notrated";
}
function nqsPill(label) {
  if (!label) return `<span class="nqs-pill notrated">(not rated)</span>`;
  return `<span class="nqs-pill ${nqsClass(label)}">${htmlEscape(label)}</span>`;
}

// Format date helpers — accept DD/MM/YYYY or YYYY-MM-DD, return "Mon YYYY"
const MON_NUM = { Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",
                  Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12" };
const MON_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function parseAusToIso(s) {
  if (!s) return null;
  const str = String(s).trim();
  let m = /^(\d{2})\/(\d{2})\/(\d{4})/.exec(str);
  if (m) return `${m[3]}-${m[2]}-${m[1]}`;
  m = /^(\d{4})-(\d{2})-(\d{2})/.exec(str);
  if (m) return m[0];
  return null;
}
function formatMonYYYY(s) {
  const iso = parseAusToIso(s);
  if (!iso) return s || "—";
  const [y, m] = iso.split("-");
  const mi = parseInt(m, 10) - 1;
  if (mi < 0 || mi > 11) return s;
  return `${MON_SHORT[mi]} ${y}`;
}

// ── Calibration row helper (Layer 4.2-A.4) ─────────────────────────
// Returns the formatted "Calibration" tooltip value when the entry
// carries STD-34 calibration metadata (calibrated_rate + rule_text
// from service_catchment_cache, attached by centre_page.py v13 for
// metrics with uses_calibration=True). Returns null otherwise so
// renderBadge's if-guard skips the row cleanly.
function _buildCalibrationRow(p) {
  if (!p || !p.rule_text) return null;
  const rate = (p.calibrated_rate != null)
    ? Number(p.calibrated_rate).toFixed(2)
    : "—";
  return `<code>calibrated_rate=${rate}</code> — ${htmlEscape(p.rule_text)}`;
}

// ── OBS/DER/COM badge renderer ──────────────────────────────────────
function renderBadge(classification, methodology, rightAnchor=false) {
  const cls = String(classification || "").toLowerCase();
  if (!["obs","der","com"].includes(cls)) return "";
  const m = methodology || {};
  const rows = [];
  if (m.source)    rows.push({ k: "Source",    v: m.source });
  if (m.formula)   rows.push({ k: "Formula",   v: m.formula });
  if (m.rule)      rows.push({ k: "Rule",      v: m.rule });
  if (m.inputs)    rows.push({ k: "Inputs",    v: m.inputs });
  if (m.calibration) rows.push({ k: "Calibration", v: m.calibration });
  if (m.threshold) rows.push({ k: "Threshold", v: m.threshold });
  if (m.asAt)      rows.push({ k: "As at",     v: m.asAt });
  const tipHtml = rows.length === 0 ? "" : `
    <span class="km-tip" role="tooltip">
      ${rows.map(r => `
        <span class="km-row">
          <span class="km-key">${htmlEscape(r.k)}</span>
          <span class="km-val">${r.v}</span>
        </span>
      `).join("")}
    </span>
  `;
  const anchorCls = rightAnchor ? " right-anchor" : "";
  return `<span class="km-badge ${cls}${anchorCls}" tabindex="0" aria-label="${cls.toUpperCase()} metric">${cls.toUpperCase()}${tipHtml}</span>`;
}

function renderMethodologyLegend() {
  return `
    <div class="methodology-legend">
      <span class="ml-label">methodology</span>
      <span class="ml-item">${renderBadge("OBS")} <span>Observed — primary-source data</span></span>
      <span class="ml-item">${renderBadge("DER")} <span>Derived — transparent formula</span></span>
      <span class="ml-item">${renderBadge("COM")} <span>Commentary — rule-based interpretation</span></span>
    </div>
  `;
}

// ── Render functions ────────────────────────────────────────────────

function renderHeader(centre) {
  const h = centre.header;
  const addr = h.address || {};
  const addrStr = [addr.address_line, addr.suburb, addr.state, addr.postcode]
    .filter(Boolean).join(", ");
  const grp = h.parent_group || {};
  const ent = h.entity || {};
  const brand = h.brand;

  const brandChip = brand
    ? `<span class="brand-chip">${htmlEscape(brand.name)}</span>`
    : `<span class="brand-chip none">no brand</span>`;

  const groupLink = grp.group_id
    ? `<a href="operator.html?id=${grp.group_id}">${htmlEscape(grp.name || "—")}</a>`
    : htmlEscape(grp.name || "—");

  const sapn = h.service_approval_number || "";
  const tools = [
    sapn ? { label: `acecqa: ${htmlEscape(sapn)}`, href: urlAcecqa(sapn) } : null,
    ent.legal_name ? { label: `abr: ${htmlEscape(ent.legal_name)}`,
                       href: urlAbn(ent.legal_name) } : null,
    h.service_name ? { label: "google",
                       href: urlGoogle(h.service_name, addr.suburb || "") } : null,
  ].filter(Boolean);

  const chips = [
    { l: "Approved places", n: fmtN(centre.places.approved_places.value) },
    { l: "Subtype",         n: centre.places.service_sub_type.code || "—" },
    { l: "SEIFA decile",    n: centre.catchment.seifa_decile.value ?? "—" },
    { l: "Remoteness",      n: centre.catchment.remoteness.label || "—" },
  ];

  return `
    <div class="centre-header">
      <h2 class="centre-name">${htmlEscape(h.service_name || "Unnamed centre")}</h2>
      ${addrStr ? `<div class="centre-address">${htmlEscape(addrStr)}</div>` : ""}
      <div class="centre-meta-row">
        <span>operator: <b>${groupLink}</b></span>
        <span class="sep">·</span>
        <span class="ownership-pill">${htmlEscape(grp.ownership_type_label || "Not classified")}</span>
        <span class="sep">·</span>
        <span>${brandChip}</span>
        ${ent.legal_name ? `<span class="sep">·</span><span>entity: <b>${htmlEscape(ent.legal_name)}</b></span>` : ""}
      </div>
      <div class="scale-strip">
        ${chips.map(c => `
          <div class="chip">
            <span class="n">${htmlEscape(String(c.n))}</span>
            <span class="l">${htmlEscape(c.l)}</span>
          </div>
        `).join("")}
      </div>
      ${tools.length ? `
        <div class="ext-tools">
          ${tools.map(t => `<a href="${t.href}" target="_blank" rel="noopener">${t.label}</a>`).join("")}
        </div>
      ` : ""}
      ${renderMethodologyLegend()}
    </div>
  `;
}

function renderNqsCard(centre) {
  const n = centre.nqs;
  const cadence = n.inspection_cadence || {};
  const cadenceColour = ({
    current: "green",
    due_soon: "amber",
    stale: "red",
    no_rating: "grey",
  })[cadence.status] || "grey";

  const ratingValue = n.overall_rating?.value;
  const issuedDate = n.rating_issued_date?.value;

  return `
    <section class="op-section">
      <h3>NQS Rating</h3>
      <div class="fact">
        <span class="k">Overall rating</span>
        <span class="v">

          ${renderBadge("OBS", {
            source: "ACECQA national register",
            asAt: issuedDate ? formatMonYYYY(issuedDate) : "—"
          }, true)}
        </span>
      </div>
      <div class="fact">
        <span class="k">Rating issued</span>
        <span class="v">
          <b>${htmlEscape(formatMonYYYY(issuedDate))}</b>

            source: "ACECQA national register",

      <div class="fact">

          <span class="status-pill ${cadenceColour}">${htmlEscape(cadence.label || "—")}</span>
          ${renderBadge("DER", {
            rule: "Stale ≥ 24 months since rating; due soon ≥ 18 months.",
            inputs: "<code>rating_issued_date</code>",
            threshold: "Stale: 24m; Due soon: 18m"
          }, true)}
        </span>
      </div>

  `;
}

function renderPlacesCard(centre) {
  const p = centre.places;
  const subtype = p.service_sub_type;
  const excludedNote = subtype.excluded_from_workforce
    ? `<div class="placeholder">${htmlEscape(subtype.exclusion_reason || "Excluded from workforce model")}</div>`
    : "";

  return `
    <section class="op-section">
      <h3>Places &amp; Service Type</h3>
      <div class="fact">
        <span class="k">Approved places</span>
        <span class="v">
          <b>${fmtN(p.approved_places.value)}</b>
          ${renderBadge("OBS", { source: "ACECQA national register" }, true)}
        </span>
      </div>
      <div class="fact">
        <span class="k">Subtype</span>
        <span class="v">
          <b>${htmlEscape(subtype.label)}</b>
          ${subtype.code ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(subtype.code)})</span>` : ""}
          ${renderBadge("OBS", { source: "ACECQA service_sub_type" }, true)}
        </span>
      </div>
      ${p.provider_management_type?.value ? `
        <div class="fact">
          <span class="k">Management type</span>
          <span class="v">
            <b>${htmlEscape(p.provider_management_type.value)}</b>
            ${renderBadge("OBS", { source: "ACECQA national register" }, true)}
          </span>
        </div>
      ` : ""}
      <div class="fact">
