        <span class="v"><b>${p.long_day_care_flag ? "Yes" : "No"}</b></span>
      </div>
      ${_renderKinderBlock(p)}
      ${excludedNote}
    </section>
  `;
}

// ── Kinder recognition block (mirrors operator-page treatment) ──────
//
// Renders a small 3-row composite:
//   1. Headline (DER) — "Kinder: confirmed (ACECQA + name match)" etc.
//   2. ACECQA flag evidence row (OBS) — Yes / No / Unknown
//   3. Name-match evidence row (DER) — Yes "matched 'X'" / No
//
// Hidden entirely only when ACECQA has no record AND name doesn't
// match — i.e. when there is genuinely nothing to say. Otherwise both
// evidence rows render so the reader sees both signals explicitly.
//
// Headline state and signals come from p.kinder_summary in the payload
// (computed in centre_page.py v7). The signals array is open — future
// detection methods append entries; this renderer reads positive_keys
// from the array but doesn't hardcode a fixed signal set in the
// evidence rendering loop. Adding a third method = one entry in the
// Python signals array + one optional tooltip-rule string here.
function _renderKinderBlock(p) {
  const summary = p && p.kinder_summary;
  const acecqa = p && p.kinder_approved;
  const nameMatch = p && p.kinder_name_match;

  // v3.7 — always render. Kinder is a permanent fixture of the Places
  // card so the reader sees we checked, even when the result is
  // "Not flagged". Defensive: still hide if the entire payload subtree
  // is missing (pre-v7 payload).
  // v3.8 — visual integration: three flat .fact rows matching the rest
  // of the Places card. Same k/v structure as Approved places / Subtype
  // / Management type / Long day care flag. Bold main value + muted
  // qualifier in parentheses + badge — same pattern as Subtype's
  // "<b>Long Day Care</b> (LDC) [OBS]".
  if (!summary || !nameMatch) return "";

  const acecqaUnknown = (acecqa?.value === null || acecqa?.value === undefined);
  const acecqaPositive = !!acecqa?.value;
  const namePositive = !!nameMatch?.value;

  // Headline: split into bold "main" (Confirmed / Likely / Not flagged)
  // and muted "qualifier" in parentheses, matching Subtype's pattern.
  let summaryMain, summaryQualifier;
  switch (summary?.state) {
    case "confirmed_both":
      summaryMain = "Confirmed"; summaryQualifier = "ACECQA + name match"; break;
    case "confirmed_acecqa":
      summaryMain = "Confirmed"; summaryQualifier = "ACECQA"; break;
    case "likely_name_only":
      summaryMain = "Likely"; summaryQualifier = "name match only — not in ACECQA"; break;
    default:
      summaryMain = "Not flagged"; summaryQualifier = null; break;
  }

  const summaryDerBadge = renderBadge("DER", {
    rule: "Composite of ACECQA flag + service-name regex match. State is one of: confirmed_both, confirmed_acecqa, likely_name_only, not_flagged.",
    inputs: `<code>kinder_approved=${acecqaUnknown ? "null" : (acecqaPositive ? "true" : "false")}</code>, <code>name_match=${namePositive ? "true" : "false"}</code>`,
    formula: "ACECQA + name → confirmed_both; ACECQA only → confirmed_acecqa; name only → likely_name_only; neither → not_flagged.",
    source: "centre_page.py kinder signals composition (v7)."
  }, true);

  // ACECQA evidence row
  const acecqaValueText = acecqaUnknown ? "Unknown" : (acecqaPositive ? "Yes" : "No");
  const acecqaSource = acecqa?.source || "ACECQA national register";
  const acecqaObsBadge = renderBadge("OBS", { source: htmlEscape(acecqaSource) }, true);

  // Name-match evidence row
  const matchedText = nameMatch?.matched_text;
  const nameDerBadge = renderBadge("DER", {
    rule: htmlEscape(nameMatch?.rule || "regex on services.service_name"),
    formula: `<code>${htmlEscape(nameMatch?.pattern || "")}</code> case-insensitive, word-boundary`,
    inputs: matchedText ? `Matched: <code>${htmlEscape(matchedText)}</code>` : "No match",
    threshold: htmlEscape(nameMatch?.caveat || "Name evidence, not an official kinder approval record.")
  }, true);

  return `
    <div class="fact">
      <span class="k">Kinder</span>
      <span class="v">
        <b>${htmlEscape(summaryMain)}</b>
        ${summaryQualifier ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(summaryQualifier)})</span>` : ""}
        ${summaryDerBadge}
      </span>
    </div>
    <div class="fact">
      <span class="k">Kinder — ACECQA flag</span>
      <span class="v">
        <b>${acecqaValueText}</b>
        ${acecqaSource ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(acecqaSource)})</span>` : ""}
        ${acecqaObsBadge}
      </span>
    </div>
    <div class="fact">
      <span class="k">Kinder — name match</span>
      <span class="v">
        <b>${namePositive ? "Yes" : "No"}</b>
        ${(namePositive && matchedText) ? `<span style="color:var(--text-mute);font-size:11px;">(matched "${htmlEscape(matchedText)}")</span>` : ""}
        ${nameDerBadge}
      </span>
    </div>
  `;
}

function renderCatchmentCard(centre) {
  const c = centre.catchment;
  return `
    <section class="op-section">
      <h3>Catchment</h3>
      <div class="fact">
        <span class="k">SEIFA decile</span>
        <span class="v">
          <b>${c.seifa_decile.value ?? "—"}</b>
          ${c.seifa_decile.value != null ? '<span style="color:var(--text-mute);font-size:11px;">/10</span>' : ""}
          ${_renderMiniDecileStrip(c.seifa_decile.value)}
          ${renderBadge("OBS", { source: "ABS SEIFA, joined via SA2" }, true)}
        </span>
      </div>
      <div class="fact">
        <span class="k">Remoteness</span>
        <span class="v">
          <b>${htmlEscape(c.remoteness.label)}</b>
          ${renderBadge("OBS", { source: "ABS ARIA+ remoteness classification" }, true)}
        </span>
      </div>
      ${c.sa2.code ? `
        <div class="fact">
          <span class="k">SA2</span>
          <span class="v">
            <b>${htmlEscape(c.sa2.name || c.sa2.code)}</b>
            ${renderBadge("OBS", { source: "ABS Australian Statistical Geography Standard" }, true)}
          </span>
        </div>
      ` : ""}
      <div class="placeholder" style="margin-top:8px;font-size:11.5px;">
        Catchment ratios (supply, demand, child-per-place, share of state demand)
        <span class="will-show">render in the Catchment position card above.</span>
      </div>
    </section>
  `;
}

// ── Layer 4 — POSITION rendering ────────────────────────────────────
//
// Visual primitive adapted from the operator.html SEIFA pattern
// (renderCatchment in docs/operator.html v8): decile-aware horizontal
// element + low/mid/high band split + decile-style headline. At centre
// level we have one SA2 per metric, so the histogram becomes a
// "you-are-here" 10-cell strip with all cells in the same neutral tone
// (truly neutral palette per design doc §11.2 / D2 — no red/green
// valence in cells; semantics live in band-copy text only).

function _formatPositionValue(p) {
  const raw = p.raw_value;
  if (raw == null) return "—";
  const fmt = p.value_format;
  if (fmt === "int")              return fmtN(raw);
  if (fmt === "percent")          return `${Number(raw).toFixed(1)}%`;
  if (fmt === "currency_annual")  return `$${fmtN(Math.round(raw))} p.a.`;
  if (fmt === "currency_weekly")  return `$${fmtN(Math.round(raw))}/week`;
  // Layer 4.2-A.3 catchment formats:
  if (fmt === "ratio_x")          return `${Number(raw).toFixed(2)}×`;
  if (fmt === "percent_share")    return `${(Number(raw) * 100).toFixed(2)}%`;
  return fmtN(raw);
}

function _formatPositionPeriod(p) {
  if (p.period_label) return p.period_label;
  if (p.year != null) return String(p.year);
  return "";
}

// Build a short bracketed cohort label for the metric title — e.g.
// "vs Qld", "vs Outer Regional Qld", "vs all Outer Regional", "vs Australia".
// Source: cohort_def + the cohort_label string already on the payload
// (which is e.g. "vs other Outer Regional SA2s in Qld"). Keep this short
// enough to sit in brackets after the metric display name.
function _buildCohortShortLabel(p) {
  if (!p || !p.cohort_def) return "";
  // Extract the bits we need from the long-form cohort_label.
  // Long-form examples (from centre_page.py _build_cohort_label):
  //   state              -> "vs other SA2s in {state_name}"
  //   remoteness         -> "vs other {ra_name} SA2s nationwide"
  //   state_x_remoteness -> "vs other {ra_name} SA2s in {state_name}"
  //   national           -> "vs all SA2s nationwide"
  const long = p.cohort_label || "";
  if (p.cohort_def === "state") {
    const m = /in\s+([A-Z]{2,3}|[A-Z][a-z]+|Other Territories)\s*$/i.exec(long);
    return m ? `vs ${m[1]}` : "vs state";
  }
  if (p.cohort_def === "remoteness") {
    const m = /vs other\s+(.+?)\s+SA2s/i.exec(long);
    return m ? `vs all ${m[1]}` : "vs remoteness";
  }
  if (p.cohort_def === "state_x_remoteness") {
    const m = /vs other\s+(.+?)\s+SA2s in\s+([A-Z]{2,3}|[A-Z][a-z]+|Other Territories)\s*$/i.exec(long);
    if (m) return `vs ${m[1]} ${m[2]}`;
    return "vs state-x-remoteness";
  }
  if (p.cohort_def === "national") return "vs Australia";
  return "";
}

// ── Layer 4.2-B-fix2: Trajectory range state ─────────────────────────
//
// Single global window applied to every trajectory chart on the page.
// 0 = "All" (no clipping). For non-zero values, we filter points whose
// period falls within the last N years from the most recent point in
// that series. Each metric's series may have a different "most recent
// point" (e.g. unemployment 2025-Q4 vs LFP 2021), so the window is
// applied per-chart relative to its own end.
//
// Default window: 0 (All) — gives a complete-history view on first load.
let _TRAJECTORY_RANGE_YEARS = 0;
let _LAST_CENTRE = null; // captured by render() so setRange can re-render

// ── Layer 4.3 Thread A: Per-chart range overrides ───────────────────
//
// Per-metric override map alongside the global. Keyed by metric name;
// values are override years (e.g. 1, 2). A missing key (or null) means
// "use the global window". The metric-keyed shape is forward-compatible
// with future short-data series picking up sub-global windows (Thread B
// SALM-LFP, etc.) — adding an entry to _PER_CHART_RANGE_OPTIONS is
// sufficient; nothing else changes.
//
// Click-to-toggle: clicking the active per-chart button clears the
// override and falls back to the global window. Single global "Trend
// window" bar (DEC-73) remains the page-wide control.
let _TRAJECTORY_OVERRIDE_YEARS = {};

// Metrics eligible for sub-global windows. Only metrics with sufficient
// time-series cadence to make 1Y / 2Y meaningful belong here. SALM
// unemployment is quarterly (61 points 2010Q4–2025Q4) — 1Y = 4 quarters,
// 2Y = 8 quarters. Census-only metrics (LFP triplet, income trio) have
// too few points for sub-global windows; they stay on the global.
const _PER_CHART_RANGE_OPTIONS = {
  "sa2_unemployment_rate": [1, 2],
};

function _setTrajectoryRange(years, btnEl) {
  _TRAJECTORY_RANGE_YEARS = years;
  // Update active state on the button row
  document.querySelectorAll(".traj-range-bar .range-btn").forEach(b => {
    b.classList.remove("active");
  });
  if (btnEl) btnEl.classList.add("active");
  // Re-render the page so charts pick up the new window
  if (_LAST_CENTRE) render(_LAST_CENTRE);
}

// Returns the effective range years for a given metric — per-chart
// override if set, otherwise the global trend-window value.
function _getEffectiveRangeYears(metric) {
  const override = _TRAJECTORY_OVERRIDE_YEARS[metric];
  return (override !== undefined && override !== null) ? override : _TRAJECTORY_RANGE_YEARS;
}

// Click-to-toggle handler. Clicking the active button clears the
// override (falls back to global); clicking any other button sets it.
function _setPerChartRange(metric, years, btnEl) {
  const current = _TRAJECTORY_OVERRIDE_YEARS[metric];
  if (current === years) {
    delete _TRAJECTORY_OVERRIDE_YEARS[metric];
  } else {
    _TRAJECTORY_OVERRIDE_YEARS[metric] = years;
  }
  // Re-render so the chart picks up the new window
  if (_LAST_CENTRE) render(_LAST_CENTRE);
}

// Emits a small right-aligned button strip ABOVE the trajectory canvas
// for metrics in _PER_CHART_RANGE_OPTIONS. Returns "" for any metric
// not eligible for sub-global windows.
// ── Layer 4.3 sub-pass 4.3.8 — Trend-window % change ────────────────
//
// For each Full-weight chart, compute the % change from the first to
// last point in the currently-active window. Surfaced two ways:
//   1. Static label top-right of the chart: "+X.X% since YYYY"
//   2. Running % from window-start added to Chart.js hover tooltip
//      via the afterLabel callback (multi-line tooltip native to
//      Chart.js).
//
// Both update live when the user clicks any range button (global or
// per-chart) — the existing re-render flow re-computes the filtered
// points and the label rebuilds with them.
//
// Decisions (locked in 4.3.8 probe):
//   D3: start anchor = first point IN filtered window (honest about
//       what the % is computed against, even when window > available
//       data). Label says "since 2017" not "since 2014" if earliest
//       point in a 10Y window is 2017.
//   D4: tooltip is two-line — line 1 unchanged from before, line 2
//       adds the running %. First point in window has no line 2 (it
//       IS the start; no change to display).
//   Implementation defaults: 1 decimal precision; explicit + for
//   positive; en-dash − for negative; <2 points = no label, no
//   tooltip extension; full-trajectory empty = no label (matches
//   existing silent behaviour).
//
// Renderer-implementation choice within DEC-73 (Trajectory window UX)
// scope, same pattern as Thread A's per-chart overrides — no new DEC.

// Extract the year portion of a period string. Handles "2024",
// "2024-Q3", and "Q3 2013" (the catchment trajectory format added
// in v3.19; the leading-^ anchor in the v3.18 version returned NaN
// for quarter-leading strings).
function _yearOfPeriod(period) {
  const s = String(period);
  const m = /(\d{4})/.exec(s);  // v3.20: find first 4-digit run anywhere
  return m ? parseInt(m[1], 10) : NaN;
}

// Format a signed % change with 1 decimal. Explicit + prefix for
// positive; en-dash − prefix for negative (Unicode minus, matches
// design palette discipline).
function _formatTrendPct(pct) {
  if (pct == null || !isFinite(pct)) return "";
  const abs = Math.abs(pct).toFixed(1);
  if (pct > 0) return `+${abs}%`;
  if (pct < 0) return `−${abs}%`;
  return `+0.0%`;
}

// Compute % change from points[0] to points[points.length - 1].
// Returns null if not computable (need ≥2 points; start value cannot
// be 0 or null). Returns {pct, startPeriod, endPeriod, startValue}.
function _computeTrendPctChange(points) {
  if (!points || points.length < 2) return null;
  const start = points[0];
  const end = points[points.length - 1];
  if (start == null || end == null) return null;
  const sv = Number(start.value);
  const ev = Number(end.value);
  if (!isFinite(sv) || !isFinite(ev) || sv === 0) return null;
  const pct = ((ev - sv) / sv) * 100;
  return {
    pct,
    startPeriod: start.period,
    endPeriod: end.period,
    startValue: sv,
  };
}


// ── C3: absolute-change helper ─────────────────────────────────────
//
// Aggregates centre_events.places_change and centre_events.net_centres
// for events whose quarter sits at or after the active trend-window
// startPeriod. Returns {placesChange, centresChange, eventCount} or
// null when there are no qualifying events. Used inline with the
// trend-% label on catchment trajectory charts.
function _computeEventAbsChange(events, startPeriod) {
  if (!events || !events.length || !startPeriod) return null;
  const startYr = _yearOfPeriod(startPeriod);
  if (startYr == null || isNaN(startYr)) return null;
  let pl = 0, c = 0, n = 0;
  for (const e of events) {
    if (!e || !e.quarter) continue;
    const eyr = _yearOfPeriod(e.quarter);
    if (eyr == null || isNaN(eyr)) continue;
    if (eyr < startYr) continue;
    pl += (e.places_change || 0);
    c  += (e.net_centres   || 0);
    n  += 1;
  }
  if (n === 0) return null;
  return { placesChange: pl, centresChange: c, eventCount: n };
}


// Buttons-only emit for inline composition with the trend-% label
// (sub-pass 4.3.8). Returns the button HTML without an outer wrapper
// div — caller wraps. Returns "" if metric has no per-chart options.
function _renderPerChartRangeBarButtons(metric) {
  const opts = _PER_CHART_RANGE_OPTIONS[metric];
  if (!opts) return "";
  const override = _TRAJECTORY_OVERRIDE_YEARS[metric];
  return opts.map(years => {
    const isActive = (override === years);
    const titleAttr = isActive
      ? "Click to clear and use the global trend window"
      : `Override to last ${years} year${years > 1 ? "s" : ""}`;
    return `<button class="range-btn${isActive ? " active" : ""}" `
         + `onclick="_setPerChartRange('${metric}', ${years}, this)" `
         + `title="${titleAttr}">${years}Y</button>`;
  }).join("");
}

// Backward-compat wrapper — wraps buttons in the original right-aligned
// flex div. Retained in case any caller outside _renderTrajectory uses
// it. Sub-pass 4.3.8's _renderTrajectory uses the buttons-only helper
// above so it can compose them with the trend-% label on the same row.
function _renderPerChartRangeBar(metric) {
  const btns = _renderPerChartRangeBarButtons(metric);
  if (!btns) return "";
  return `
    <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px;">
      ${btns}
    </div>
  `;
}

function _renderTrajectoryRangeBar() {
  // Renders only when there's data to show — skipped if no SA2 / no Layer 3.
  const opts = [
    { years: 3,  label: "3Y" },
    { years: 5,  label: "5Y" },
    { years: 10, label: "10Y" },
    { years: 0,  label: "All" },
  ];
  const btns = opts.map(o => {
    const isActive = (o.years === _TRAJECTORY_RANGE_YEARS);
    return `<button class="range-btn${isActive ? " active" : ""}" `
         + `onclick="_setTrajectoryRange(${o.years}, this)">${o.label}</button>`;
  }).join("");
  return `
    <div class="traj-range-bar">
      <span class="label">Trend window</span>
      <div class="btns">${btns}</div>
      <span style="margin-left:auto;font-size:10.5px;color:var(--text-mute);">
        applies to Population, Labour, Catchment trajectories
      </span>
    </div>
  `;
}

// Filter trajectory points to those within the last N years from the
// series' most recent point. Handles annual ("2024"), census ("2024-Q3"),
// and quarterly ("Q3 2013") period formats.
function _filterTrajectoryByRange(points, years) {
  if (!years || years <= 0 || !points.length) return points;
  // Extract the year portion of each point's period.
  // v3.21: regex un-anchored so it matches the catchment quarter format
  // ("Q3 2013") added in v3.19. Pre-v3.21 the ^-anchor returned NaN
  // for quarter-leading strings, the function bailed out via the
  // isNaN check below, and the trend window filter never applied to
  // catchment charts.
  const yearOf = (period) => {
    const s = String(period);
    const m = /(\d{4})/.exec(s);
    return m ? parseInt(m[1], 10) : NaN;
  };
  const lastYear = yearOf(points[points.length - 1].period);
  if (isNaN(lastYear)) return points;
  const cutoff = lastYear - years;
  return points.filter(pt => yearOf(pt.period) > cutoff);
}

// ── Layer 4.2-B-fix: Chart.js trajectory ───────────────────────────
//
// Previous v3 used bespoke SVG for the trajectory. v3.1 replaces it with
// Chart.js — same library, same makeLine / makeDataset / makeOpts helpers
// as index.html and dashboard.html. Cohort histogram and decile strip
// remain bespoke SVG (they're position indicators, not trends; Chart.js
// is heavier than needed for a 30px shape strip).
//
// Per-metric stroke colours follow the index.html "chart-catch-combined"
// convention (System B palette intentionally embedded inside this System
// A page — embedded "industry-style" mini-charts inside the centre
// drilldown context). Stroke colour does NOT carry valence; valence
// lives only in band-copy text per E2.
//
const _CHART_STROKE_BY_METRIC = {
  // Population family — teal (matches index.html chart-catch-pop)
  sa2_under5_count:            "#00c9a7",
  sa2_total_population:        "#00c9a7",
  sa2_births_count:            "#00c9a7",
  // Labour-market — multi-hue per index.html convention
  sa2_unemployment_rate:       "#e05c3a", // hot — index uses for new-approvals etc.
  sa2_median_employee_income:  "#3d7eff", // primary blue
  sa2_median_household_income: "#3d7eff",
  sa2_median_total_income:     "#3d7eff",
  sa2_lfp_persons:             "#9b59b6", // purple — index uses for supply demand
  sa2_lfp_females:             "#9b59b6",
  sa2_lfp_males:               "#9b59b6",
};
const _CHART_FILL_BY_METRIC = {
  sa2_under5_count:            "rgba(0,201,167,0.08)",
  sa2_total_population:        "rgba(0,201,167,0.08)",
  sa2_births_count:            "rgba(0,201,167,0.08)",
  sa2_unemployment_rate:       "rgba(224,92,58,0.08)",
  sa2_median_employee_income:  "rgba(61,126,255,0.08)",
  sa2_median_household_income: "rgba(61,126,255,0.08)",
  sa2_median_total_income:     "rgba(61,126,255,0.08)",
  sa2_lfp_persons:             "rgba(155,89,182,0.08)",
  sa2_lfp_females:             "rgba(155,89,182,0.08)",
  sa2_lfp_males:               "rgba(155,89,182,0.08)",
};

// v3.13: external tooltip readout. Updates a fixed-position
// <div> above the chart (slot id derived from canvas id) when
// the user hovers the chart. Replaces native Chart.js tooltip
// rendering for trajectory charts so the readout never
// overlaps the data line.
// v3.13a readout: defensive parser. Collects every text
// fragment Chart.js v4 may have placed in the tooltip
// internal state — body[].before / .lines / .after, plus
// tt.beforeBody and tt.afterBody arrays. Whatever the
// callbacks (label, afterLabel, beforeBody, afterBody)
// produced, we capture and render it.
function _kintellExternalReadout(context) {
  const chart = context.chart;
  const tt = context.tooltip;
  const canvasId = chart.canvas && chart.canvas.id;
  if (!canvasId) return;
  const slot = document.getElementById("readout-" + canvasId);
  if (!slot) return;
  if (!tt || tt.opacity === 0) {
    slot.innerHTML = '<span style="color:var(--text-mute);font-style:italic;">hover the line to read values</span>';
    return;
  }
  const titleLines = tt.title || [];
  const beforeBody = tt.beforeBody || [];
  const bodyItems = tt.body || [];
  const afterBody = tt.afterBody || [];
  const lines = [];
  beforeBody.forEach(l => { if (l) lines.push(l); });
  bodyItems.forEach(b => {
    (b.before || []).forEach(l => { if (l) lines.push(l); });
    (b.lines  || []).forEach(l => { if (l) lines.push(l); });
    (b.after  || []).forEach(l => { if (l) lines.push(l); });
  });
  afterBody.forEach(l => { if (l) lines.push(l); });
  const titleHtml = titleLines.length
    ? `<span style="color:var(--text-mute);font-size:11.5px;margin-right:10px;">${titleLines[0]}</span>`
    : "";
  const linesHtml = lines.map((l, i) =>
    i === 0
      ? `<b style="color:var(--text);">${l}</b>`
      : `<span style="color:var(--text-mute);font-size:11.5px;margin-left:10px;">${l}</span>`
  ).join("");
  slot.innerHTML = titleHtml + linesHtml;
}

// v3.12b: custom tooltip positioner. Pins horizontally to
// the active data point but vertically to the top of the
// chart area. Combined with yAlign="bottom" the tooltip box
// extends UP from this pinned y, sitting just above the
// chart edge — leaving the data line + crosshair + active
// dot clearly visible underneath.
if (window.Chart && Chart.Tooltip && Chart.Tooltip.positioners) {
  Chart.Tooltip.positioners.topPin = function(items, eventPos) {
    if (!items || !items.length) return false;
    const item = items[0];
    const chart = item.element && item.element.$context && item.element.$context.chart;
    const ca = chart && chart.chartArea;
    return {
      x: item.element.x,
      y: ca ? (ca.top - 4) : item.element.y,
    };
  };
}

// v3.12: crosshair plugin for trajectory charts.
// Draws a vertical dashed line at the active tooltip x-position
// (which Chart.js snaps to nearest data index because
// interaction.mode is "index"). Effect: hovering feels like
// scrubbing a ruler — pause anywhere on the line, read the
// value cleanly, see exactly which period the cursor is on.
const _kintellCrosshair = {
  id: "kintellCrosshair",
  afterDraw(chart) {
    const tt = chart.tooltip;
    if (!tt || !tt.opacity) return;
    const active = tt.dataPoints && tt.dataPoints[0];
    if (!active) return;
    const ctx = chart.ctx;
    const ca  = chart.chartArea;
    const x   = active.element.x;
    ctx.save();
    ctx.strokeStyle = "rgba(180,200,230,0.40)";
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x, ca.top);
    ctx.lineTo(x, ca.bottom);
    ctx.stroke();
    ctx.restore();
  }
};

// v3.19 (Layer 4.2-A.3c): centre-entry/exit overlay for catchment charts.
// Vertical dashed lines at quarters when centres of the matching subtype
// opened or closed in this SA2. Data-driven via opts.plugins.
// kintellEventAnnotation = { events: [...] } — when events are absent,
// the plugin silently no-ops (Population/Labour Market/Workforce charts
// unaffected). Adapted from dashboard.html's eventAnnotationPlugin
// pattern but reads events from chart options rather than scope-bound
// sectorEvents, so each chart can carry its own per-SA2 / per-subtype
// event set.
//
// Color encoding:
//   additions (net_centres > 0) -> green   — competitive expansion
//   removals  (net_centres < 0) -> red     — competitive contraction
//   net-zero churn              -> grey    — same-quarter rebrand etc.
const _kintellEventAnnotation = {
  id: "kintellEventAnnotation",
  afterDraw(chart) {
    const cfg = chart.options && chart.options.plugins && chart.options.plugins.kintellEventAnnotation;
    if (!cfg || !cfg.events || !cfg.events.length) return;
    const events = cfg.events;
    const ctx2 = chart.ctx;
    const xAxis = chart.scales.x;
    const yAxis = chart.scales.y;
    if (!xAxis || !yAxis) return;

    // Labels currently displayed on the chart (after any range filter).
    const labels = chart.data.labels || [];

    events.forEach(ev => {
      const idx = labels.indexOf(ev.quarter);
      if (idx < 0) return;  // event quarter is outside the visible window

      const xPixel = xAxis.getPixelForValue(idx);
      if (xPixel < xAxis.left || xPixel > xAxis.right) return;

      const net = Number(ev.net_centres) || 0;
      const color = net > 0 ? "rgba(0,201,167,0.55)"   // green: additions
                  : net < 0 ? "rgba(224,92,58,0.55)"   // red: removals
                  :           "rgba(155,155,155,0.40)"; // grey: churn

      ctx2.save();
      ctx2.strokeStyle = color;
      ctx2.lineWidth = 1.5;
      ctx2.setLineDash([4, 3]);
      ctx2.beginPath();
      ctx2.moveTo(xPixel, yAxis.top);
      ctx2.lineTo(xPixel, yAxis.bottom);
      ctx2.stroke();
      ctx2.restore();
    });
  }
};

// Chart.js helpers — verbatim from index.html so behaviour matches.
function _kintell_makeOpts(yLabel, extra) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: "index", intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        // v3.13: native Chart.js tooltip disabled. The
        // tooltip MACHINERY (active-point detection, label
        // callbacks) still runs — we hook into it via the
        // external callback below to update a fixed DOM
        // element above the canvas.
        enabled: false,
        external: _kintellExternalReadout,
        // Keep these so the callbacks (label, afterLabel)
        // continue to be invoked and produce body lines.
        displayColors: false,
      },
    },
    scales: {
      x: {
        grid: { display: false, drawBorder: false },
        ticks: {
          color: "#6b7684",
          font: { size: 9 },
          maxRotation: 0,
          autoSkip: true,
          maxTicksLimit: 8,
        },
      },
      y: {
        grid: { color: "rgba(45,52,63,0.4)", drawBorder: false },
        ticks: { color: "#6b7684", font: { size: 9 } },
        title: {
          display: !!yLabel,
          text: yLabel || "",
          color: "#8890a8",
          font: { size: 9 },
        },
      },
      ...(extra || {}),
    },
  };
}

function _kintell_makeLine(label, data, color, fill) {
  return {
    label,
    data,
    borderColor: color,
    backgroundColor: fill || "transparent",
    fill: !!fill,
    tension: 0,
    pointRadius: 0,
    borderWidth: 2,
    spanGaps: true,
  };
}

// Registry + queue: chart instances rendered AFTER main.innerHTML is set,
// because Chart.js needs the canvas attached to the DOM. _pendingCharts
// is drained by render() at the end of its single-shot render.
const _CHART_INSTANCES = {};
const _CHART_PENDING = [];

function _flushPendingCharts() {
  // Destroy any previous chart instances first (defensive — render() is
  // single-shot today but if we ever re-render this avoids leaks).
  Object.keys(_CHART_INSTANCES).forEach(id => {
    try { _CHART_INSTANCES[id].destroy(); } catch (e) {}
    delete _CHART_INSTANCES[id];
  });
  while (_CHART_PENDING.length) {
    const fn = _CHART_PENDING.shift();
    try { fn(); } catch (e) { console.warn("chart init failed:", e); }
  }
}

// Layer 4.2-B-fix: Chart.js-backed trajectory.
//
// Returns a <canvas> wrapper element with a unique id. The actual Chart.js
// instantiation is queued in _CHART_PENDING and runs after main.innerHTML
// is set (Chart.js needs the canvas attached to the DOM).
//
// Threshold logic preserved from v3:
//   >= 7 points -> sparkline-style (no point markers, area fill)
//   <  7 points -> dot trajectory (point markers visible)
//
// All charts get hover tooltip with per-point period+value via Chart.js's
// built-in tooltip — replaces the bespoke <title> attribute from v3.
function _renderTrajectory(metric, p) {
  const allPoints = (p && p.trajectory) || [];
  if (!allPoints.length) return "";

  // Apply effective trend window — per-chart override falls back to
  // global (DEC-73 + Layer 4.3 Thread A). Per metric, window is relative
  // to that series' most recent point.
  const effectiveYears = _getEffectiveRangeYears(metric);
  const points = _filterTrajectoryByRange(allPoints, effectiveYears);

  // Sub-pass 4.3.8 — top-line strip combining the trend-% label
  // (LEFT) and any per-chart range buttons (RIGHT). For metrics with
  // no per-chart buttons, the label sits alone right-aligned per the
  // "top-right of each chart" anchor confirmed in the previous round.
  // v3.6 — prominence bump: 11→13px, --text-mute → --text-dim,
  // value rendered semibold so the % reads as the headline.
  const trend = _computeTrendPctChange(points);
  const absChange = (trend && p.centre_events && p.centre_events.length)
    ? _computeEventAbsChange(p.centre_events, trend.startPeriod)
    : null;
  const absChangeLabel = absChange
    ? ` · <span style="color:var(--text-mute);">${absChange.placesChange >= 0 ? "+" : ""}${absChange.placesChange} places · ${absChange.centresChange >= 0 ? "+" : ""}${absChange.centresChange} ${Math.abs(absChange.centresChange) === 1 ? "centre" : "centres"}</span>`
    : "";
  const trendLabel = (trend && p.row_weight !== "lite" && p.row_weight !== "context")
    ? `<span style="font-size:13px;color:var(--text-dim);font-variant-numeric:tabular-nums;">
         <b style="font-weight:600;color:var(--text);">${_formatTrendPct(trend.pct)}</b>
         <span style="color:var(--text-mute);"> since ${htmlEscape(String(_yearOfPeriod(trend.startPeriod)))}</span>${absChangeLabel}
       </span>`
    : "";
  const perChartBtns = _renderPerChartRangeBarButtons(metric);

  let topStrip = "";
  if (trendLabel && perChartBtns) {
    // Both present — label LEFT, buttons RIGHT
    topStrip = `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:6px;">
        ${trendLabel}
        <div style="display:flex;gap:6px;">${perChartBtns}</div>
      </div>
    `;
  } else if (trendLabel) {
    // Label alone, right-aligned (top-right anchor)
    topStrip = `
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        ${trendLabel}
      </div>
    `;
  } else if (perChartBtns) {
    // Buttons alone — preserves the v3.4 layout
    topStrip = `
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px;">
        ${perChartBtns}
      </div>
    `;
  }

  if (!points.length) {
    // Selected window contains no points for this metric — render an
    // honest empty-state rather than a misleading flat-line chart.
    // Top strip still renders so the user can see / clear an override.
    return `
      ${topStrip}
      <div style="margin-top:6px;padding:8px;background:var(--panel-2);
                  border:1px dashed var(--border);border-radius:4px;
                  color:var(--text-mute);font-size:11px;font-style:italic;
                  text-align:center;">
        no points in selected window — try a wider range
      </div>
    `;
  }

  // Per-metric stroke fallback to default blue
  const stroke = _CHART_STROKE_BY_METRIC[metric] || "#3d7eff";
  const fill = _CHART_FILL_BY_METRIC[metric] || "rgba(61,126,255,0.08)";

  const isSparkline = points.length >= 7;
  const labels = points.map(pt => String(pt.period));
  const data = points.map(pt => Number(pt.value));

  // Capture window-start value for the tooltip's running-% callback.
  // Closure-captured below in the chart init queue.
  const windowStartValue = data.length ? data[0] : null;
  const windowStartPeriod = points.length ? points[0].period : null;
  const valueFormat = p.value_format || null;

  // Unique id per row (metric + service-id keeps it stable on re-renders)
  const canvasId = `traj-${metric}-${Math.random().toString(36).slice(2, 8)}`;
  // v3.11: both modes now show x-axis labels (sparkline gets
  // sparse ticks via maxTicksLimit=5). Canvas height bumped to
  // 64 so tooltip has headroom and ticks fit cleanly.
  const canvasHeight = isSparkline ? 64 : 64;

  // Queue the chart init to run after the canvas is in the DOM.
  _CHART_PENDING.push(() => {
    const el = document.getElementById(canvasId);
    if (!el) return;

    const dataset = _kintell_makeLine(p.display || metric, data, stroke, fill);
    // v3.12: BOTH modes show dot points. Sparkline gets
    // smaller dots (radius 2), dot-trajectory gets larger
    // (radius 3). Hover bumps to a clearly-visible 5/6.
    dataset.pointBackgroundColor = stroke;
    dataset.pointBorderColor = stroke;
    if (!isSparkline) {
      dataset.pointRadius = 3;
      dataset.pointHoverRadius = 5;
    } else {
      dataset.pointRadius = 2;
      dataset.pointHoverRadius = 6;
    }

    const opts = _kintell_makeOpts(null, null);
    if (isSparkline) {
      // v3.11: show sparse year labels on sparkline mode.
      // 5-tick limit keeps the axis legible without crowding.
      opts.scales.x.ticks.display = true;
      opts.scales.x.ticks.maxTicksLimit = 5;
      opts.scales.x.ticks.autoSkip = true;
      opts.scales.x.ticks.font = { size: 9 };
    } else {
      // Show all dot labels for short series
      opts.scales.x.ticks.maxTicksLimit = points.length;
      opts.scales.x.ticks.font = { size: 9 };
    }

    // Sub-pass 4.3.8 — tooltip extension: line 2 shows running % from
    // window-start to that point. First point in window has no line 2
    // (it IS the start; no change to display).
    opts.plugins.tooltip.callbacks = {
      label: function (ctx) {
        const v = Number(ctx.parsed.y);
        let formatted;
        if (valueFormat === "percent")               formatted = `${v.toFixed(1)}%`;
        else if (valueFormat === "currency_annual")  formatted = `$${Math.round(v).toLocaleString()} p.a.`;
        else if (valueFormat === "currency_weekly")  formatted = `$${Math.round(v).toLocaleString()}/week`;
        else if (valueFormat === "int")              formatted = Math.round(v).toLocaleString();
        else                                         formatted = String(v);
        return `${ctx.dataset.label}: ${formatted}`;
      },
      afterLabel: function (ctx) {
        // v3.13a: populate trend line for EVERY point
        // including window-start (operator wants the
        // readout consistent across all cursor positions).
        if (windowStartValue == null || windowStartValue === 0) return null;
        const here = Number(ctx.parsed.y);
        if (!isFinite(here)) return null;
        const pct = ((here - windowStartValue) / windowStartValue) * 100;
        const startYear = _yearOfPeriod(windowStartPeriod);
        return `${_formatTrendPct(pct)} since ${startYear}`;
      },
    };

    // v3.19 (Layer 4.2-A.3c): if this metric carries centre_events
    // (only the 4 catchment metrics do, per centre_page.py v15), pass
    // them through to the new _kintellEventAnnotation plugin via opts.
    if (p && p.centre_events && p.centre_events.length) {
      if (!opts.plugins) opts.plugins = {};
      opts.plugins.kintellEventAnnotation = { events: p.centre_events };
    }

    _CHART_INSTANCES[canvasId] = new Chart(el, {
      type: "line",
      data: { labels, datasets: [dataset] },
      options: opts,
      plugins: [_kintellCrosshair, _kintellEventAnnotation],
    });
  });

  return `
    ${topStrip}
    <div id="readout-${canvasId}" style="height:18px;font-size:12.5px;line-height:18px;color:var(--text);margin-top:10px;margin-bottom:4px;padding:0 4px;">
      <span style="color:var(--text-mute);font-style:italic;">hover the line to read values</span>
    </div>
    <div style="height:${canvasHeight}px;position:relative;">
      <canvas id="${canvasId}"></canvas>
    </div>
  `;
}

// Layer 4.2-B cohort distribution histogram. 20 equal-width bins of
// raw_value across the cohort, with this SA2's bin highlighted. Reads
// p.cohort_distribution from the payload (built server-side by
// _cohort_distribution in centre_page.py per Decision D2).
function _renderCohortHistogram(p) {
  const dist = p && p.cohort_distribution;
  if (!dist || !dist.bins || !dist.bins.length) return "";

  const bins = dist.bins;
  const maxCount = bins.reduce((m, b) => Math.max(m, b.count || 0), 0);
  if (maxCount === 0) return "";
  const selfBin = (dist.self_bin != null) ? dist.self_bin : -1;

  // Each bar: height proportional to count/maxCount, bottom-aligned
  const barHtml = bins.map((b, i) => {
    const isSelf = (i === selfBin);
    const heightPct = ((b.count || 0) / maxCount) * 100;
    const bg = isSelf ? "var(--accent)" : "rgba(74,158,255,0.20)";
    const titleTxt = `${b.bin_min.toFixed(2)} – ${b.bin_max.toFixed(2)}: ${b.count} SA2${b.count === 1 ? "" : "s"}${isSelf ? "  ← this SA2" : ""}`;
    return `<div title="${htmlEscape(titleTxt)}" style="flex:1;min-width:6px;height:${heightPct.toFixed(1)}%;background:${bg};border-radius:1px 1px 0 0;${isSelf ? "box-shadow:0 0 0 1px var(--accent);" : ""}"></div>`;
  }).join("");

  const cohortNote = `cohort distribution · n=${dist.cohort_n} · range ${dist.min.toFixed(0)}–${dist.max.toFixed(0)}`;

  // v3.24: explainer text added below histogram (centred); cohort
  // note alignment changed from right to centre to match.
  const explainerTxt = "Distribution of values across the peer cohort. The highlighted bar shows where this SA2 sits; the decile strip below converts that position to the 1–10 scale.";
  return `
    <div style="margin-top:8px;">
      <div style="display:flex;align-items:flex-end;gap:1px;height:30px;background:transparent;">
        ${barHtml}
      </div>
      <div style="font-size:11px;color:var(--text-mute);font-style:italic;line-height:1.45;margin-top:6px;text-align:center;">
        ${htmlEscape(explainerTxt)}
      </div>
      <div style="font-size:9.5px;color:var(--text-mute);letter-spacing:0.04em;margin-top:4px;text-align:center;">
        ${htmlEscape(cohortNote)}
      </div>
    </div>
  `;
}

// Layer 4.2-B: gradient strip. Single-hue blue ramp per Decision D2 —
// duller blue tints on non-active cells (low/mid/high), full --accent
// outline on the SA2's cell. Pure positional gradient — no valence.
function _renderDecileStrip(decile) {
  const cells = [];
  // Per-decile background tones (RGBA, --accent decomposed = 74,158,255).
  // Bottom band ~6%, mid ~13%, top ~20%. Visible at a glance, dull
  // enough not to compete with the SA2's full-saturation cell.
  const TONE_BY_DECILE = {
    1: 0.06, 2: 0.06, 3: 0.06,
    4: 0.13, 5: 0.13, 6: 0.13,
    7: 0.20, 8: 0.20, 9: 0.20, 10: 0.20,
  };
  for (let d = 1; d <= 10; d++) {
    const isHere = (d === decile);
    const tone = TONE_BY_DECILE[d];
    const baseStyle =
      "flex:1;min-width:18px;height:24px;" +
      `background:rgba(74,158,255,${tone});` +
      "border:1px solid var(--border);display:flex;align-items:center;" +
      "justify-content:center;font-size:10px;color:var(--text-mute);" +
      "font-variant-numeric:tabular-nums;border-radius:2px;";
    const hereStyle = isHere
      ? "border:2px solid var(--accent);box-shadow:inset 0 0 0 1px var(--accent);" +
        "color:var(--text);font-weight:700;background:rgba(74,158,255,0.32);"
      : "";
    // Slight gap between bands (3↔4, 6↔7) — band dividers are structural.
    const gapBefore = (d === 4 || d === 7) ? "margin-left:6px;" : "";
    cells.push(
      `<div title="Decile ${d}" style="${baseStyle}${hereStyle}${gapBefore}">${d}</div>`
    );
  }
  return `<div style="display:flex;gap:2px;margin-top:8px;">${cells.join("")}</div>`;
}

// ── v3.24: Mini decile strip for inline use in fact rows ─────────────
//
// Compact version of _renderDecileStrip — same colour grammar (per-
// decile tones 6%/13%/20%, accent fill + outline on active cell,
// structural gaps between deciles 3-4 and 6-7) but inline-sized
// (6px wide cells, 10px tall, no number labels). Designed to sit
// beside a numeric value in a fact row without claiming vertical
// space. Returns "" when decile is null.
//
// Used by the SEIFA decile fact in the Catchment section. Could be
// reused for any future "decile-as-fact" surface (e.g. ARIA band).
function _renderMiniDecileStrip(decile) {
  if (decile == null) return "";
  const TONE_BY_DECILE = {
    1: 0.06, 2: 0.06, 3: 0.06,
    4: 0.13, 5: 0.13, 6: 0.13,
    7: 0.20, 8: 0.20, 9: 0.20, 10: 0.20,
  };
  const cells = [];
  for (let d = 1; d <= 10; d++) {
    const isHere = (d === decile);
    const tone = TONE_BY_DECILE[d];
    const baseStyle =
      "display:inline-block;width:6px;height:10px;" +
      `background:rgba(74,158,255,${tone});` +
      "border-radius:1px;vertical-align:middle;";
    const hereStyle = isHere
      ? "background:var(--accent);box-shadow:0 0 0 1px var(--accent);"
      : "";
    const gapBefore = (d === 4 || d === 7) ? "margin-left:3px;"
                    : (d === 1 ? "" : "margin-left:1px;");
    cells.push(`<span title="Decile ${d}${isHere ? ' (this SA2)' : ''}" style="${baseStyle}${hereStyle}${gapBefore}"></span>`);
  }
  return `<span style="display:inline-flex;align-items:center;margin-left:8px;vertical-align:middle;">${cells.join("")}</span>`;
}

function _renderBandChips(metric, p) {
  const bands = ["low", "mid", "high"];
  // Sub-pass 4.3.7 — perspective-aware band copy lookup. For non-
  // reversible metrics this just returns p.band_copy unchanged. For
  // reversible metrics in inverse perspective, returns the locked
  // template per DEC-74.
  const bc = _bandCopyForPerspective(metric, p);
  return `
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
      ${bands.map(b => {
        const isActive = (b === p.band);
        const color = isActive ? "var(--text)" : "var(--text-dim)";
        const borderColor = isActive ? "var(--accent)" : "var(--border)";
        const fontWeight = isActive ? "600" : "400";
        const text = bc[b] || b;
        const labelPrefix = `<span style="color:var(--text-mute);font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;margin-right:4px;">${b}</span>`;
        return `<span style="font-size:11.5px;background:var(--panel-2);` +
               `border:1px solid ${borderColor};padding:2px 8px;` +
               `border-radius:99px;color:${color};font-weight:${fontWeight};` +
               `display:inline-flex;align-items:center;">` +
               `${labelPrefix}${htmlEscape(text)}</span>`;
      }).join("")}
    </div>
  `;
}

// ── Layer 4.3 sub-pass 4.3.8 — inline intent copy ───────────────────
//
// Reads p.intent_copy from the payload (set by centre_page.py v6 from
// the LAYER3_METRIC_INTENT_COPY constant). Renders a single italic
// muted-color line beneath the band chips. Silent if no entry — P-2
// honest absence; future metrics pick up copy automatically by adding
// to the constant in centre_page.py.
//
// Visual treatment matches the "as at YYYY" stamp pattern used in
// Lite rows: 11px italic, --text-mute. Sits below the visual data
// signal (chips, decile strip, histogram) and above the DER+COM
// badges, so the eye scans data first then reads framing.
function _renderIntentCopy(p) {
  const copy = p && p.intent_copy;
  if (!copy) return "";
  return `
    <div style="margin-top:8px;font-size:11.5px;font-style:italic;color:var(--text-mute);line-height:1.5;">
      ${htmlEscape(String(copy))}
    </div>
  `;
}

// ── v3.22 (OI-32) — "About this measure" panel for Position rows ─────
//
// Renders p.about_data as a permanent visible explainer panel inside
// _renderFullRow, below the italic intent_copy line and above the
// DER/COM badge row. Visual style mirrors the workforce row about_data
// block (v3.17): subtle background, left border, uppercase label.
//
// Format conventions (mirrored on Python side, LAYER3_METRIC_ABOUT_DATA):
//   - Plain text only (htmlEscape applied here)
//   - "\n\n" splits into separate paragraph divs (visual gap)
//   - "\n" within a paragraph splits into <br> lines (tight)
//
// Silent absence per P-2: returns "" when p.about_data is null or
// empty after trimming. Currently populated only for the 4 Full-weight
// catchment metrics (sa2_supply_ratio, sa2_child_to_place,
// sa2_demand_supply, sa2_adjusted_demand); other Position metrics
// see no panel until copy is added on the Python side.
function _renderAboutData(p) {
  const txt = p && p.about_data;
  if (!txt) return "";
  const paragraphs = String(txt)
    .split("\n\n")
    .map(s => s.trim())
    .filter(Boolean);
  if (paragraphs.length === 0) return "";
  const body = paragraphs.map((par, i) => {
    const lines = par
      .split("\n")
      .map(s => htmlEscape(s.trim()))
      .filter(Boolean)
      .join("<br>");
    const mt = (i === 0) ? "0" : "6px";
    return `<div style="margin-top:${mt};">${lines}</div>`;
  }).join("");
  return `
    <div style="margin-top:10px;padding:8px 10px;background:rgba(255,255,255,0.02);border-radius:4px;border-left:2px solid var(--border);font-size:12.5px;color:var(--text-mute);line-height:1.5;">
      <div style="font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:10px;color:var(--text-dim);margin-bottom:6px;">About this measure</div>
      ${body}
    </div>
  `;
}

// ── Layer 4.3 sub-pass 4.3.7 — perspective toggle (DEC-74) ──────────
//
// Infrastructure for the per-row perspective toggle that swaps a
// reversible ratio's framing at render time. In V1 this sits inert
// because no metric in the registry carries reversible:true. The
// catchment ratios from Layer 4.2-A.3 will arrive with the field set
// — at which point this toggle activates per row with no further
// renderer changes.
//
// Reversible pairs (DEC-74):
//   supply_ratio (high_is_concerning) ↔ child_to_place (high_is_positive)
//   demand_supply (high_is_positive)  ↔ demand_supply_inv (high_is_concerning)
//
// State is kept in module-local memory keyed by metric. Default reads
// from p.default_perspective; toggle button flips between the two
// perspectives. No persistence across page loads in V1.
//
// Locked band-copy templates per DEC-74. The template per direction
// is fixed: when the renderer swaps perspective, the band copy swaps
// with it rather than reading stale text. Templates are merged with
// the metric's own band_copy (centre_page.py side) at render time —
// the registry's band_copy is for the metric's DEFAULT perspective;
// the inverse perspective uses the locked template below.
const _PERSPECTIVE_STATE = {};   // metric -> 'forward' | 'inverse'

const _PERSPECTIVE_BAND_COPY_TEMPLATES = {
  // Direction-keyed locked templates per DEC-74.
  high_is_concerning: {
    low:  "low — limited stress",
    mid:  "moderate",
    high: "elevated — flag for review",
  },
  high_is_positive: {
    low:  "thin — caution",
    mid:  "moderate",
    high: "strong — supportive signal",
  },
};

function _activePerspective(metric, p) {
  if (!p?.reversible) return "forward";
  return _PERSPECTIVE_STATE[metric] || (p.default_perspective || "forward");
}

function _togglePerspective(metric, ev) {
  if (ev) ev.stopPropagation();
  const cur = _PERSPECTIVE_STATE[metric] || "forward";
  _PERSPECTIVE_STATE[metric] = (cur === "forward") ? "inverse" : "forward";
  // Re-render the page — same single-shot render path used by the
  // global trend-window bar, so this picks up cleanly.
  if (typeof _LAST_CENTRE !== "undefined" && _LAST_CENTRE) {
    render(_LAST_CENTRE);
  }
}

function _renderPerspectiveToggle(metric, p) {
  if (!p?.reversible) return "";
  const labels = p.perspective_labels || { forward: "Forward", inverse: "Inverse" };
  const active = _activePerspective(metric, p);
  const fwdActive = (active === "forward");
  return `
    <span style="display:inline-flex;gap:4px;align-items:center;font-size:11px;">
      <button class="range-btn${fwdActive ? " active" : ""}"
              onclick="_togglePerspective('${metric}', event)"
              title="Switch perspective">
        ${htmlEscape(labels.forward || "Forward")}
      </button>
      <span style="color:var(--text-mute);">/</span>
      <button class="range-btn${!fwdActive ? " active" : ""}"
              onclick="_togglePerspective('${metric}', event)"
              title="Switch perspective">
        ${htmlEscape(labels.inverse || "Inverse")}
      </button>
    </span>
  `;
}

// Returns the band-copy dict for the active perspective. If perspective
// is 'forward' (or metric isn't reversible), uses the metric's own
// band_copy. If 'inverse', uses the locked template for the INVERTED
// direction (high_is_concerning becomes high_is_positive and vice versa).
function _bandCopyForPerspective(metric, p) {
  const active = _activePerspective(metric, p);
  if (!p?.reversible || active === "forward") {
    return p?.band_copy || {};
  }
  // Inverse perspective: flip direction
  const inverseDirection = (p.direction === "high_is_concerning")
    ? "high_is_positive" : "high_is_concerning";
  return _PERSPECTIVE_BAND_COPY_TEMPLATES[inverseDirection] || {};
}

// ── Layer 4.3 sub-pass 4.3.6 — row_weight switch (DEC-75) ───────────
//
// Three row weights, set per-metric on the registry in centre_page.py
// and propagated onto every payload entry as p.row_weight:
//
//   "full"    — trajectory + cohort histogram + decile strip + chips
//               (the existing template; default for unknown values)
//   "lite"    — decile strip + chips + "as at YYYY" stamp; no
//               trajectory, no cohort histogram. For SA2-cohort metrics
//               with <5 dense series points (LFP triplet — 3 Census
//               points is not a trajectory).
//   "context" — single-fact line + period stamp; no decile, no chips,
//               no cohort histogram. For state-level / national metrics
//               with no SA2 peer cohort. Currently dormant in the
//               Position-row code path: the only context-weighted
//               metric (jsa_vacancy_rate) is status='deferred' until
//               sub-pass 4.3.9 relocates it to the Workforce supply
//               context block (DEC-76).
//
// Switch lives inside the normal/low confidence branch — deferred /
// unavailable / insufficient stubs are independent of row_weight.
//
// Future row classes (e.g. daily-rate) add a 4th branch with no
// retrofit: row_weight is a string, the switch has explicit cases,
// and the default-to-"full" fallback keeps unknown values rendering.

function renderPositionRow(metric, p) {
  if (!p) return "";
  const baseDisplay = htmlEscape(p.display || metric);
  const conf = p.confidence || "unavailable";

  // Short cohort label for the metric title — only when there's a cohort.
  // Deferred rows get no label (no cohort yet); unavailable rows get none
  // (no row to band against). Insufficient rows DO get one — the cohort
  // is known, we're just suppressing the strip because n<10.
  const cohortShort = (conf === "deferred" || conf === "unavailable")
    ? ""
    : _buildCohortShortLabel(p);
  const display = cohortShort
    ? `${baseDisplay} <span style="color:var(--text-mute);font-size:11.5px;font-weight:400;">(${htmlEscape(cohortShort)})</span>`
    : baseDisplay;

  // Deferred slot — coming-next placeholder
  if (conf === "deferred") {
    return `
      <div class="fact" style="opacity:.55;">
        <span class="k">${display}</span>
        <span class="v">
          <span style="color:var(--text-mute);font-style:italic;font-size:12px;">
            (coming next)
          </span>
        </span>
      </div>
    `;
  }

  // No Layer 3 row for this SA2 / metric
  if (conf === "unavailable") {
    // Layer 4.3 Thread A: improved empty-state for SALM-missing SA2s.
    // SALM (ABS Small Area Labour Markets) does not publish unemployment
    // for every SA2 — small-population areas are suppressed. Replace the
    // silent em-dash with a named reason for the unemployment row only.
    // Other metrics retain the em-dash; their missing-data causes differ
    // (Census-only series, deferred metrics) and warrant per-metric copy
    // when those rows are revisited.
    const isUnemployment = (metric === "sa2_unemployment_rate");
    const fallback = isUnemployment
      ? `<span style="color:var(--text-mute);font-style:italic;font-size:11.5px;">
           SALM does not publish at this SA2 (small-population suppression)
         </span>`
      : `<span style="color:var(--text-mute);font-style:italic;font-size:12px;">—</span>`;
    return `
      <div class="fact">
        <span class="k">${display}</span>
        <span class="v">${fallback}</span>
      </div>
    `;
  }

  const rawStr = _formatPositionValue(p);
  const periodStr = _formatPositionPeriod(p);
  const periodTag = periodStr
    ? `<span style="color:var(--text-mute);font-size:11px;">(${htmlEscape(periodStr)})</span>`
    : "";

  // OBS badge for the raw value (NOW)
  const obsBadge = renderBadge("OBS", { source: p.source || "—" }, true);

  // cn < 10 — suppress the strip, keep the value + suppression notice
  if (conf === "insufficient") {
    return `
      <div style="padding:10px 0;border-bottom:1px dashed var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;">
          <span style="color:var(--text-dim);font-size:13px;">${display}</span>
          <span style="display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
            <b style="font-variant-numeric:tabular-nums;color:var(--text);font-weight:500;">${rawStr}</b>
            ${periodTag}
            ${obsBadge}
          </span>
        </div>
        <div style="color:var(--text-mute);font-style:italic;font-size:11.5px;margin-top:6px;">
          insufficient peer cohort (n=${p.cohort_n}) — peer comparison suppressed
        </div>
      </div>
    `;
  }

  // ── Normal / low: row_weight switch (DEC-75) ──────────────────────
  const weight = p.row_weight || "full";
  const ctx = { display, rawStr, periodStr, periodTag, obsBadge, metric };
  if (weight === "lite")    return _renderLiteRow(p, ctx);
  if (weight === "context") return _renderContextRow(p, ctx);
  return _renderFullRow(p, ctx); // "full" + default fallback
}

// ── Full row (the existing template, unchanged behaviour) ───────────
function _renderFullRow(p, ctx) {
  const decile = p.decile;
  const band = p.band || "mid";
  const cohortLine = `n=${p.cohort_n}`;
  const conf = p.confidence || "unavailable";
  const lowConfPill = (conf === "low")
    ? `<span style="background:var(--amber-bg);color:var(--amber);font-size:10px;` +
      `font-weight:600;padding:1px 6px;border-radius:3px;letter-spacing:.04em;` +
      `margin-left:6px;">low confidence</span>`
    : "";

  const headlineHtml =
    `<b style="color:var(--text);font-weight:600;">Decile ${decile}</b> ` +
    `<span style="color:var(--text-mute);">·</span> ` +
    `<span style="color:var(--text-dim);">${htmlEscape(band)}</span> ` +
    `<span style="color:var(--text-mute);">·</span> ` +
    `<span style="color:var(--text-mute);font-size:11.5px;">${cohortLine}</span>` +
    `${lowConfPill}`;

  const derBadge = renderBadge("DER", {
    source: `<code>layer3_sa2_metric_banding</code> (cohort_def=<code>${htmlEscape(p.cohort_def || "")}</code>, key=<code>${htmlEscape(p.cohort_key || "")}</code>)`,
    rule: htmlEscape(p.cohort_label || ""),
    formula: "decile = NTILE(10) within cohort; band = low (1–3) / mid (4–6) / high (7–10).",
    inputs: `<code>raw_value=${htmlEscape(String(p.raw_value))}</code>, <code>percentile=${htmlEscape(String((p.percentile != null) ? Number(p.percentile).toFixed(1) : ""))}</code>`,
    calibration: _buildCalibrationRow(p),
    threshold: "Suppress if cohort_n < 10; low-confidence pill if 10 ≤ cohort_n < 20."
  }, true);
  const comBadge = renderBadge("COM", {
    rule: `band-copy from <code>LAYER3_METRIC_META[${htmlEscape(ctx.metric)}].band_copy["${htmlEscape(band)}"]</code>`,
    source: "Rule-based, see centre_page.py LAYER3_METRIC_META."
  }, true);

  return `

// ── Layer 4.2-A.3b: industry-absolute band line ──────────────
//
// Renders BELOW the local-relative band chips. Two lenses on
// the same data: chips show "where this SA2 sits vs same-state
// same-remoteness peers" (decile 1-10); industry band shows
// "where this SA2 sits in absolute industry terms" (PC + RSI
// + Credit Committee Brief grounded thresholds).
//
// Silent absence: if p.industry_band is null (metric not opted
// in to industry thresholds, or raw_value is null), renders
// nothing. Honest absence per P-2.
function _renderIndustryBand(p) {
  if (!p || !p.industry_band) return "";
  const label = htmlEscape(p.industry_band_label || p.industry_band);
  const note  = htmlEscape(p.industry_band_note || "");
  // Match band key to a subtle accent. Direction-aware where
  // possible: "saturated"/"soft"/"desert" lean cautionary;
  // "well_served"/"strong"/"viable" lean positive; midbands
  // stay neutral. Palette stays muted per design §11.2.
  const cautionKeys  = ["saturated", "soft", "desert",
                         "undersupplied", "severe", "constrained"];
  const positiveKeys = ["well_served", "strong", "viable",
                         "at_target", "excess_capacity"];
  let pill;
  if (cautionKeys.includes(p.industry_band)) {
    pill = `<span style="background:rgba(224,92,58,0.10);color:var(--amber,#d8b050);border:1px solid rgba(224,92,58,0.25);padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">${label}</span>`;
  } else if (positiveKeys.includes(p.industry_band)) {
    pill = `<span style="background:rgba(122,197,122,0.10);color:var(--ok,#7ac57a);border:1px solid rgba(122,197,122,0.25);padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">${label}</span>`;
  } else {
    pill = `<span style="background:rgba(180,200,230,0.06);color:var(--text-dim);border:1px solid rgba(180,200,230,0.15);padding:1px 7px;border-radius:4px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;">${label}</span>`;
  }
  return `
    <div style="margin-top:8px;padding:6px 8px;background:rgba(255,255,255,0.02);border-radius:4px;border-left:2px solid var(--border);">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--text-mute);">
        <span style="font-weight:600;letter-spacing:.04em;text-transform:uppercase;font-size:10px;">Industry</span>
        ${pill}
      </div>
      ${note ? `<div style="margin-top:3px;font-size:11px;color:var(--text-mute);font-style:italic;">${note}</div>` : ""}
    </div>
  `;
}

// ── Lite row (DEC-75) ───────────────────────────────────────────────
// Decile strip + chips + "as at YYYY" stamp. NO trajectory, NO cohort
// histogram. Honest absence (P-2) — the SA2 still has a peer-position,
// but the underlying data is too thin to justify a trajectory chart or
// a cohort distribution view.

// ── OI-36b (centre.html v3.27): delta badge for Lite rows ────────────
//
// Lite metrics (LFP triplet, median household income, sa2_nes_share)
// have a trajectory array in the payload but render no chart per
// DEC-75 (3 Census points or fewer is not a continuous series). A
// small delta badge surfaces the headline first-to-last change so
// the slow-moving demographic shifts (NES +9.5pp 2011-2021, etc.)
// are visible at a glance.
//
// Always-show variant (P1). Window-aware variant (P2) is banked —
// existing _setTrajectoryRange doesn't trigger a page re-render, so
// window-awareness on Lite rows would need new event-subscription
// wiring beyond today's scope.
//
// Returns "" silently when:
//   - no trajectory in payload
//   - fewer than 2 numeric points
//   - earliest and latest periods cannot be year-extracted
//   - delta is exactly zero (avoids "+0.0pp from 2011 to 2021" noise)
//
// Format dispatch by p.value_format:
//   percent / percent_share  ->  "+9.5pp from 2011 to 2021"
//   currency_aud             ->  "+$1,234 from 2018 to 2022"
//   other                    ->  "+0.04× from 2011 to 2021"
function _renderLiteDelta(p) {
  const traj = (p && p.trajectory) || [];
  if (traj.length < 2) return "";

  // First and last numeric points (skip nulls per Census triplet
  // pattern where one period may be missing).
  const numericPts = traj.filter(pt => pt && pt.value != null
                                       && !isNaN(Number(pt.value)));
  if (numericPts.length < 2) return "";

  const first = numericPts[0];
  const last  = numericPts[numericPts.length - 1];
  const firstYear = _yearOfPeriod(first.period);
  const lastYear  = _yearOfPeriod(last.period);
  if (isNaN(firstYear) || isNaN(lastYear) || firstYear === lastYear) {
    return "";
  }

  const delta = Number(last.value) - Number(first.value);
  if (delta === 0) return "";

  const sign = delta > 0 ? "+" : "";
  const fmt = p.value_format || "";
  let deltaStr;
  if (fmt === "percent" || fmt === "percent_share") {
    deltaStr = `${sign}${delta.toFixed(1)}pp`;
  } else if (fmt === "currency_weekly" || fmt === "currency_annual") {
    const rounded = Math.round(delta);
    const abs = Math.abs(rounded).toLocaleString();
    const suffix = (fmt === "currency_weekly") ? "/week" : "";
    deltaStr = `${rounded < 0 ? "−" : "+"}$${abs}${suffix}`;
  } else if (fmt === "ratio_x") {
    deltaStr = `${sign}${delta.toFixed(2)}×`;
  } else {
    deltaStr = `${sign}${delta.toFixed(2)}`;
  }

  return `<span style="margin-left:8px;color:var(--text-dim);
                       font-size:11px;font-weight:500;
                       font-variant-numeric:tabular-nums;">
            ${deltaStr} from ${firstYear} to ${lastYear}
          </span>`;
}

function _renderLiteRow(p, ctx) {
  const decile = p.decile;
  const band = p.band || "mid";
  const cohortLine = `n=${p.cohort_n}`;
  const conf = p.confidence || "unavailable";
  const lowConfPill = (conf === "low")
    ? `<span style="background:var(--amber-bg);color:var(--amber);font-size:10px;` +
      `font-weight:600;padding:1px 6px;border-radius:3px;letter-spacing:.04em;` +
      `margin-left:6px;">low confidence</span>`
    : "";

  const headlineHtml =
    `<b style="color:var(--text);font-weight:600;">Decile ${decile}</b> ` +
    `<span style="color:var(--text-mute);">·</span> ` +
    `<span style="color:var(--text-dim);">${htmlEscape(band)}</span> ` +
    `<span style="color:var(--text-mute);">·</span> ` +
    `<span style="color:var(--text-mute);font-size:11.5px;">${cohortLine}</span>` +
    `${lowConfPill}`;

  // "as at YYYY" stamp — derived from the most recent point in the
  // trajectory series if present, otherwise from period_label / year
  // on the entry. The trajectory data is still flowing through the
  // payload for Lite metrics (LFP has 3 Census points); we just don't
  // render it as a chart.
  const asAtRaw = (p.trajectory && p.trajectory.length)
    ? p.trajectory[p.trajectory.length - 1].period
    : (p.period_label || p.year);
  const asAtStamp = asAtRaw
    ? `<div style="margin-top:6px;font-size:11px;color:var(--text-mute);font-style:italic;">
         as at ${htmlEscape(String(asAtRaw))} · static snapshot, no trajectory
       </div>`
    : "";

  const derBadge = renderBadge("DER", {
    source: `<code>layer3_sa2_metric_banding</code> (cohort_def=<code>${htmlEscape(p.cohort_def || "")}</code>, key=<code>${htmlEscape(p.cohort_key || "")}</code>)`,
    rule: htmlEscape(p.cohort_label || ""),
    formula: "decile = NTILE(10) within cohort; band = low (1–3) / mid (4–6) / high (7–10). Lite weight per DEC-75: <5 dense series points, no trajectory rendered.",
    inputs: `<code>raw_value=${htmlEscape(String(p.raw_value))}</code>, <code>percentile=${htmlEscape(String((p.percentile != null) ? Number(p.percentile).toFixed(1) : ""))}</code>`,
    calibration: _buildCalibrationRow(p),
    threshold: "Suppress if cohort_n < 10; low-confidence pill if 10 ≤ cohort_n < 20."
  }, true);
  const comBadge = renderBadge("COM", {
    rule: `band-copy from <code>LAYER3_METRIC_META[${htmlEscape(ctx.metric)}].band_copy["${htmlEscape(band)}"]</code>`,
    source: "Rule-based, see centre_page.py LAYER3_METRIC_META."
  }, true);

  return `
    <div style="padding:10px 0;border-bottom:1px dashed var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;">
        <span style="color:var(--text-dim);font-size:13px;">${ctx.display}</span>
        <span style="display:inline-flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
          <b style="font-variant-numeric:tabular-nums;color:var(--text);font-weight:500;">${ctx.rawStr}</b>
          ${ctx.periodTag}
          ${ctx.obsBadge}
        </span>
      </div>
      <div style="margin-top:6px;font-size:12px;">${headlineHtml}</div>
      ${_renderDecileStrip(decile)}
      ${_renderBandChips(ctx.metric, p)}
      ${_renderIndustryBand(p)}
      ${asAtStamp}
      ${_renderLiteDelta(p)}
      ${_renderIntentCopy(p)}
      <div style="margin-top:8px;display:flex;justify-content:flex-end;gap:6px;">
        ${derBadge}
        ${comBadge}
      </div>

  `;

// ── OI-23 fix (sub-pass 4.3.6): page-level trajectory range bar ─────
//
// The trend-window bar (DEC-73) was previously gated on Population-card
// metrics having data. With Thread A's per-chart 1Y/2Y override on
// unemployment, an SA2 with Labour-Market data but no live Population
// metrics would lose the global control entirely. Promoting the bar
// to page level above both cards fixes that.
//
// Visibility gate: render the bar whenever ANY Full-weight row on the
// page carries trajectory data. Lite and Context-only rows have no
// trajectory by design, so they are ignored. If no Full row has data,
// the bar hides — there is nothing for it to control.
function _pageHasFullTrajectory(centre) {
  const pos = (centre && centre.position) || {};
  for (const card of ["population", "labour_market"]) {
    const cardPos = pos[card] || {};
    for (const k of Object.keys(cardPos)) {
      const e = cardPos[k];
      if (!e) continue;
      const weight = e.row_weight || "full";
      if (weight !== "full") continue;
      if (e.trajectory && e.trajectory.length) return true;
    }
  }
  return false;
}

    "sa2_women_35_44_with_child_share",
    "sa2_women_25_34_with_child_share",

  const order = [...creditMetrics, ...demoMetrics];
  const hasAny = order.some(k => {

      <h3>Catchment position <span class="note">SA2 peer position — credit signal</span></h3>
