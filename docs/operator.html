    }).length,
  }));
  const maxCount = Math.max(...rows.map(r => r.count), 1);

  return `
  <div class="op-section">
    <h3>Centres by size <span class="note">approved places per centre</span></h3>
    <div class="hist">
      ${rows.map(r => `
        <div class="lbl">${r.label}</div>
        <div class="track"><div class="fill" style="width:${100 * r.count / maxCount}%;"></div></div>
        <div class="val">${r.count}</div>
      `).join("")}
    </div>
    <div style="font-size:11px;color:var(--text-mute);margin-top:6px;font-style:italic;">
      Weighting to smaller bands signals a community-centre portfolio; weighting
      to 91–120+ signals a suburban-scale portfolio with higher revenue-per-site
      but more operational leverage.
    </div>
  </div>`;
}

// ── v2: Valuation card ───────────────────────────────────────────
function renderValuation() {
  const v = payload.valuation || {};
  if (!v.total_places) {
    return `
    <div class="op-section">
      <h3>Valuation (illustrative)</h3>
      <div class="placeholder">No approved places — nothing to value.</div>
    </div>`;
  }
  const loLabel = "$" + fmtN(Math.round((v.group_low  || 0) / 1e6)) + "m";
  const hiLabel = "$" + fmtN(Math.round((v.group_high || 0) / 1e6)) + "m";

  return `
  <div class="op-section">
    <h3>Valuation (illustrative) <span class="note">group level</span></h3>
    <div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;">
      <div>
        <div style="font-size:11px;color:var(--text-mute);letter-spacing:0.08em;
                    text-transform:uppercase;font-weight:700;">indicative range</div>
        <div style="font-size:22px;font-weight:600;font-variant-numeric:tabular-nums;">
          ${loLabel} – ${hiLabel}
        </div>
      </div>
      <div style="color:var(--text-dim);font-size:13px;">
        ${fmtN(v.total_places)} approved places ×
        $${fmtN(v.per_place_low)}–$${fmtN(v.per_place_high)} per place
      </div>
    </div>
    <div class="val-bar">
      <div class="range" style="left:10%;right:10%;">
        <span class="low">${loLabel}</span>
        <span class="mid">${fmtN(v.total_places)} places</span>
        <span class="high">${hiLabel}</span>
      </div>
    </div>
    <div class="val-note">${htmlEscape(v.note || "")}</div>
    <div class="val-source">source: ${htmlEscape(v.source || "")}</div>
  </div>`;
}

// ── v2: collapsible-table wiring ─────────────────────────────────
function wireCollapsibles() {
  document.querySelectorAll(".op-section.collapsible > .tbl-title").forEach(h => {
    h.addEventListener("click", () => {
      h.parentElement.classList.toggle("open");
    });
  });
}

// ── Entities table ───────────────────────────────────────────────
function renderEntitiesTable() {
  const entities = [...(payload.entities || [])];
  sortArray(entities, sortState.entities);

  const rows = entities.map(e => {
    const flags = [];
    if (e.is_propco)   flags.push(`<span class="f propco">propco</span>`);
    if (e.is_opco)     flags.push(`<span class="f opco">opco</span>`);
    if (e.is_fgc)      flags.push(`<span class="f">fgc</span>`);
    if (e.is_trustee)  flags.push(`<span class="f">trustee</span>`);
    if (e.is_notional) flags.push(`<span class="f notional">notional</span>`);
    if (!e.is_active)  flags.push(`<span class="f">inactive</span>`);

    const star = e.is_largest ? `<span class="star" title="largest entity">★</span>` : "";
    const parentTag = e.is_parent ? `<span class="parent-tag">parent</span>` : "";

    return `
      <tr class="${e.is_parent ? 'is-parent' : ''}">
        <td class="entity-name">
          ${star}<b>${htmlEscape(e.legal_name)}</b>${parentTag}
        </td>
        <td class="tight">${htmlEscape(e.abn || "—")}</td>
        <td class="tight">${htmlEscape(e.entity_type || "—")}</td>
        <td class="tight">${htmlEscape(e.registered_state || "—")}</td>
        <td class="num">${fmtN(e.services_count)}</td>
        <td class="num">${fmtN(e.places_count)}</td>
        <td><div class="entity-flags">${flags.join("")}</div></td>
      </tr>
    `;
  }).join("");

  return `
  <div class="op-section collapsible">
    <div class="tbl-title"><h3>Entities (${entities.length})</h3></div>
    <div class="collapsible-body">
      <table class="op-table" data-table="entities">
        <thead>
          <tr>
            <th data-col="legal_name">Legal name</th>
            <th data-col="abn">ABN</th>
            <th data-col="entity_type">Type</th>
            <th data-col="registered_state">State</th>
            <th data-col="services_count" class="num">Services</th>
            <th data-col="places_count" class="num">Places</th>
            <th data-col="_flags">Flags</th>
          </tr>
        </thead>
        <tbody>${rows || `<tr><td colspan="7" style="color:var(--text-mute);">No entities.</td></tr>`}</tbody>
      </table>
    </div>
  </div>
  `;
}

// ── Centres table ────────────────────────────────────────────────
function renderCentresTable() {
  const services = [...(payload.services || [])];
  sortArray(services, sortState.services);

  // Compute "stale" threshold once — 2 years, matching quality.stale_threshold_years
  const staleCutoffIso = (() => {
    const d = new Date();
    d.setDate(d.getDate() - 730);
    return d.toISOString().slice(0, 10);
  })();
  // v4: inner parser also handles Mon-YYYY (mirrors the outer one)
  const parseAustralianToIso = (s) => {
    if (!s) return null;
    const str = String(s).trim();
    const m = /^(\d{2})\/(\d{2})\/(\d{4})/.exec(str);
    if (m) return `${m[3]}-${m[2]}-${m[1]}`;
    const m2 = /^(\d{4})-(\d{2})-(\d{2})/.exec(str);
    if (m2) return m2[0];
    const m3 = /^([A-Za-z]{3})\s+(\d{4})\b/.exec(str);
    if (m3) {
      const mon = m3[1].charAt(0).toUpperCase() + m3[1].slice(1).toLowerCase();
      const mm = MON_NUM[mon];
      if (mm) return `${m3[2]}-${mm}-01`;
    }
    return null;
  };

  const rows = services.map(s => {
    const nqs = s.nqs || "(not rated)";
    const cls = nqsClass(nqs);
    const brand = s.brand_name
      ? `<span class="brand-chip">${htmlEscape(s.brand_name)}</span>`
      : `<span class="brand-chip none">unbranded</span>`;
    const ratingIso = parseAustralianToIso(s.rating_issued_date);
    const isStale = ratingIso && ratingIso < staleCutoffIso;
    return `
      <tr>
        <td><b>${htmlEscape(s.service_name || "")}</b>
          <div style="color:var(--text-mute);font-size:11px;">
            ${htmlEscape(s.entity_legal_name || "")}
          </div>
        </td>
        <td class="tight">${htmlEscape(s.suburb || "")} <span style="color:var(--text-mute);">${htmlEscape(s.state || "")}</span></td>
        <td>${brand}</td>
        <td class="num">${fmtN(s.approved_places)}</td>
        <td><span class="nqs-pill ${cls}">${htmlEscape(nqs)}</span></td>
        <td class="tight ${isStale ? 'rating-stale' : ''}">${s.rating_issued_date ? htmlEscape(formatMonYYYY(s.rating_issued_date)) : "—"}</td>
        <td class="tight">${htmlEscape(s.approval_granted_date || "—")}</td>
        <td class="tight">${htmlEscape(s.last_transfer_date || "—")}</td>
      </tr>
    `;
  }).join("");

  return `
  <div class="op-section collapsible">
    <div class="tbl-title"><h3>Centres (${services.length})</h3></div>
    <div class="collapsible-body">
      <table class="op-table" data-table="services">
        <thead>
          <tr>
            <th data-col="service_name">Centre</th>
            <th data-col="suburb">Location</th>
            <th data-col="brand_name">Brand</th>
            <th data-col="approved_places" class="num">Places</th>
            <th data-col="nqs">NQS</th>
            <th data-col="rating_issued_date">Rated</th>
            <th data-col="approval_granted_date">Approved</th>
            <th data-col="last_transfer_date">Last transfer</th>
          </tr>
        </thead>
        <tbody>${rows || `<tr><td colspan="8" style="color:var(--text-mute);">No centres.</td></tr>`}</tbody>
      </table>
    </div>
  </div>
  `;
}

function sortArray(arr, state) {
  const col = state.col;
  const dir = state.dir === "asc" ? 1 : -1;
  arr.sort((a, b) => {
    let av = a[col];
    let bv = b[col];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "number" && typeof bv === "number") return (av - bv) * dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
}

function wireTableSorts() {
  document.querySelectorAll("table.op-table").forEach(tbl => {
    const which = tbl.dataset.table; // entities | services
    const state = sortState[which];
    tbl.querySelectorAll("th[data-col]").forEach(th => {
      const col = th.dataset.col;
      if (col === state.col) {
        th.classList.add("active");
        th.classList.toggle("asc", state.dir === "asc");
      }
      th.addEventListener("click", () => {
        if (state.col === col) {
          state.dir = (state.dir === "asc") ? "desc" : "asc";
        } else {
          state.col = col;
          state.dir = "asc";
        }
        render();
      });
    });
  });
}

// ── Intelligence notes ───────────────────────────────────────────
function renderNotes() {
  const n = payload.intelligence_notes || {};
  const gn = n.group || [];
  const be = n.by_entity || {};
  const entityCount = Object.keys(be).length;

  if (gn.length === 0 && entityCount === 0) {
    return `
    <div class="op-section">
      <h3>Intelligence notes</h3>
      <div class="notes-empty">No notes recorded for this operator yet.
        <small>A POST endpoint to add notes will come in a later step.
          Notes will show group-level and per-entity, newest first.</small>
      </div>
    </div>`;
  }

  // Minimal rendering when notes exist — defer the "add" form.
  const groupHtml = gn.map(row => `
    <div style="background:var(--panel-2);border:1px solid var(--border);
                border-radius:5px;padding:10px 12px;margin-bottom:6px;font-size:13px;">
      <div style="color:var(--text-mute);font-size:11px;">
        ${htmlEscape(row.created_at || "")}  ·  ${htmlEscape(row.author || "")}
      </div>
      <div>${htmlEscape(row.note || row.body || "(empty)")}</div>
    </div>
  `).join("");

  return `
  <div class="op-section">
    <h3>Intelligence notes (${gn.length} group-level · ${entityCount} entities with notes)</h3>
    ${groupHtml || "<div class='notes-empty'>No group-level notes.</div>"}
  </div>`;
}

load();
</script>
